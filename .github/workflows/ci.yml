name: Test Suite Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'

jobs:
  test-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff pytest-cov pyyaml


      - name: Run unit tests with coverage
        run: python -m pytest --cov=tests/shared --cov=tests/service_catalog/shared --cov-report=term-missing --cov-fail-under=60 tests/unit/

      - name: Pytest discovery check
        run: python -m pytest --collect-only tests/

      - name: Lint check with ruff
        run: python -m ruff check tests/
        continue-on-error: true

