name: Derive metrics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'notebooks/**'
      - 'docs/results/**'
      - 'docs/data/factory-*.json'

concurrency:
  group: derive-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  derive:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip derive]') && github.actor != 'github-actions[bot]'"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Install notebook dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r notebooks/requirements.txt

      - name: Execute notebook 01 - pass-rate Wilson
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p .scratch docs/methods
          papermill notebooks/01_pass_rate_wilson.ipynb .scratch/01.executed.ipynb

      - name: Render notebook 01 to HTML
        run: |
          jupyter nbconvert --to html --output-dir docs/methods .scratch/01.executed.ipynb --output 01_pass_rate_wilson.html

      - name: Commit derived outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/derived docs/methods
          if git diff --cached --quiet; then
            echo "No derived changes to commit."
            exit 0
          fi
          git commit -m "chore(derive): refresh derived metrics and rendered methods [skip derive]"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
