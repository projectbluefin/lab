name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/validate-docs.py"
      - ".github/workflows/docs.yml"
      - "*.md"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/validate-docs.py"
      - ".github/workflows/docs.yml"
      - "*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Validate docs structure and links
        uses: docker://cgr.dev/chainguard/python:latest@sha256:2c6a2e8bdeb1336cd8545d3586d1c1e5b4f7564ef00924b0447ebfbe57a549ee
        with:
          args: scripts/validate-docs.py

      - name: Check for stale skill references
        shell: bash
        run: |
          set +e
          found=0
          # Look for old flat skill filenames that should no longer exist
          for pattern in "docs/skills/[a-z0-9_-]+\.md"; do
            matches=$(grep -R -n -E "$pattern" --include="*.md" . || true)
            if [ -n "$matches" ]; then
              echo "$matches"
              found=1
            fi
          done
          if [ "$found" -ne 0 ]; then
            echo "Found stale docs/skills/*.md references. Use docs/skills/<name>/SKILL.md."
            exit 1
          fi
