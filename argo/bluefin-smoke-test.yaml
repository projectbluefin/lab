apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: bluefin-qa-smoke-
  namespace: argo
spec:
  workflowTemplateRef:
    name: bluefin-qa-pipeline
  arguments:
    parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "testing"
      - name: suites
        value: "smoke"
      - name: variant
        value: "bluefin"
      - name: branch
        value: "main"
      - name: pr-number
        value: ""
      - name: sha
        value: ""
      - name: repo
        value: ""
