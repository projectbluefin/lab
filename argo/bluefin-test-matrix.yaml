apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: bluefin-qa-matrix-
  namespace: argo
spec:
  entrypoint: matrix
  serviceAccountName: argo
  podMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/suite: qa-matrix
    annotations:
      bluefin.io/image-latest: "{{workflow.parameters.image-latest}}"
      bluefin.io/image-lts: "{{workflow.parameters.image-lts}}"
      bluefin.io/branch: "{{workflow.parameters.branch}}"
      bluefin.io/pr-title: "{{workflow.parameters.pr-title}}"
      bluefin.io/pr-number: "{{workflow.parameters.pr-number}}"
      bluefin.io/workflow: "{{workflow.name}}"
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/suite: qa-matrix
    annotations:
      bluefin.io/branch: "{{workflow.parameters.branch}}"
      bluefin.io/pr-title: "{{workflow.parameters.pr-title}}"
      bluefin.io/pr-number: "{{workflow.parameters.pr-number}}"
  onExit: cleanup
  ttlStrategy:
    secondsAfterCompletion: 3600
    secondsAfterSuccess: 3600
    secondsAfterFailure: 7200

  arguments:
    parameters:
      - name: image-latest
        value: "ghcr.io/ublue-os/bluefin:latest"
      - name: image-lts
        value: "ghcr.io/ublue-os/bluefin:lts"
      - name: pr-title
        value: ""
      - name: pr-number
        value: ""
      - name: branch
        value: "main"

  templates:
    - name: matrix
      steps:
        # Phase 0a: ensure latest golden disk (serialized to avoid containers-storage race)
        - - name: ensure-disk-latest
            templateRef:
              name: bib-build-and-push
              template: ensure-disk
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image-latest}}"
                - name: image-tag
                  value: "latest"

        # Phase 0b: ensure lts golden disk (after latest to avoid containers-storage race)
        - - name: ensure-disk-lts
            templateRef:
              name: bib-build-and-push
              template: ensure-disk
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.image-lts}}"
                - name: image-tag
                  value: "lts"

        # Phase 1: provision both VMs in parallel (btrfs reflink ~24ms each)
        - - name: bluefin-latest
            templateRef:
              name: provision-bluefin-vm
              template: provision-vm
            arguments:
              parameters:
                - name: image-tag
                  value: "latest"
                - name: vm-name
                  value: "bluefin-latest-{{workflow.uid}}"
                - name: namespace
                  value: "bluefin-test"

          - name: bluefin-lts
            templateRef:
              name: provision-bluefin-vm
              template: provision-vm
            arguments:
              parameters:
                - name: image-tag
                  value: "lts"
                - name: vm-name
                  value: "bluefin-lts-{{workflow.uid}}"
                - name: namespace
                  value: "bluefin-lts-test"

        # Phase 2: run smoke tests against both VMs in parallel
        - - name: test-latest
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{steps.bluefin-latest.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "smoke"
                - name: variant
                  value: "latest"
                - name: issue-title
                  value: "matrix smoke - latest - PR{{workflow.parameters.pr-number}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

          - name: test-lts
            templateRef:
              name: run-gnome-tests
              template: run-gnome-tests
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{steps.bluefin-lts.outputs.parameters.vm-ip}}"
                - name: suite
                  value: "smoke"
                - name: variant
                  value: "lts"
                - name: issue-title
                  value: "matrix smoke - lts - PR{{workflow.parameters.pr-number}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"

    # onExit: always teardown both VMs regardless of outcome
    - name: cleanup
      steps:
        - - name: teardown-latest
            templateRef:
              name: teardown-bluefin-vm
              template: teardown-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "bluefin-latest-{{workflow.uid}}"
                - name: namespace
                  value: "bluefin-test"

          - name: teardown-lts
            templateRef:
              name: teardown-bluefin-vm
              template: teardown-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "bluefin-lts-{{workflow.uid}}"
                - name: namespace
                  value: "bluefin-lts-test"
