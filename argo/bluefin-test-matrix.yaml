apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: bluefin-qa-matrix-
  namespace: argo
spec:
  entrypoint: matrix
  serviceAccountName: argo
  ttlStrategy:
    secondsAfterCompletion: 3600
    secondsAfterSuccess: 3600
    secondsAfterFailure: 7200
  arguments:
    parameters:
      - name: branch
        value: "main"
  templates:
    - name: matrix
      dag:
        tasks:
          - name: test-bluefin
            templateRef:
              name: run-container-tests
              template: run-container-tests
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/bluefin"
                - name: image-tag
                  value: "testing"
                - name: suite
                  value: "smoke"
                - name: variant
                  value: "bluefin"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
          - name: test-bluefin-lts
            templateRef:
              name: run-container-tests
              template: run-container-tests
            arguments:
              parameters:
                - name: image
                  value: "ghcr.io/projectbluefin/bluefin-lts"
                - name: image-tag
                  value: "testing"
                - name: suite
                  value: "smoke"
                - name: variant
                  value: "bluefin-lts"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
