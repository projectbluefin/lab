apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: teardown-bluefin-vm
  namespace: argo
spec:
  templates:
    - name: teardown-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
            value: "bluefin-test"
      steps:
        - - name: delete-vm
            template: delete-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
        - - name: delete-pvc
            template: delete-pvc
            arguments:
              parameters:
                - name: pvc-name
                  value: "{{inputs.parameters.vm-name}}-disk"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"

    - name: delete-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
      resource:
        action: delete
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"

    - name: delete-pvc
      inputs:
        parameters:
          - name: pvc-name
          - name: namespace
      resource:
        action: delete
        manifest: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{inputs.parameters.pvc-name}}"
            namespace: "{{inputs.parameters.namespace}}"
