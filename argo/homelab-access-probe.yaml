apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: homelab-access-
  namespace: argo
spec:
  serviceAccountName: argo
  workflowTemplateRef:
    name: homelab-access-probe
  arguments:
    parameters:
      - name: auth-mode
        value: "false"
      - name: branch
        value: "main"
