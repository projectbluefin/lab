apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: homelab-substrate-
  namespace: argo
spec:
  serviceAccountName: argo
  workflowTemplateRef:
    name: homelab-substrate
  arguments:
    parameters:
      - name: lane
        value: "homelab-substrate"
      - name: branch
        value: "main"
