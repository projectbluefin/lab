apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: test-installer-build-
  namespace: argo
spec:
  entrypoint: run
  serviceAccountName: argo
  volumes:
    - name: fuse
      hostPath:
        path: /dev/fuse
    - name: bst-cache
      emptyDir: {}
  templates:
    - name: run
      script:
        image: "192.168.1.102:30500/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        resources:
          requests:
            cpu: "6"
            memory: 16Gi
          limits:
            cpu: "10"
            memory: 30Gi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
        source: |
          set -euo pipefail

          # Setup basic BuildStream config
          cat > /tmp/buildstream.conf << 'BSTCONF'
          # Local cache only
          BSTCONF

          git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/projectbluefin/server.git" /src
          cd /src

          echo "=== Building oci/bluefin-server-installer.bst ==="
          if ! bst --config /tmp/buildstream.conf --no-interactive build oci/bluefin-server-installer.bst; then
            echo "=== Build failed! Printing the full element build log ==="
            find /root/.cache/buildstream/logs/ -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \;
            exit 1
          fi
          echo "=== Build succeeded! ==="
