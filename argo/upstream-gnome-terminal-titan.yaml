apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: upstream-gnome-terminal-
  namespace: argo
spec:
  serviceAccountName: argo
  entrypoint: run-upstream-suite
  podGC:
    strategy: OnWorkflowSuccess
  ttlStrategy:
    secondsAfterCompletion: 1800
    secondsAfterFailure: 7200
    secondsAfterSuccess: 1800

  arguments:
    parameters:
      - name: vm-ip-latest
        value: ""
      - name: vm-ip-lts
        value: ""
      - name: ssh-user
        value: "bluefin-test"
      - name: ssh-key-secret
        value: "bluefin-test-ssh-key"
      - name: upstream-suite-repo
        value: "https://github.com/modehnal/GNOMETerminalAutomation.git"
      - name: upstream-suite-ref
        value: "main"
      - name: issue-title
        value: "Red Hat upstream GNOME Terminal suite"

  templates:
    - name: run-upstream-suite
      steps:
        - - name: preflight-latest
            template: preflight
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{workflow.parameters.vm-ip-latest}}"
                - name: label
                  value: "titan-bluefin"
          - name: preflight-lts
            template: preflight
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{workflow.parameters.vm-ip-lts}}"
                - name: label
                  value: "titan-lts"
        - - name: upstream-latest
            template: execute-upstream-suite
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{workflow.parameters.vm-ip-latest}}"
                - name: variant
                  value: "latest"
                - name: label
                  value: "titan-bluefin"
          - name: upstream-lts
            template: execute-upstream-suite
            arguments:
              parameters:
                - name: vm-ip
                  value: "{{workflow.parameters.vm-ip-lts}}"
                - name: variant
                  value: "lts"
                - name: label
                  value: "titan-lts"

    - name: preflight
      inputs:
        parameters:
          - name: vm-ip
          - name: label
      nodeSelector:
        kubernetes.io/hostname: ghost
      podSpecPatch: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext:
          runAsUser: 0
      volumes:
        - name: ssh-key
          secret:
            secretName: "{{workflow.parameters.ssh-key-secret}}"
            defaultMode: 0400
      script:
        image: quay.io/fedora/fedora:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        volumeMounts:
          - name: ssh-key
            mountPath: /etc/ssh/test-key
            readOnly: true
        source: |
          set -euo pipefail
          VM_IP="{{inputs.parameters.vm-ip}}"
          LABEL="{{inputs.parameters.label}}"
          SSH="ssh -i /etc/ssh/test-key/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o LogLevel=ERROR {{workflow.parameters.ssh-user}}@${VM_IP}"

          if ! command -v ssh &>/dev/null; then
            dnf install -y --quiet openssh-clients 2>&1 | tail -2
          fi

          echo "Preflight ${LABEL} (${VM_IP})..." >&2
          STATE=$(${SSH} "systemctl is-system-running 2>/dev/null || true" | tail -n1)
          if [[ -z "${STATE}" ]]; then
            STATE="unknown"
          fi
          if [[ "${STATE}" != "running" && "${STATE}" != "degraded" ]]; then
            echo "ERROR: systemd state '${STATE}' on ${LABEL}" >&2
            exit 1
          fi
          FREE=$(${SSH} "df -BG / | awk 'NR==2{print \$4}' | tr -d G")
          if [[ "${FREE}" -lt 2 ]]; then
            echo "ERROR: only ${FREE}GB free on ${LABEL} root — need ≥ 2GB" >&2
            exit 1
          fi
          echo "Preflight passed: ${LABEL} systemd=${STATE}, disk=${FREE}GB free" >&2

    - name: execute-upstream-suite
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: run-upstream-gnome-terminal
          bluefin.io/variant: "{{inputs.parameters.variant}}"
          bluefin.io/suite: upstream-gnome-terminal
        annotations:
          bluefin.io/vm-ip: "{{inputs.parameters.vm-ip}}"
          bluefin.io/issue: "{{workflow.parameters.issue-title}}"
          bluefin.io/upstream-repo: "{{workflow.parameters.upstream-suite-repo}}"
          bluefin.io/upstream-ref: "{{workflow.parameters.upstream-suite-ref}}"
      inputs:
        parameters:
          - name: vm-ip
          - name: variant
          - name: label
      activeDeadlineSeconds: 5400
      nodeSelector:
        kubernetes.io/hostname: ghost
      podSpecPatch: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext:
          runAsUser: 0
      volumes:
        - name: ssh-key
          secret:
            secretName: "{{workflow.parameters.ssh-key-secret}}"
            defaultMode: 0400
        - name: workspace
          emptyDir: {}
      initContainers:
        - name: git-sync
          image: quay.io/fedora/fedora:latest
          env:
            - name: UPSTREAM_REPO
              value: "{{workflow.parameters.upstream-suite-repo}}"
            - name: UPSTREAM_REF
              value: "{{workflow.parameters.upstream-suite-ref}}"
          command: [bash, -c]
          args:
            - |
              set -euo pipefail
              for attempt in 1 2 3; do
                rm -rf /workspace/upstream-suite
                dnf install -y --quiet git 2>&1 | tail -2
                if git clone --depth 1 --branch "${UPSTREAM_REF}" \
                    "${UPSTREAM_REPO}" /workspace/upstream-suite 2>&1; then
                  echo "Synced upstream suite @ ${UPSTREAM_REF} (attempt ${attempt})"
                  exit 0
                fi
                rm -rf /workspace/upstream-suite
                if git clone "${UPSTREAM_REPO}" /workspace/upstream-suite 2>&1 && \
                   git -C /workspace/upstream-suite checkout "${UPSTREAM_REF}" 2>&1; then
                  echo "Synced upstream suite @ ${UPSTREAM_REF} via SHA fallback (attempt ${attempt})"
                  exit 0
                fi
                echo "Attempt ${attempt} failed, retrying in 15s..."
                sleep 15
              done
              exit 1
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      container:
        image: quay.io/fedora/fedora:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        env:
          - name: VM_IP
            value: "{{inputs.parameters.vm-ip}}"
          - name: VM_USER
            value: "{{workflow.parameters.ssh-user}}"
          - name: VARIANT
            value: "{{inputs.parameters.variant}}"
          - name: LABEL
            value: "{{inputs.parameters.label}}"
        volumeMounts:
          - name: ssh-key
            mountPath: /etc/ssh/test-key
            readOnly: true
          - name: workspace
            mountPath: /workspace
            readOnly: true
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            mkdir -p /tmp/results
            LOG=/tmp/results/runner.log
            exec > >(tee -a "$LOG") 2>&1

            if ! command -v ssh &>/dev/null; then
              dnf install -y --quiet openssh-clients rsync 2>&1 | tail -3
            fi

            SSH_OPTS="-i /etc/ssh/test-key/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o LogLevel=ERROR"
            SSH="ssh ${SSH_OPTS} ${VM_USER}@${VM_IP}"
            SCP="scp ${SSH_OPTS} -r"

            echo "Waiting for SSH on ${LABEL} (${VM_IP})..." >&2
            timeout 600 bash -c "
              until ${SSH} 'echo ready' 2>/dev/null; do sleep 10; done
            "
            echo "SSH ready." >&2

            ${SSH} "
              set -euo pipefail
              verify_upstream_dependencies() {
                local ok=0
                if ! python3 -c 'import qecore, behave, dogtail, pytest' 2>/dev/null; then
                  echo 'ERROR: Missing required Python modules (qecore, behave, dogtail, pytest).' >&2
                  ok=1
                fi
                if ! rpm -q gnome-ponytail-daemon python3-gnome-ponytail-daemon gnome-terminal gedit &>/dev/null; then
                  echo 'ERROR: Missing required RPMs for upstream GNOME Terminal suite.' >&2
                  ok=1
                fi
                if ! command -v gnome-terminal &>/dev/null; then
                  echo 'ERROR: gnome-terminal is not available in PATH after install.' >&2
                  ok=1
                fi
                if ! command -v gedit &>/dev/null; then
                  echo 'ERROR: gedit is not available in PATH after install.' >&2
                  ok=1
                fi
                if [[ ! -x \"\$HOME/.local/bin/qecore-headless\" ]]; then
                  echo 'ERROR: qecore-headless is missing from \$HOME/.local/bin.' >&2
                  ok=1
                fi
                return \${ok}
              }
              if verify_upstream_dependencies; then
                echo 'Upstream GNOME Terminal dependencies already installed, skipping.' >&2
              else
                echo 'Installing upstream GNOME Terminal dependencies...' >&2
                sudo ostree admin unlock 2>/dev/null || true
                sudo dnf install -y --quiet gnome-ponytail-daemon python3-gnome-ponytail-daemon gnome-terminal gedit 2>&1 | tail -3
                pip3 --version &>/dev/null || python3 -m ensurepip --user 2>&1 | tail -2
                python3 -m pip install --quiet --user qecore==3.24 behave==1.2.6 dogtail pytest python-uinput behave-html-pretty-formatter 2>&1 | tail -3
                for f in \$HOME/.local/bin/qecore_*; do sudo ln -sf \"\$f\" /usr/local/bin/\$(basename \"\$f\") 2>/dev/null; done
                sudo mkdir -p /home
                sudo ln -sfn \"\$HOME\" /home/test
                mkdir -p \"\$HOME/Videos\"
                if ! verify_upstream_dependencies; then
                  echo 'ERROR: Upstream GNOME Terminal dependency verification failed after install.' >&2
                  exit 1
                fi
              fi
              sudo modprobe uinput 2>/dev/null || true
              sudo chmod 0666 /dev/uinput 2>/dev/null || true
              sudo chcon -t uinput_device_t /dev/uinput 2>/dev/null || true
            "
            echo "Dependencies ready." >&2

            echo "Copying upstream GNOME Terminal suite to VM..." >&2
            ${SSH} "rm -rf /tmp/upstream-tests && mkdir -p /tmp/upstream-tests /tmp/results"
            ${SCP} /workspace/upstream-suite/. ${VM_USER}@${VM_IP}:/tmp/upstream-tests/
            cat > /tmp/patch-upstream-env.py <<'PY'
            from pathlib import Path
            path = Path('/tmp/upstream-tests/features/environment.py')
            text = path.read_text()
            if 'import subprocess' not in text:
                text = 'import re\nimport subprocess\nfrom time import sleep\n' + text
            text = text.replace('a11y_app_name=\"gnome-terminal-server\"', 'a11y_app_name=\"org.gnome.Terminal\"')
            text = text.replace('a11y_app_name=\"gnome-terminal-preferences\"', 'a11y_app_name=\"org.gnome.Terminal.Preferences\"')
            ponytail_block = (
                "from dogtail import rawinput as dt_rawinput\n"
                "from dogtail import tree as dt_tree\n"
                "from dogtail.config import config as dogtail_config\n"
                "from dogtail.accessibles.accessible_component import AccessibleComponent as DTAccessibleComponent\n"
                "from dogtail.ponytail_helper import ponytail_helper as dt_ponytail_helper\n"
                "from gi.repository import Atspi\n\n"
                "from qecore.application import Application as QEApplication\n\n"
                "_testing_lab_original_get_size = DTAccessibleComponent.get_size\n"
                "_testing_lab_original_click = dt_rawinput.click\n\n"
                "def _testing_lab_qecore_get_root(app):\n"
                "    from dogtail.tree import root as dt_root\n"
                "    applications = dt_root.applications()\n"
                "    for candidate in applications:\n"
                "        if candidate.name == app.a11y_app_name:\n"
                "            return candidate\n"
                "    raise RuntimeError(f\"Application '{app.a11y_app_name}' was not found in application tree: {[x.name for x in applications]}\")\n\n"
                "def _testing_lab_force_monitor_connection(window_id=None, input_source=\"mouse\"):\n"
                "    ponytail_interface = dt_ponytail_helper.get_ponytail_interface()\n"
                "    try:\n"
                "        if ponytail_interface.connected is not None and not isinstance(ponytail_interface.connected, str):\n"
                "            ponytail_interface.disconnect()\n"
                "            sleep(0.2)\n"
                "    except Exception:\n"
                "        pass\n"
                "    if ponytail_interface.connected is None:\n"
                "        ponytail_interface.connectMonitor()\n\n"
                "def _testing_lab_click(x, y, button=1, check=True, window_id=None):\n"
                "    if dt_rawinput.SESSION_TYPE == \"x11\":\n"
                "        return _testing_lab_original_click(x, y, button=button, check=check, window_id=window_id)\n"
                "    (_x, _y) = dt_rawinput.update_coords((x, y))\n"
                "    if check:\n"
                "        dt_rawinput.check_coordinates(_x, _y)\n"
                "    _testing_lab_force_monitor_connection(window_id=\"\", input_source=\"mouse\")\n"
                "    dt_ponytail_helper.get_ponytail_interface().generateButtonEvent(button, _x, _y)\n"
                "    dt_rawinput.do_delay(dt_rawinput.config.action_delay)\n\n"
                "def _testing_lab_get_size(acc_object):\n"
                "    try:\n"
                "        return _testing_lab_original_get_size(acc_object)\n"
                "    except Exception as exc:\n"
                "        if \"GetWindows is not allowed\" not in str(exc):\n"
                "            raise\n"
                "        if dt_tree.AccessibleObject.is_newton(acc_object):\n"
                "            atspi_point = acc_object.get_size()\n"
                "        else:\n"
                "            atspi_point = Atspi.Component.get_size(acc_object)\n"
                "        return (atspi_point.x, atspi_point.y)\n\n"
                "dt_ponytail_helper.ponytail_check_connection = _testing_lab_force_monitor_connection\n"
                "dt_ponytail_helper.get_window_id = lambda accessible_object: \"\"\n"
                "dt_ponytail_helper.get_window_has_focus = lambda: True\n"
                "dt_rawinput.click = _testing_lab_click\n"
                "dt_tree.click = _testing_lab_click\n"
                "dt_tree.Node.window_id = property(lambda self: \"\")\n"
                "dt_tree.Node.window_has_focus = property(lambda self: True)\n"
                "DTAccessibleComponent.get_size = staticmethod(_testing_lab_get_size)\n"
                "QEApplication.get_root = _testing_lab_qecore_get_root\n"
            )
            if 'dt_ponytail_helper.ponytail_check_connection = _testing_lab_force_monitor_connection' not in text:
                text = text.replace('from qecore.utility import run\n', 'from qecore.utility import run\n' + ponytail_block + '\n')
            before_all_old = '''    try:
                    context.sandbox = TestSandbox("gnome-terminal", context=context)
            '''
            before_all_new = '''    try:
                    result = subprocess.run([
                        "gdbus",
                        "call",
                        "--session",
                        "--dest",
                        "org.gnome.Shell",
                        "--object-path",
                        "/org/gnome/Shell",
                        "--method",
                        "org.gnome.Shell.Eval",
                        "global.context.unsafe_mode = true",
                    ], capture_output=True, text=True, timeout=5)
                    if result.returncode != 0:
                        stderr = result.stderr.strip() or result.stdout.strip() or "unknown gdbus failure"
                        raise RuntimeError(f"unsafe_mode enable failed: {stderr[:200]}")
                    dogtail_config.searchShowingOnly = True
                    context.sandbox = TestSandbox("gnome-terminal", context=context)
                    context.sandbox.production = False
            '''
            text = text.replace(before_all_old, before_all_new)
            text = text.replace(
                '    run("dconf reset /org/gtk/Settings/Debug/enable-inspector-keybinding")\n',
                '    run("dconf reset /org/gtk/Settings/Debug/enable-inspector-keybinding")\n'
                '    run("dconf write /org/gnome/terminal/legacy/default-show-menubar true")\n',
            )
            path.write_text(text)
            steps_path = Path('/tmp/upstream-tests/features/steps/steps.py')
            steps_text = steps_path.read_text()
            helper_anchor = 'LOGGING = Logging()\n'
            helper_block = (
                'LOGGING = Logging()\n\n'
                'def _testing_lab_terminal_widgets(context):\n'
                '    widgets = context.terminal.instance.findChildren(\n'
                '        lambda x: x.roleName == "terminal" and x.showing\n'
                '    )\n'
                '    if widgets:\n'
                '        return widgets\n'
                '    return context.terminal.instance.findChildren(\n'
                '        lambda x: x.roleName == "terminal"\n'
                '    )\n\n'
                'def _testing_lab_terminal_text(context):\n'
                '    widgets = [x for x in _testing_lab_terminal_widgets(context) if getattr(x, "focused", False)]\n'
                '    if not widgets:\n'
                '        widgets = _testing_lab_terminal_widgets(context)\n'
                '    if not widgets:\n'
                '        _testing_lab_log_terminal_tree(context, "no terminal widget")\n'
                '    assert widgets, "No terminal widget found in accessibility tree."\n'
                '    text = getattr(widgets[0], "text", "")\n'
                '    return text if text is not None else ""\n\n'
                'def _testing_lab_dump_visible_tree(node, depth=0, max_depth=2, max_children=25):\n'
                '    if node is None or depth > max_depth:\n'
                '        return []\n'
                '    children = list(getattr(node, "children", []) or [])\n'
                '    lines = []\n'
                '    for child in children[:max_children]:\n'
                '        lines.append(\n'
                '            f"{\'  \' * depth}- role={getattr(child, \'roleName\', None)!r} name={getattr(child, \'name\', None)!r} showing={getattr(child, \'showing\', None)!r} visible={getattr(child, \'visible\', None)!r} selected={getattr(child, \'selected\', None)!r}"\n'
                '        )\n'
                '        lines.extend(_testing_lab_dump_visible_tree(child, depth + 1, max_depth, max_children))\n'
                '    return lines\n\n'
                'def _testing_lab_log_terminal_tree(context, reason):\n'
                '    print(f"TESTING_LAB_A11Y_TREE_BEGIN reason={reason}")\n'
                '    try:\n'
                '        for line in _testing_lab_dump_visible_tree(context.terminal.instance):\n'
                '            print(line)\n'
                '    except Exception as exc:\n'
                '        print(f"TESTING_LAB_A11Y_TREE_ERROR {exc}")\n'
                '    print("TESTING_LAB_A11Y_TREE_END")\n'
            )
            if 'def _testing_lab_terminal_widgets(context):' not in steps_text:
                steps_text = steps_text.replace(helper_anchor, helper_block)
            menubar_old = (
                '@step("Make sure Menubar is showing")\n'
                'def make_sure_menubar_is_showing(context) -> None:\n'
                '    """\n'
                '    Make sure Menubar is showing.\n'
                '\n'
                '    :param context: Holds contextual information during the running of tests.\n'
                '    :type context: <behave.runner.Context>\n'
                '    """\n'
                '\n'
                '    menubar = context.terminal.instance.child(roleName="menu bar")\n'
                '    for _ in range(10):\n'
                '        if not (menubar.showing and menubar.visible):\n'
                '            terminal_frame = context.terminal.instance.child(roleName="frame")\n'
                '            sleep(1)\n'
                '            terminal_frame.click(3)\n'
                '            try:\n'
                '                context.execute_steps(\n'
                '                    \'* Left click "Show Menubar" "check menu item" in "terminal"\'\n'
                '                )\n'
                '            except Exception:  # pylint: disable=broad-except\n'
                '                pressKey("Esc")\n'
            )
            menubar_new = (
                '@step("Make sure Menubar is showing")\n'
                'def make_sure_menubar_is_showing(context) -> None:\n'
                '    """\n'
                '    Make sure Menubar is showing.\n'
                '\n'
                '    :param context: Holds contextual information during the running of tests.\n'
                '    :type context: <behave.runner.Context>\n'
                '    """\n'
                '\n'
                '    for _ in range(10):\n'
                '        menubars = context.terminal.instance.findChildren(\n'
                '            lambda x: x.roleName == "menu bar" and x.showing\n'
                '        )\n'
                '        if menubars:\n'
                '            return\n'
                '        terminal_frames = context.terminal.instance.findChildren(\n'
                '            lambda x: x.roleName == "frame" and x.showing\n'
                '        )\n'
                '        if not terminal_frames:\n'
                '            sleep(1)\n'
                '            continue\n'
                '        sleep(1)\n'
                '        terminal_frames[0].click(3)\n'
                '        try:\n'
                '            context.execute_steps(\n'
                '                \'* Left click "Show Menubar" "check menu item" in "terminal"\'\n'
                '            )\n'
                '        except Exception:  # pylint: disable=broad-except\n'
                '            pressKey("Esc")\n'
                '\n'
                '    _testing_lab_log_terminal_tree(context, "menubar unavailable")\n'
                '    return\n'
            )
            steps_text = steps_text.replace(menubar_old, menubar_new)
            terminal_contains_old = (
                '@step(\'Terminal contains string "{tested_string}"\')\n'
                'def terminal_contains_string(context, tested_string) -> None:\n'
                '    """\n'
                '    Verify that the terminal contains given string.\n'
                '\n'
                '    :param context: Holds contextual information during the running of tests.\n'
                '    :type context: <behave.runner.Context>\n'
                '\n'
                '    :param tested_string: String to be compared against.\n'
                '    :type tested_string: str\n'
                '    """\n'
                '\n'
                '    text_in_terminal = context.terminal.instance.findChild(\n'
                '        lambda x: x.name == "Terminal" and x.roleName == "terminal" and x.focused\n'
                '    ).text\n'
                '\n'
                '    assert tested_string in text_in_terminal, "".join(\n'
                '        (\n'
                '            f"\\nExpected string:\\n \'{tested_string}\'",\n'
                '            f"\\nFound string   :\\n \'{text_in_terminal}\'",\n'
                '        )\n'
                '    )\n'
            )
            terminal_contains_new = (
                '@step(\'Terminal contains string "{tested_string}"\')\n'
                'def terminal_contains_string(context, tested_string) -> None:\n'
                '    """\n'
                '    Verify that the terminal contains given string.\n'
                '\n'
                '    :param context: Holds contextual information during the running of tests.\n'
                '    :type context: <behave.runner.Context>\n'
                '\n'
                '    :param tested_string: String to be compared against.\n'
                '    :type tested_string: str\n'
                '    """\n'
                '\n'
                '    text_in_terminal = _testing_lab_terminal_text(context)\n'
                '\n'
                '    assert tested_string in text_in_terminal, "".join(\n'
                '        (\n'
                '            f"\\nExpected string:\\n \'{tested_string}\'",\n'
                '            f"\\nFound string   :\\n \'{text_in_terminal}\'",\n'
                '        )\n'
                '    )\n'
            )
            steps_text = steps_text.replace(terminal_contains_old, terminal_contains_new)
            terminal_not_old = (
                '@step(\'Terminal does not contain string "{tested_string}"\')\n'
                'def terminal_does_not_contain_string(context, tested_string) -> None:\n'
                '    """\n'
                '    Verify that the terminal does not contain given string.\n'
                '\n'
                '    :param context: Holds contextual information during the running of tests.\n'
                '    :type context: <behave.runner.Context>\n'
                '\n'
                '    :param tested_string: String to be compared against.\n'
                '    :type tested_string: str\n'
                '    """\n'
                '\n'
                '    terminal = context.terminal.instance.findChild(\n'
                '        lambda x: x.name == "Terminal" and x.roleName == "terminal" and x.focused\n'
                '    ).text\n'
                '\n'
                '    assert (\n'
                '        tested_string not in terminal\n'
                '    ), "String was found. Indication of test failure."\n'
            )
            terminal_not_new = (
                '@step(\'Terminal does not contain string "{tested_string}"\')\n'
                'def terminal_does_not_contain_string(context, tested_string) -> None:\n'
                '    """\n'
                '    Verify that the terminal does not contain given string.\n'
                '\n'
                '    :param context: Holds contextual information during the running of tests.\n'
