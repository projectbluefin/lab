              \$HOME/.local/bin/qecore-headless \
                --session-type wayland \
                --session-desktop gnome \
                \"bash /tmp/upstream-tests/run-upstream-suite.sh\" \
                || exit \$?
            " || TEST_RC=$?

            echo "Collecting results..." >&2
            ${SCP} ${VM_USER}@${VM_IP}:/tmp/results/. /tmp/results/ || true

            if [[ -f /tmp/results/results.json ]]; then
              python -c "import json; data=json.load(open('/tmp/results/results.json')); failed=sum(1 for f in data for s in f.get('elements', []) if s.get('status') == 'failed'); total=sum(len(f.get('elements', [])) for f in data); print(f'Upstream GNOME Terminal suite: {total - failed}/{total} behave scenarios passed')" || true
              cat /tmp/results/results.json >&2
            fi

            exit ${TEST_RC}
