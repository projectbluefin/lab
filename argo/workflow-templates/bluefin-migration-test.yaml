        python3 - <<'PY'
        import json
        import os
        import subprocess
        import sys

        vm_ip = os.environ["VM_IP"]
        vm_user = os.environ["SSH_USER"]
        key = os.environ["SSH_KEY"]
        storage_variant = os.environ["STORAGE_VARIANT"]
        step = os.environ["STEP"]
        expected_image = os.environ.get("EXPECTED_IMAGE", "")
        output_root = os.environ["OUTPUT_ROOT"]

        ssh_base = [
            "ssh", "-i", key,
            "-o", "StrictHostKeyChecking=no",
            "-o", "UserKnownHostsFile=/dev/null",
            "-o", "ConnectTimeout=10",
            "-o", "LogLevel=ERROR",
            f"{vm_user}@{vm_ip}",
        ]

        result = subprocess.run(ssh_base + ["cat", f"{output_root}/{step}.json"], text=True, capture_output=True)
        if result.returncode != 0:
            print(result.stderr.rstrip(), file=sys.stderr)
            sys.exit(result.returncode)

        payload = json.loads(result.stdout)
        checks = payload.get("checks", {})
        failures = []
        if not payload.get("step_pass"):
            failures.append("step_pass=false")
        if expected_image and not checks.get("expected_image", {}).get("pass"):
            failures.append(f"expected image mismatch: {checks.get('expected_image', {}).get('actual', '')}")
        if not checks.get("services", {}).get("pass"):
            failures.append("services unhealthy")
        if not checks.get("group_sync", {}).get("pass"):
            failures.append("group/gshadow mismatch")
        if storage_variant == "experimental-unified-storage" and not checks.get("storage_backend", {}).get("pass"):
            failures.append("experimental unified storage not detected")

        if failures:
            print(json.dumps(payload, indent=2))
            print("Verification failures: " + ", ".join(failures), file=sys.stderr)
            sys.exit(1)

        print(
            f"Verified {step}: active_image={payload.get('active_image', '')} "
            f"storage={storage_variant} services={checks.get('services', {}).get('states', [])} "
            f"group_count={checks.get('group_sync', {}).get('group_count')}"
        )
