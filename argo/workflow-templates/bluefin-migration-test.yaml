    name: collect-evidence
    script:
      command:
      - bash
      image: ghcr.io/projectbluefin/lab-runner:latest
      resources:
        limits:
          cpu: '1'
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 256Mi
      source: |
        exec bash <<'SCRIPT_EOF'
        set -euo pipefail
        if ! command -v ssh >/dev/null 2>&1; then
        fi

        export VM_IP="{{inputs.parameters.vm-ip}}"
        export SSH_USER="{{inputs.parameters.ssh-user}}"
        export SSH_KEY="/etc/ssh/test-key/id_ed25519"
        export STORAGE_VARIANT="{{inputs.parameters.storage-variant}}"
        export STEP="{{inputs.parameters.step}}"
        export EXPECTED_IMAGE="{{inputs.parameters.expected-image}}"
        export OUTPUT_ROOT="{{inputs.parameters.output-root}}"
        export AGGREGATE_PATH="{{inputs.parameters.aggregate-path}}"

        python3 - <<'PY'
        import json
        import os
        import pathlib
        import subprocess
        import sys

        vm_ip = os.environ["VM_IP"]
        vm_user = os.environ["SSH_USER"]
        key = os.environ["SSH_KEY"]
        storage_variant = os.environ["STORAGE_VARIANT"]
        step = os.environ["STEP"]
        expected_image = os.environ.get("EXPECTED_IMAGE", "")
        output_root = os.environ["OUTPUT_ROOT"]
        aggregate_path = os.environ["AGGREGATE_PATH"]

        ssh_base = [
            "ssh", "-i", key,
            "-o", "StrictHostKeyChecking=no",
            "-o", "UserKnownHostsFile=/dev/null",
            "-o", "ConnectTimeout=10",
            "-o", "LogLevel=ERROR",
            f"{vm_user}@{vm_ip}",
        ]
        scp_base = [
            "scp", "-i", key,
            "-o", "StrictHostKeyChecking=no",
            "-o", "UserKnownHostsFile=/dev/null",
            "-o", "ConnectTimeout=10",
            "-o", "LogLevel=ERROR",
        ]

        def run_remote(command: str) -> subprocess.CompletedProcess:
            return subprocess.run(ssh_base + ["bash", "-lc", command], text=True, capture_output=True)

        def capture(command: str):
            result = run_remote(command)
            return {
                "command": command,
                "rc": result.returncode,
                "stdout": result.stdout.rstrip(),
                "stderr": result.stderr.rstrip(),
            }

        def parse_json(text: str):
            try:
                return json.loads(text) if text else None
            except json.JSONDecodeError:
                return None

        def parse_int(text: str):
            try:
                return int((text or "").strip())
            except ValueError:
                return None

        def get_active_image(data):
            if not isinstance(data, dict):
                return ""
            booted = data.get("status", {}).get("booted", {})
            image = booted.get("image") or {}
            nested = image.get("image") if isinstance(image, dict) else None
            candidates = []
            if isinstance(nested, dict):
                candidates.append(nested.get("image"))
            if isinstance(image, dict):
                candidates.append(image.get("image"))
            candidates.append(booted.get("imageReference"))
            for candidate in candidates:
                if isinstance(candidate, str) and candidate:
                    return candidate
            return ""

        subprocess.run(ssh_base + ["mkdir", "-p", output_root], check=True, text=True)

        results = {
            "bootc_status_json": capture("sudo bootc status --json"),
            "ostree_admin_status": capture("sudo ostree admin status"),
            "bootc_package": capture("rpm -q bootc"),
            "journal_errors": capture("sudo journalctl -b -p err --no-pager -n 50"),
            "rechunker_group_fix": capture("if systemctl list-unit-files rechunker-group-fix.service --no-legend 2>/dev/null | grep -q '^rechunker-group-fix.service'; then sudo journalctl -b -u rechunker-group-fix --no-pager; else echo '__SERVICE_NOT_PRESENT__'; fi"),
            "group_count": capture("getent group | wc -l"),
            "gshadow_count": capture("sudo cat /etc/gshadow | wc -l"),
            "service_health": capture("systemctl is-active gdm sshd"),
            "loginctl_status": capture("loginctl status || loginctl list-sessions"),
            "storage_info": capture("if [ -e /usr/lib/bootc/storage ]; then ls -ld /usr/lib/bootc/storage; readlink -f /usr/lib/bootc/storage || true; du -sh /usr/lib/bootc/storage 2>/dev/null || true; else echo '__BOOTC_STORAGE_MISSING__'; fi"),
          }

        bootc_data = None
        if results["bootc_status_json"]["rc"] == 0:
            bootc_data = parse_json(results["bootc_status_json"]["stdout"])

        active_image = get_active_image(bootc_data)
        group_count = parse_int(results["group_count"]["stdout"])
        gshadow_count = parse_int(results["gshadow_count"]["stdout"])
        service_states = [line.strip() for line in results["service_health"]["stdout"].splitlines() if line.strip()]
        storage_missing = "__BOOTC_STORAGE_MISSING__" in results["storage_info"]["stdout"]

        checks = {
            "bootc_status": {
                "pass": results["bootc_status_json"]["rc"] == 0 and bootc_data is not None,
            },
            "ostree_admin_status": {
                "pass": results["ostree_admin_status"]["rc"] == 0,
            },
            "bootc_package": {
                "pass": results["bootc_package"]["rc"] == 0,
                "package": results["bootc_package"]["stdout"],
            },
            "group_sync": {
                "pass": group_count is not None and gshadow_count is not None and group_count == gshadow_count,
                "group_count": group_count,
                "gshadow_count": gshadow_count,
            },
            "services": {
                "pass": bool(service_states) and all(state == "active" for state in service_states),
                "states": service_states,
            },
            "expected_image": {
                "pass": True if not expected_image else expected_image in active_image,
                "expected": expected_image,
                "actual": active_image,
            },
            "loginctl": {
                "pass": results["loginctl_status"]["rc"] == 0,
            },
            "storage_backend": {
                "pass": True if storage_variant == "default" else not storage_missing,
                "variant": storage_variant,
                "missing": storage_missing,
            },
        }

        step_pass = all(
            checks[name]["pass"]
            for name in ("bootc_status", "ostree_admin_status", "bootc_package", "group_sync", "services", "expected_image", "storage_backend")
        )

        payload = {
            "step": step,
            "vm_ip": vm_ip,
            "storage_variant": storage_variant,
            "expected_image": expected_image,
            "active_image": active_image,
            "step_pass": step_pass,
            "checks": checks,
            "bootc_status": bootc_data,
            "commands": results,
        }

        step_file = pathlib.Path(f"{step}.json")
        step_file.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
        subprocess.run(scp_base + [str(step_file), f"{vm_user}@{vm_ip}:{output_root}/{step}.json"], check=True, text=True)

        aggregate_file = pathlib.Path("migration-evidence.json")
        fetch = subprocess.run(scp_base + [f"{vm_user}@{vm_ip}:{aggregate_path}", str(aggregate_file)], text=True, capture_output=True)
        aggregate = []
        if fetch.returncode == 0:
            try:
                loaded = json.loads(aggregate_file.read_text(encoding="utf-8"))
                if isinstance(loaded, list):
                    aggregate = loaded
            except Exception:
                aggregate = []
        aggregate = [item for item in aggregate if not (isinstance(item, dict) and item.get("step") == step)]
        aggregate.append(payload)
        aggregate_file.write_text(json.dumps(aggregate, indent=2) + "\n", encoding="utf-8")
        subprocess.run(scp_base + [str(aggregate_file), f"{vm_user}@{vm_ip}:{aggregate_path}"], check=True, text=True)

        print(f"=== {step} evidence ({storage_variant}) ({vm_ip}) ===")
        print(json.dumps(payload, indent=2))
        sys.exit(0 if step_pass else 1)
        PY
