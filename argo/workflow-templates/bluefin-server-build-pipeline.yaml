apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bluefin-server-build-pipeline
  namespace: argo
  annotations:
    description: |
      In-cluster BuildStream build pipeline for Bluefin Server.
      Builds oci/bluefin-server-ddi.bst and oci/bluefin-server-installer.bst
      and publishes them to the local Zot registry (:30500).
      Triggered on git changes or manual on-demand submission.
  labels:
    app.kubernetes.io/component: bluefin-server-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  activeDeadlineSeconds: 14400   # 4 hours (compiles FSDK kernel and elements)

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/projectbluefin/server.git"
      - name: ref
        value: "main"
      - name: registry
        value: "192.168.1.102:30500"
      - name: build-mode
        value: "re"

  entrypoint: build

  templates:

    - name: build
      synchronization:
        semaphores:
        - configMapKeyRef:
            name: workflow-semaphores
            key: bst-build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
          - name: build-mode
            value: "re"
      dag:
        tasks:
          - name: detect-build-mode
            template: detect-build-mode
            arguments:
              parameters:
                - name: build-mode
                  value: "{{inputs.parameters.build-mode}}"
          - name: build-ddi
            template: run-bst-step
            depends: detect-build-mode
            arguments:
              parameters:
                - name: element
                  value: "oci/bluefin-server-ddi.bst"
                - name: tag
                  value: "bluefin-server-ddi"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"
          - name: build-installer
            template: run-bst-step
            depends: detect-build-mode
            arguments:
              parameters:
                - name: element
                  value: "oci/bluefin-server-installer.bst"
                - name: tag
                  value: "bluefin-server-installer"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"

    - name: detect-build-mode
      inputs:
        parameters:
          - name: build-mode
      outputs:
        parameters:
          - name: mode
            valueFrom:
              path: /tmp/mode
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        source: |
          set -euo pipefail
          REQUESTED="{{inputs.parameters.build-mode}}"
          if [[ "${REQUESTED}" != "re" ]]; then
            echo "Bluefin Server build-mode '${REQUESTED}' is forbidden; only distributed mode ('re') is permitted" >&2
            exit 1
          fi

          MAX_AGE_SECONDS=60
          NOW="$(date -u +%s)"
          for NODE in ghost exo-0; do
            LINK="$(kubectl get node "${NODE}" -o jsonpath='{.metadata.annotations.lab\.projectbluefin\.io/usb4-link}')"
            OBSERVED_AT="$(kubectl get node "${NODE}" -o jsonpath='{.metadata.annotations.lab\.projectbluefin\.io/usb4-link-observed-at}')"
            READY="$(kubectl get node "${NODE}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')"

            if [[ "${LINK}" != "up" || ! "${OBSERVED_AT}" =~ ^[0-9]+$ || "${READY}" != "True" ]]; then
              echo "USB4 BuildBarn gate rejected ${NODE}: link=${LINK:-missing} observed-at=${OBSERVED_AT:-missing} ready=${READY:-unknown}" >&2
              exit 1
            fi
            if (( NOW - OBSERVED_AT > MAX_AGE_SECONDS )); then
              echo "USB4 BuildBarn gate rejected ${NODE}: observation is stale ($((NOW - OBSERVED_AT))s old)" >&2
              exit 1
            fi
          done

          WORKERS="$(kubectl get pods -n buildbarn -l app=worker -o jsonpath='{range .items[*]}{.spec.nodeName}{"|"}{.status.phase}{"|"}{.status.containerStatuses[*].ready}{"\n"}{end}')"
          for NODE in ghost exo-0; do
            if ! grep -Eq "^${NODE}\|Running\|true true$" <<<"${WORKERS}"; then
              echo "USB4 BuildBarn gate rejected: no Ready worker on ${NODE}" >&2
              exit 1
            fi
          done

          echo "USB4-backed BuildBarn remote execution admitted"
          printf '%s' re > /tmp/mode

    - name: run-bst-step
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      dag:
        tasks:
          - name: bst-re
            template: bst-build-re
            when: "{{=inputs.parameters.mode == 're'}}"
            arguments:
              parameters:
                - name: element
                  value: "{{inputs.parameters.element}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{inputs.parameters.mode}}"
    - name: bst-build-re
      priorityClassName: bst-build
      activeDeadlineSeconds: 5400
      retryStrategy:
        limit: "2"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: local-path
                resources:
                  requests:
                    storage: 200Gi
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
              - key: remote-execution.conf
                path: remote-execution.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning bluefin-server @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 --branch "${REF}" "https://x-access-token:${GITHUB_TOKEN}@${REPO#https://}" /src
          cd /src
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')

          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          REMOTE_EXECUTION_SERVICE="grpc://frontend.buildbarn.svc.cluster.local:8980"
          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: true
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
              source-caches:
                override-project-caches: false
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
          EOF

          # Every retry remains distributed; coordinator-local builds are forbidden.
          echo "=== Distributed build: remote execution enabled ==="
          sed 's/^/    /' /etc/buildstream/remote-execution.conf >> /tmp/buildstream-cluster.conf

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          if [ -f "${EXPORT_DIR}/index.json" ] && [ -f "${EXPORT_DIR}/oci-layout" ]; then
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
            podman rmi "${IMAGE_ID}" 2>/dev/null || true
          else
            echo "Export is not an OCI layout — wrapping raw files in a scratch OCI image"
            cat <<EOF > "${EXPORT_DIR}/Containerfile"
          FROM scratch
          COPY . /
          EOF
            podman build --tls-verify=false -t "localhost/${TAG}:latest" -f "${EXPORT_DIR}/Containerfile" "${EXPORT_DIR}"
            podman push --tls-verify=false "localhost/${TAG}:latest" "docker://{{inputs.parameters.registry}}/${TAG}:latest"
            podman rmi "localhost/${TAG}:latest" 2>/dev/null || true
          fi

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="
