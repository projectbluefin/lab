apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: bst-qa-pipeline
  namespace: argo
  annotations:
    description: |
      BuildStream QA pipeline for the bst-prototype project.
      Installs buildstream via pip in a chainguard/python container, stages
      bst-prototype/ from this repo, configures the in-cluster artifact
      cache (bst-artifact-server:9092 via gRPC) for push/pull, points
      remote-execution at the in-cluster Buildbarn frontend
      (buildbarn/frontend:8980, distributed across ghost+exo-0 workers),
      and builds hello.bst.
  labels:
    app.kubernetes.io/component: bst-qa
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  activeDeadlineSeconds: 1800   # 30 minutes

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/projectbluefin/lab.git"
      - name: ref
        value: "main"
      - name: project-subdir
        value: "bst-prototype"
      - name: element
        value: "hello.bst"
      - name: artifact-server
        value: "grpc://bst-artifact-server:9092"
      - name: remote-execution-service
        value: "http://frontend.buildbarn.svc.cluster.local:8980"

  entrypoint: build

  templates:

    - name: build
      inputs:
        parameters:
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: project-subdir
            value: "{{workflow.parameters.project-subdir}}"
          - name: element
            value: "{{workflow.parameters.element}}"
          - name: artifact-server
            value: "{{workflow.parameters.artifact-server}}"
          - name: remote-execution-service
            value: "{{workflow.parameters.remote-execution-service}}"
      volumes:
        - name: workdir
          emptyDir: {}
      script:
        image: 192.168.1.102:30500/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d
        command: [bash]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
          - name: workdir
            mountPath: /work
        env:
          - name: REPO
            value: "{{inputs.parameters.repo}}"
          - name: REF
            value: "{{inputs.parameters.ref}}"
          - name: PROJECT_SUBDIR
            value: "{{inputs.parameters.project-subdir}}"
          - name: ELEMENT
            value: "{{inputs.parameters.element}}"
          - name: ARTIFACT_SERVER
            value: "{{inputs.parameters.artifact-server}}"
          - name: REMOTE_EXECUTION_SERVICE
            value: "{{inputs.parameters.remote-execution-service}}"
        source: |
          set -euo pipefail

          echo "=== Staging ${PROJECT_SUBDIR} from ${REPO}@${REF} ==="
          cd /work
          git clone --depth=1 --branch "${REF}" --filter=blob:none --sparse "${REPO}" src
          cd src
          git sparse-checkout set "${PROJECT_SUBDIR}"
          cd "${PROJECT_SUBDIR}"

          echo "=== Configuring .config/buildstream.conf (artifact cache: ${ARTIFACT_SERVER}, remote-execution: ${REMOTE_EXECUTION_SERVICE}) ==="
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')
          mkdir -p "${HOME}/.config"
          {
            echo "projects:"
            echo "  ${PROJECT_NAME}:"
            echo "    artifacts:"
            echo "      servers:"
            echo "      - url: ${ARTIFACT_SERVER}"
            echo "        push: true"
            # Buildbarn frontend serves CAS+AC+Execute-forwarding on a single
            # port; storage-service and action-cache-service both point at it.
            echo "remote-execution:"
            echo "  execution-service:"
            echo "    url: ${REMOTE_EXECUTION_SERVICE}"
            echo "  storage-service:"
            echo "    url: ${REMOTE_EXECUTION_SERVICE}"
            echo "  action-cache-service:"
            echo "    url: ${REMOTE_EXECUTION_SERVICE}"
          } > "${HOME}/.config/buildstream.conf"

          echo "=== Building ${ELEMENT} ==="
          bst --no-interactive build "${ELEMENT}"

          echo "=== Verifying build result ==="
          bst --no-interactive show --format '%{state}' "${ELEMENT}" | grep -qx cached \
            && echo "✔ ${ELEMENT} built and cached successfully" \
            || (echo "✘ ${ELEMENT} did not reach cached state" >&2; exit 1)
