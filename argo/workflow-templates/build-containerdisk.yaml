apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-containerdisk
  namespace: argo
  annotations:
    description: |
      Build a KubeVirt containerDisk from a bootc image.
      Flow: check (zot existence) → install-to-disk → convert-and-push
      Replaces bib-build-and-push + golden-disk hostDisk approach.
      All build steps are pinned to ghost (loop devices + /var/mnt/ghost-data staging).
spec:
  serviceAccountName: argo
  entrypoint: build-containerdisk
  arguments:
    parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "testing"
      - name: containerdisk-tag
        value: "testing"
  templates:

    # ─── Top-level DAG ────────────────────────────────────────────────────────

    - name: build-containerdisk
      inputs:
        parameters:
          - name: image          # e.g. ghcr.io/projectbluefin/bluefin
          - name: image-tag      # e.g. testing, lts-testing
          - name: containerdisk-tag  # tag to push: 192.168.1.102:30500/bluefin-containerdisk:<tag>
      dag:
        tasks:
          - name: check
            template: check
            arguments:
              parameters:
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

          # Skipped when check=exists.
          - name: install-to-disk
            depends: check.Succeeded
            when: "'{{tasks.check.outputs.result}}' != 'exists'"
            template: install-to-disk
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

          # Skipped when check=exists (install-to-disk skipped → this skips too).
          - name: convert-and-push
            depends: install-to-disk.Succeeded
            template: convert-and-push
            arguments:
              parameters:
                - name: image
                  value: "{{inputs.parameters.image}}"
                - name: image-tag
                  value: "{{inputs.parameters.image-tag}}"
                - name: containerdisk-tag
                  value: "{{inputs.parameters.containerdisk-tag}}"

    # ─── check ────────────────────────────────────────────────────────────────
    # Checks whether the containerDisk image already exists in the local Zot registry.
    # Outputs: "exists" | "missing"

    - name: check
      inputs:
        parameters:
          - name: containerdisk-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      script:
        image: quay.io/skopeo/stable:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.containerdisk-tag}}"
          CD_IMAGE="192.168.1.102:30500/bluefin-containerdisk:${TAG}"
          EXISTS=$(skopeo inspect --tls-verify=false --format '{{.Digest}}' \
            "docker://${CD_IMAGE}" 2>/dev/null || echo "")
          if [[ -n "$EXISTS" ]]; then
            echo "exists"
          else
            echo "missing"
          fi

    # ─── install-to-disk ──────────────────────────────────────────────────────
    # Uses podman to run the Bluefin image and invoke bootc install to-disk.
    # This is the supported automation path: bootc needs to run inside a podman
    # container to detect its source image and root filesystem correctly.

    - name: install-to-disk
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: containerdisk-tag
      synchronization:
        mutexes:
          - name: ghost-heavy-compute
            namespace: argo
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: run-udev
          hostPath:
            path: /run/udev
        - name: staging
          hostPath:
            path: /var/mnt/ghost-data/bluefin-cd-build
            type: DirectoryOrCreate
        - name: containers-lib
          hostPath:
            path: /var/mnt/ghost-data/bluefin-cd-build/containers-lib
            type: DirectoryOrCreate
      script:
        image: quay.io/podman/stable:latest
        command: [bash]
        securityContext:
          privileged: true
          runAsUser: 0
          # spc_t (super-privileged container) is required for has_cap_mac_admin() to return true
          # inside the inner podman container. container_t (containerd default for privileged pods)
          # does NOT have capability2 mac_admin in Fedora policy → fsetxattr(security.selinux) EINVAL
          # propagates even with --cap-add=CAP_MAC_ADMIN + --security-opt label=disable.
          # With spc_t on the outer pod, --security-opt label=disable in the inner podman inherits
          # spc_t → has_cap_mac_admin passes both kernel cap + SELinux AVC checks → EINVAL absorbed.
          seLinuxOptions:
            type: spc_t
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "8"
            memory: 16Gi
        env:
          - name: SSH_AUTHORIZED_KEYS
            valueFrom:
              secretKeyRef:
                name: bluefin-test-ssh-key
                key: id_ed25519.pub
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: run-udev
            mountPath: /run/udev
          - name: staging
            mountPath: /mnt/staging
          - name: containers-lib
            mountPath: /var/lib/containers
        source: |
          set -euo pipefail
          TAG="{{inputs.parameters.containerdisk-tag}}"
          IMAGE="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
          STAGING="/mnt/staging/${TAG}"
          DISK="${STAGING}/disk.raw"

          mkdir -p "${STAGING}"

          if [[ -f "${DISK}" ]]; then
            echo "Removing stale disk: ${DISK}"
            losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d
            rm -f "${DISK}"
          fi

          truncate -s 15G "${DISK}"

          # /var/lib/containers is mounted from the ghost SSD hostPath so podman
          # stores image layers on the data disk, not the pod's ephemeral overlay.
          # Per bootc install docs: "-v /var/lib/containers:/var/lib/containers is
          # required in order for the container to access its own underlying image."
          # (bootc-dev/bootc docs/src/bootc-install.md, via-loopback section)
          mkdir -p /etc/containers
          printf '[engine]\ncgroup_manager = "cgroupfs"\n' > /etc/containers/containers.conf

          # Clean stale image data from any previous failed build.
          echo "Cleaning containers storage for fresh pull..."
          rm -rf /var/lib/containers/* 2>/dev/null || true

          # Pull image — lands in /var/lib/containers/storage (ghost SSD).
          podman pull --tls-verify=true "${IMAGE}"

          echo "Starting bootc install (via-loopback)..."
          echo "[OUTER] SSH_AUTHORIZED_KEYS prefix: ${SSH_AUTHORIZED_KEYS:0:30}..."

          # Write key to a staging file for --root-ssh-authorized-keys.
          # bootc install handles root SSH key injection natively; this is the
          # most reliable mechanism (no post-install ostree-etc-merge concerns).
          echo "${SSH_AUTHORIZED_KEYS}" > "${STAGING}/root-ssh-keys"

          # Ref: bootc install docs — use --via-loopback for VM disk creation.
          # Cross-policy fsetxattr(security.selinux) EINVAL fix:
          # The kernel's selinux_inode_setxattr hook validates label types against the
          # host's in-memory policy. When building bluefin-lts on a bluefin host, the lts
          # image may contain label types absent from the host policy → EINVAL.
          # Cross-policy fsetxattr(security.selinux) EINVAL root cause (confirmed via kernel source):
          # selinux_inode_setxattr calls has_cap_mac_admin() which requires BOTH:
          #   1. cap_capable(cred, &init_user_ns, CAP_MAC_ADMIN, ...) — kernel cap (passes w/ privileged)
          #   2. cred_has_capability(cred, CAP_MAC_ADMIN, ...) — SELinux AVC check for
          #      capability2 { mac_admin } in the running container's SELinux TYPE
          # The outer K8s pod runs as spc_t (super-privileged), which has capability2 mac_admin.
          # --security-opt label=type:unconfined_t overrides the type to unconfined_t; if that
          # type's policy lacks capability2 mac_admin, has_cap_mac_admin returns false → EINVAL.
          # Fix: --security-opt label=disable inherits the outer K8s pod's spc_t context.
          # spc_t has capability2 mac_admin → has_cap_mac_admin returns true → EINVAL absorbed.
          # Labels forced to unlabeled_t (fine: VM boots with selinux=0 karg anyway).
          # Ref: kernel security/selinux/hooks.c:3166 has_cap_mac_admin(); bootc-dev/bootc#279
          PODMAN_EXIT=0
          podman run --rm --privileged --pid=host --ipc=host \
            --cap-add=CAP_MAC_ADMIN \
            --security-opt label=disable \
            -v /dev:/dev \
            -v /run/udev:/run/udev \
            -v "${STAGING}:/output" \
            -v /var/lib/containers:/var/lib/containers \
            -e "SSH_AUTHORIZED_KEYS=${SSH_AUTHORIZED_KEYS}" \
            "${IMAGE}" \
            bash -c "
              set -euo pipefail

              echo \"[INNER] SSH_AUTHORIZED_KEYS prefix: \${SSH_AUTHORIZED_KEYS:0:30}...\"
              echo \"[INNER-DIAG] SELinux context: \$(cat /proc/self/attr/current 2>/dev/null || echo 'unavailable')\"
              echo \"[INNER-DIAG] CapEff: \$(grep CapEff /proc/self/status | awk '{print \$2}')\"

              # --via-loopback: upstream recommended pattern for VM disk creation.
              # --root-ssh-authorized-keys: bootc-native root SSH key injection —
              # this is the reliable path; it writes to /root/.ssh/authorized_keys
              # during install, avoiding post-install ostree etc-merge uncertainty.
              bootc install to-disk \
                --generic-image \
                --filesystem=btrfs \
                --target-no-signature-verification \
                --disable-selinux \
                --karg=selinux=0 \
                --root-ssh-authorized-keys /output/root-ssh-keys \
                --via-loopback /output/disk.raw

              echo '[INNER] bootc done, mounting for post-install'

              # Post-install: user, GDM autologin, sshd, SSH key injection.
              # bootc released its loop device; create a new one for our work.
              # qecore-headless starts GDM and requires autologin for a non-root
              # user (gitlab.com/dogtail/qecore README).
              LOOP=\$(losetup -f --show -P /output/disk.raw)
              echo '[INNER] post-install loop: '\${LOOP}

              cleanup() {
                umount /tmp/installed 2>/dev/null || true
                losetup -d \"\${LOOP}\" 2>/dev/null || true
              }
              trap cleanup EXIT

              mkdir -p /tmp/installed
              mount -t btrfs \"\${LOOP}p3\" /tmp/installed

              DEPLOY=\$(find /tmp/installed/ostree/deploy/*/deploy/ \
                -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
              if [[ -z \"\${DEPLOY}\" ]]; then
                echo '[INNER] ERROR: ostree deploy path not found' >&2
                exit 1
              fi
              echo '[INNER] deploy: '\${DEPLOY}
              ETC=\"\${DEPLOY}/etc\"

              # User: bluefin-test (uid/gid 1001)
              grep -q '^bluefin-test:' \"\${ETC}/passwd\" 2>/dev/null || \
                echo 'bluefin-test:x:1001:1001:Test User:/var/home/bluefin-test:/bin/bash' \
                  >> \"\${ETC}/passwd\"
              grep -q '^bluefin-test:' \"\${ETC}/shadow\" 2>/dev/null || \
                echo 'bluefin-test:*:19000:0:99999:7:::' >> \"\${ETC}/shadow\"
              grep -q '^bluefin-test:' \"\${ETC}/group\" 2>/dev/null || \
                echo 'bluefin-test:x:1001:' >> \"\${ETC}/group\"
              sed -i 's/^\(wheel:x:10:.*\)$/\1,bluefin-test/' \"\${ETC}/group\" 2>/dev/null || true

              # GDM autologin
              mkdir -p \"\${ETC}/gdm\"
              printf '[daemon]\nAutomaticLoginEnable=True\nAutomaticLogin=bluefin-test\n' \
                > \"\${ETC}/gdm/custom.conf\"

              # sshd: enable + permit key auth
              # Enable sshd.service (standalone daemon) AND sshd.socket (socket activation).
              # Bluefin/Fedora may use either; enabling both ensures sshd starts.
              mkdir -p \"\${ETC}/systemd/system/multi-user.target.wants\"
              ln -sf /usr/lib/systemd/system/sshd.service \
                \"\${ETC}/systemd/system/multi-user.target.wants/sshd.service\" || true
              mkdir -p \"\${ETC}/systemd/system/sockets.target.wants\"
              ln -sf /usr/lib/systemd/system/sshd.socket \
                \"\${ETC}/systemd/system/sockets.target.wants/sshd.socket\" || true
              mkdir -p \"\${ETC}/ssh/sshd_config.d\"
              # Note: 'UsePAM no' is NOT supported in this Fedora openssh build.
              # Use PermitRootLogin yes (most permissive) to allow root pubkey auth.
              # AuthorizedKeysFile: check BOTH home-relative and absolute path.
              # The Include directive at line 15 of sshd_config means drop-ins win
              # over anything after line 15 in the main file — so set both paths
              # here in the drop-in. %%u in printf emits the literal %u token.
              printf 'PubkeyAuthentication yes\nStrictModes no\nPermitRootLogin yes\nAuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys/%%u\n' \
                > \"\${ETC}/ssh/sshd_config.d/10-test.conf\"

              # Also patch the main sshd_config in case Include is not at the top
              # or another drop-in overrides PermitRootLogin. First replace existing
              # lines; append PermitRootLogin yes if not already present.
              sed -i 's/^[[:space:]]*PermitRootLogin.*/PermitRootLogin yes/' \
                \"\${ETC}/ssh/sshd_config\" 2>/dev/null || true
              grep -q '^PermitRootLogin' \"\${ETC}/ssh/sshd_config\" 2>/dev/null || \
                echo 'PermitRootLogin yes' >> \"\${ETC}/ssh/sshd_config\"

              # Diagnostic: confirm the drop-in and patched sshd_config.
              echo '[INNER] sshd drop-in:' && cat \"\${ETC}/ssh/sshd_config.d/10-test.conf\"
              echo '[INNER] sshd_config PermitRootLogin:' && grep -i 'PermitRootLogin' \"\${ETC}/ssh/sshd_config\" || echo '(not found)'

              # sudoers
              mkdir -p \"\${ETC}/sudoers.d\"
              printf 'bluefin-test ALL=(ALL) NOPASSWD:ALL\n' \
                > \"\${ETC}/sudoers.d/bluefin-test\"
              chmod 440 \"\${ETC}/sudoers.d/bluefin-test\"

              echo '[INNER] etc/ config done'

              # ── Key injection ──────────────────────────────────────────────────
              # btrfs subvolume list returns EMPTY for this bootc layout — there are no
              # named subvolumes. ostree/deploy/<stateroot>/var/ IS the real /var content.
              STATEROOT=\$(ls /tmp/installed/ostree/deploy/ 2>/dev/null | head -1)
              VAR_DIR=\"/tmp/installed/ostree/deploy/\${STATEROOT}/var\"
              echo '[INNER] var dir: '\${VAR_DIR}

              # Root: /var/roothome/.ssh (runtime: /root -> symlink -> /var/roothome)
              mkdir -p \"\${VAR_DIR}/roothome/.ssh\"
              printf '%s\n' \"\${SSH_AUTHORIZED_KEYS}\" > \"\${VAR_DIR}/roothome/.ssh/authorized_keys\"
              chmod 700 \"\${VAR_DIR}/roothome/.ssh\"
              chmod 600 \"\${VAR_DIR}/roothome/.ssh/authorized_keys\"
              echo '[INNER] root key -> var/roothome/.ssh/authorized_keys'

              # bluefin-test: /var/home/bluefin-test/.ssh
              mkdir -p \"\${VAR_DIR}/home/bluefin-test/.ssh\"
              printf '%s\n' \"\${SSH_AUTHORIZED_KEYS}\" > \"\${VAR_DIR}/home/bluefin-test/.ssh/authorized_keys\"
              chmod 700 \"\${VAR_DIR}/home/bluefin-test/.ssh\"
              chmod 600 \"\${VAR_DIR}/home/bluefin-test/.ssh/authorized_keys\"
              chown -R 1001:1001 \"\${VAR_DIR}/home/bluefin-test\"
              echo '[INNER] bt key -> var/home/bluefin-test/.ssh/authorized_keys'

              # Absolute fallback in ostree etc layer — no home-dir dependency
              mkdir -p \"\${ETC}/ssh/authorized_keys\"
              printf '%s\n' \"\${SSH_AUTHORIZED_KEYS}\" > \"\${ETC}/ssh/authorized_keys/root\"
              printf '%s\n' \"\${SSH_AUTHORIZED_KEYS}\" > \"\${ETC}/ssh/authorized_keys/bluefin-test\"
              chmod 644 \"\${ETC}/ssh/authorized_keys/root\" \"\${ETC}/ssh/authorized_keys/bluefin-test\"
              echo '[INNER] fallback keys -> etc/ssh/authorized_keys/{root,bluefin-test}'

              # Patch main sshd_config AuthorizedKeysFile to check BOTH paths.
              # First-occurrence-wins: if Include is after AuthorizedKeysFile in the main file,
              # the drop-in cannot override it — so patch the main file directly.
              sed -i 's|^[[:space:]]*AuthorizedKeysFile.*|AuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys/%u|' \
                \"\${ETC}/ssh/sshd_config\"
              echo '[INNER] sshd_config AuthorizedKeysFile:' && grep 'AuthorizedKeysFile' \"\${ETC}/ssh/sshd_config\"
              echo '[INNER] Include line:' && grep -n 'Include' \"\${ETC}/ssh/sshd_config\" | head -3

              # Explicitly sync+umount BEFORE the container exits so btrfs commits
              # all transactions to the backing file (disk.raw).  The cleanup trap
              # uses '|| true' which silences failures; a lazy namespace teardown on
              # container exit does NOT flush dirty btrfs pages.  Without this hard
              # umount the outer verify step sees the original (unmodified) disk.
              echo '[INNER] syncing btrfs...'
              btrfs filesystem sync /tmp/installed
              echo '[INNER] unmounting btrfs...'
              umount /tmp/installed
              losetup -d \"\${LOOP}\"
              echo '[INNER] disk committed.'

            " || PODMAN_EXIT=$?

          echo "[DIAG] podman exit=${PODMAN_EXIT}"

          if [[ "${PODMAN_EXIT}" -ne 0 ]]; then
            echo "ERROR: bootc install failed with exit ${PODMAN_EXIT} — deleting disk" >&2
            losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d
            rm -f "${DISK}"
            exit "${PODMAN_EXIT}"
          fi

          # Clean up any leftover loop devices for this file
          losetup -j "${DISK}" | awk -F: '{print $1}' | xargs -r losetup -d

          # Verify post-install writes persisted to raw disk before conversion.
          # This mounts the btrfs from the OUTER script to confirm inner-container
          # writes made it through to the backing file.
          echo "--- Verifying post-install writes in raw disk (outer mount) ---"
          VL=$(losetup -f --show -P "${DISK}")
          echo "[VERIFY] loop: ${VL}"
          partprobe "${VL}" 2>/dev/null || true
          sleep 1
          mkdir -p /mnt/verify
          if mount -t btrfs "${VL}p3" /mnt/verify; then
            VDP=$(find /mnt/verify/ostree/deploy/*/deploy/ \
              -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
            echo "[VERIFY] deploy: ${VDP}"
            echo "[VERIFY] 10-test.conf:"
            cat "${VDP}/etc/ssh/sshd_config.d/10-test.conf" 2>&1 || echo "MISSING"
            echo "[VERIFY] authorized_keys/root:"
            cat "${VDP}/etc/ssh/authorized_keys/root" 2>&1 || echo "MISSING"
            echo "[VERIFY] var/roothome/.ssh:"
            ls -la /mnt/verify/ostree/deploy/default/var/roothome/.ssh/ 2>&1 || echo "MISSING"
            # Best-effort sync; btrfs-progs may not be in the outer pod image.
            # The inner container's hard umount already committed all writes.
            btrfs filesystem sync /mnt/verify 2>/dev/null || true
            umount /mnt/verify
          else
            echo "[VERIFY] ERROR: could not mount btrfs partition from raw disk"
          fi
          losetup -d "${VL}" 2>/dev/null || true
          echo "--- Verification done ---"

          chown 107:107 "${DISK}"

          echo "Cleaning containers storage after build..."
          rm -rf /var/lib/containers/* 2>/dev/null || true

          echo "install-to-disk complete: ${DISK}"

    # ─── convert-and-push ─────────────────────────────────────────────────────
    # qemu-img raw→qcow2, buildah OCI image, push to local Zot, cleanup staging.

    - name: convert-and-push
      inputs:
        parameters:
          - name: image
          - name: image-tag
          - name: containerdisk-tag
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: staging
          hostPath:
            path: /var/mnt/ghost-data/bluefin-cd-build
            type: DirectoryOrCreate
      script:
        image: quay.io/buildah/stable:latest
        command: [bash]
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "4"
            memory: 8Gi
        volumeMounts:
          - name: staging
            mountPath: /mnt/staging
        source: |
          set -euo pipefail
          dnf install -y --quiet qemu-img >/dev/null 2>&1

          # Flush all page-cache dirty pages to disk before reading the raw disk.
          # The install-to-disk pod's btrfs writes land in the kernel page cache for
          # disk.raw; without sync, qemu-img may read stale on-disk blocks if the
          # NVMe hasn't received the flushed writes yet.
          sync

          TAG="{{inputs.parameters.containerdisk-tag}}"
          STAGING="/mnt/staging/${TAG}"
          RAW="${STAGING}/disk.raw"
          QCOW="${STAGING}/containerdisk.qcow2"
          DEST="192.168.1.102:30500/bluefin-containerdisk:${TAG}"

          echo "Converting ${RAW} to qcow2..."
          qemu-img convert -f raw -O qcow2 -p "${RAW}" "${QCOW}"
          echo "qcow2 size: $(du -sh "${QCOW}" | cut -f1)"

          echo "Building containerDisk OCI image..."
          CTR=$(buildah from scratch)
          buildah copy --chown 107:107 "${CTR}" "${QCOW}" /disk/disk.qcow2
          buildah commit "${CTR}" "${DEST}"

          echo "Pushing to ${DEST}..."
          buildah push --tls-verify=false "${DEST}"
          buildah rm "${CTR}" 2>/dev/null || true

          # Update the image-polling-digests ConfigMap so check() can detect staleness.
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          IMAGE="{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
          REMOTE_DIGEST=$(skopeo inspect --no-creds "docker://${IMAGE}" 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('Digest',''))" \
            || echo "")
          if [[ -n "${REMOTE_DIGEST}" ]]; then
            curl -sf --cacert "${CACERT}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/strategic-merge-patch+json" \
              -X PATCH \
              "https://kubernetes.default.svc/api/v1/namespaces/argo/configmaps/image-polling-digests" \
              -d "{\"data\":{\"containerdisk-${TAG}\": \"${REMOTE_DIGEST}\"}}" \
              > /dev/null && echo "Updated digest: containerdisk-${TAG}=${REMOTE_DIGEST}" \
              || echo "WARN: digest update failed (non-fatal)"
          fi

          echo "Cleaning staging..."
          rm -f "${RAW}" "${QCOW}"

          echo "Done: ${DEST}"
