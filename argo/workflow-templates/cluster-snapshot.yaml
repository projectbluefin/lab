apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cluster-snapshot
  namespace: argo
  labels:
    app.kubernetes.io/component: dashboard-data
    app.kubernetes.io/part-of: lab
  annotations:
    bluefin.io/description: |
      Captures a live snapshot of Argo Workflows + cluster nodes and commits it
      to docs/data/factory-stats.json in projectbluefin/lab. Runs entirely
      in-cluster (no GitHub-hosted or self-hosted Actions runner involved) -
      Argo/the k8s API are LAN-only and this pod already lives on that LAN.
      Reuses the existing github-token secret (already used by image-poller,
      pr-poller, pr-image-gc, pr-label-poller) for the git push; no new
      credential is introduced.
spec:
  entrypoint: snapshot
  serviceAccountName: argo
  templates:
    - name: snapshot
      metadata:
        labels:
          app.kubernetes.io/part-of: lab
          bluefin.io/step: cluster-snapshot
      script:
        image: cgr.dev/chainguard/wolfi-base:latest
        command: [sh, -c]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        source: |
          apk add --no-cache bash curl kubectl git python3 >/dev/null 2>&1
          exec bash <<'SCRIPT_EOF'
          set -euo pipefail

          git clone --depth=1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/projectbluefin/lab.git" /src
          cd /src

          echo "=== Refreshing live cluster snapshot ==="
          python3 scripts/refresh_factory_stats.py --cluster-only

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/factory-stats.json

          if git diff --cached --quiet; then
            echo "No cluster snapshot changes to commit"
            exit 0
          fi

          git commit \
            -m "chore(cluster-snapshot): refresh live Argo/node snapshot" \
            -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"

          for attempt in 1 2 3; do
            git pull --rebase -X ours origin main
            if git push origin HEAD:main; then
              echo "Pushed cluster snapshot"
              exit 0
            fi
            echo "Push attempt ${attempt} failed, retrying..."
            sleep 5
          done
          echo "Failed to push cluster snapshot after 3 attempts" >&2
          exit 1
          SCRIPT_EOF
