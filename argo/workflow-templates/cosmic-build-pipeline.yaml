apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cosmic-build-pipeline
  namespace: argo
  annotations:
    description: |
      Parallel cosmic BST build pipeline. Builds cosmic and cosmic-nvidia OCI variants
      in parallel against the shared Buildbarn frontend and cache service
      (frontend.buildbarn.svc.cluster.local:8980). Triggered by push to
      cosmic-build-meta:main via cosmic-commit-poller CronWorkflow. On success,
      exports to local Zot (:30500).
      Uses bst-build PriorityClass — preemptable by lab-test-vm pods.
  labels:
    app.kubernetes.io/component: cosmic-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # 2026-07-11: Serialise the two variants instead of running them in
  # parallel. The lab only has two KubeVirt-capable nodes (ghost and exo-0),
  # and each BST build pod requests 14 GiB memory. Running both at once
  # causes the second pod to land on ghost and be repeatedly preempted by
  # higher-priority VM pods. Serialising keeps one 14 GiB pod active at a
  # time and lets it run to completion.
  #
  # 2026-07-11: Raised 14400 -> 86400 (dakota parity). The workflow-level
  # deadline starts at creation and also counts time spent queued on the
  # bst-build semaphore; run cosmic-build-pipeline-queued-1783735153 spent
  # 1.5 h queued and was killed at 4 h with a healthy build in progress.
  activeDeadlineSeconds: 86400

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/RazorfinOS-org/cosmic-build-meta.git"
      - name: ref
        value: "main"
      - name: registry
        value: "192.168.1.102:30500"
      - name: build-mode
        value: "re"

  entrypoint: build

  templates:

    - name: build
      synchronization:
        semaphores:
        - configMapKeyRef:
            name: workflow-semaphores
            key: bst-build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
          - name: build-mode
            value: "re"
      dag:
        tasks:
          - name: detect-build-mode
            template: detect-build-mode
            arguments:
              parameters:
                - name: build-mode
                  value: "{{inputs.parameters.build-mode}}"
          - name: build-cosmic
            template: run-bst-step
            depends: detect-build-mode
            arguments:
              parameters:
                - name: element
                  value: "oci/cosmic/image.bst"
                - name: tag
                  value: "cosmic-cluster-testing"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"
          - name: build-cosmic-nvidia
            template: run-bst-step
            depends: build-cosmic
            arguments:
              parameters:
                - name: element
                  value: "oci/cosmic-nvidia/image.bst"
                - name: tag
                  value: "cosmic-cluster-testing-nvidia"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"

    - name: detect-build-mode
      inputs:
        parameters:
          - name: build-mode
      outputs:
        parameters:
          - name: mode
            valueFrom:
              path: /tmp/mode
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        source: |
          set -euo pipefail
          REQUESTED="{{inputs.parameters.build-mode}}"
          if [[ "${REQUESTED}" != "re" ]]; then
            echo "COSMIC build-mode '${REQUESTED}' is forbidden; only distributed mode ('re') is permitted" >&2
            exit 1
          fi

          MAX_AGE_SECONDS=60
          NOW="$(date -u +%s)"
          for NODE in ghost exo-0; do
            LINK="$(kubectl get node "${NODE}" -o jsonpath='{.metadata.annotations.lab\.projectbluefin\.io/usb4-link}')"
            OBSERVED_AT="$(kubectl get node "${NODE}" -o jsonpath='{.metadata.annotations.lab\.projectbluefin\.io/usb4-link-observed-at}')"
            READY="$(kubectl get node "${NODE}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')"

            if [[ "${LINK}" != "up" || ! "${OBSERVED_AT}" =~ ^[0-9]+$ || "${READY}" != "True" ]]; then
              echo "USB4 BuildBarn gate rejected ${NODE}: link=${LINK:-missing} observed-at=${OBSERVED_AT:-missing} ready=${READY:-unknown}" >&2
              exit 1
            fi
            if (( NOW - OBSERVED_AT > MAX_AGE_SECONDS )); then
              echo "USB4 BuildBarn gate rejected ${NODE}: observation is stale ($((NOW - OBSERVED_AT))s old)" >&2
              exit 1
            fi
          done

          WORKERS="$(kubectl get pods -n buildbarn -l app=worker -o jsonpath='{range .items[*]}{.spec.nodeName}{"|"}{.status.phase}{"|"}{.status.containerStatuses[*].ready}{"\n"}{end}')"
          for NODE in ghost exo-0; do
            if ! grep -Eq "^${NODE}\|Running\|true true$" <<<"${WORKERS}"; then
              echo "USB4 BuildBarn gate rejected: no Ready worker on ${NODE}" >&2
              exit 1
            fi
          done

          echo "USB4-backed BuildBarn remote execution admitted"
          printf '%s' re > /tmp/mode

    - name: run-bst-step
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      dag:
        tasks:
          - name: bst-re
            template: bst-build-re
            when: "{{=inputs.parameters.mode == 're'}}"
            arguments:
              parameters:
                - name: element
                  value: "{{inputs.parameters.element}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{inputs.parameters.mode}}"
    - name: bst-build-re
      priorityClassName: bst-build
      # 2026-07-11: Raised 5400 -> 43200 (dakota parity). A cold local BST
      # build exceeds 90 min; attempt (2) of run ...-queued-1783735153 was
      # killed healthy at 94 min by this step deadline.
      activeDeadlineSeconds: 43200
      retryStrategy:
        # Every retry remains distributed; repair BuildBarn rather than compiling
        # locally if an action fails.
        limit: "5"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: local-path
                resources:
                  requests:
                    storage: 200Gi
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
              - key: remote-execution.conf
                path: remote-execution.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
          # buildstream-plugins-community git_repo uses dulwich, whose filter-process
          # protocol trips over git-lfs smudge for repos with .gitattributes LFS
          # entries (e.g. pop-os/cosmic-edit). git CLI handles them fine; dulwich
          # does not. The LFS files in this project are screenshots/metainfo only,
          # so skipping smudge does not affect the compiled artifact.
          - name: GIT_LFS_SKIP_SMUDGE
            value: "1"
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          REMOTE_EXECUTION_SERVICE="grpc://frontend.buildbarn.svc.cluster.local:8980"
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning cosmic-build-meta @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 --branch "${REF}" "${REPO}" /src
          cd /src
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')

          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: true
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
              source-caches:
                override-project-caches: false
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
          EOF

          # Every retry remains distributed. A failed action is infrastructure to
          # repair, never a reason to compile on the coordinator.
          echo "=== Distributed build: remote execution enabled (USB4 link up) ==="
          sed 's/^/    /' /etc/buildstream/remote-execution.conf >> /tmp/buildstream-cluster.conf

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-tls-verify=false "oci:${EXPORT_DIR}" "docker://{{inputs.parameters.registry}}/${TAG}:latest"
          else
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
            podman rmi "${IMAGE_ID}" 2>/dev/null || true
          fi

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="
