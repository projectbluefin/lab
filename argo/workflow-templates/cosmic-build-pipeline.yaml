apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cosmic-build-pipeline
  namespace: argo
  annotations:
    description: |
      Parallel cosmic BST build pipeline. Builds cosmic and cosmic-nvidia OCI variants
      in parallel against the in-cluster bst-artifact-server CAS service (bazel-remote,
      argo namespace, :9092 gRPC). Triggered by push to cosmic-build-meta:main via
      cosmic-commit-poller CronWorkflow. On success, exports to local Zot (:30500).
      Uses bst-build PriorityClass — preemptable by lab-test-vm pods.
  labels:
    app.kubernetes.io/component: cosmic-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # BST build concurrency managed by k8s scheduler via pod resource requests.
  activeDeadlineSeconds: 7200

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/RazorfinOS-org/cosmic-build-meta.git"
      - name: ref
        value: "main"
      - name: registry
        value: "192.168.1.102:30500"

  entrypoint: build

  templates:

    - name: build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
      dag:
        tasks:
          - name: build-cosmic
            template: bst-build
            arguments:
              parameters:
                - name: element
                  value: "oci/cosmic/image.bst"
                - name: tag
                  value: "cosmic-cluster-testing"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
          - name: build-cosmic-nvidia
            template: bst-build
            arguments:
              parameters:
                - name: element
                  value: "oci/cosmic-nvidia/image.bst"
                - name: tag
                  value: "cosmic-cluster-testing-nvidia"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"

    - name: bst-build
      priorityClassName: bst-build
      # Bound a single attempt well below the workflow's 7200s deadline so a
      # wedged gRPC/source fetch (observed: connection stays ESTABLISHED with
      # zero throughput, no error, no timeout) gets killed and retried with a
      # fresh pod/connection instead of silently burning the whole 2h budget.
      activeDeadlineSeconds: 2700
      retryStrategy:
        limit: "2"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          emptyDir: {}
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        resources:
          requests:
            cpu: "4"
            memory: 14Gi
          limits:
            cpu: "8"
            memory: 28Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
        source: |
          set -euo pipefail

          # Write in-cluster BST config — plain gRPC to in-cluster bazel-remote CAS, no TLS.
          # connection-config bounds gRPC calls so a stalled/wedged connection to our
          # own CAS fails fast and gets retried instead of hanging indefinitely.
          echo "cache:" > /tmp/buildstream-cluster.conf
          echo "  storage-service:" >> /tmp/buildstream-cluster.conf
          echo "    url: grpc://bst-artifact-server.argo.svc.cluster.local:9092" >> /tmp/buildstream-cluster.conf
          echo "    push: true" >> /tmp/buildstream-cluster.conf
          echo "    connection-config:" >> /tmp/buildstream-cluster.conf
          echo "      request-timeout: 300" >> /tmp/buildstream-cluster.conf
          echo "      retry-limit: 4" >> /tmp/buildstream-cluster.conf
          echo "      retry-delay: 1000" >> /tmp/buildstream-cluster.conf
          # Observed reproducible hang checking out the gnome-build-meta junction
          # (worker process blocked reading an IPC pipe with no writer, zero CPU,
          # across multiple pods/nodes) — matches known BuildStream multiprocessing
          # deadlocks under parallel source fetches. Serialize fetchers only; leave
          # build concurrency (scheduler.builders / build.max-jobs) at defaults so
          # actual compilation isn't slowed down.
          echo "scheduler:" >> /tmp/buildstream-cluster.conf
          echo "  network-retries: 4" >> /tmp/buildstream-cluster.conf
          echo "  fetchers: 1" >> /tmp/buildstream-cluster.conf

          BST_CONF=/tmp/buildstream-cluster.conf
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning cosmic-build-meta @ ${REF} ==="
          git clone --depth=1 --branch "${REF}" "${REPO}" /src
          cd /src

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          # skopeo is not in the bst2 image; use podman instead.
          # Load the OCI layout into podman local storage, then push by image ID.
          # docker:// transport prefix is required for podman push to a registry.
          IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
          podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
          podman rmi "${IMAGE_ID}" 2>/dev/null || true

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="
