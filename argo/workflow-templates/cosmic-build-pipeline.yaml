apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cosmic-build-pipeline
  namespace: argo
  annotations:
    description: |
      Parallel cosmic BST build pipeline. Builds cosmic and cosmic-nvidia OCI variants
      in parallel against the shared Buildbarn frontend and cache service
      (frontend.buildbarn.svc.cluster.local:8980). Triggered by push to
      cosmic-build-meta:main via cosmic-commit-poller CronWorkflow. On success,
      exports to local Zot (:30500).
      Uses bst-build PriorityClass — preemptable by lab-test-vm pods.
  labels:
    app.kubernetes.io/component: cosmic-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # BST build concurrency managed by k8s scheduler via pod resource requests.
  activeDeadlineSeconds: 14400

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/RazorfinOS-org/cosmic-build-meta.git"
      - name: ref
        value: "main"
      - name: registry
        value: "192.168.1.102:30500"
      - name: build-mode
        # 2026-07-11: Force local (cache-only) builds for cosmic until
        # Buildbarn's RE sandbox is fixed. bb_runner chrootIntoInputRoot does
        # not provide /dev/null, which breaks meson's compiler detection
        # (icx --version) and other build steps. Local builds run in the bst2
        # pod where BuildStream's bubblewrap sandbox has a proper /dev.
        # Revert to "auto" once projectbluefin/lab#271 is resolved.
        value: "local"

  entrypoint: build

  templates:

    - name: build
      synchronization:
        semaphores:
        - configMapKeyRef:
            name: workflow-semaphores
            key: bst-build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
          - name: build-mode
            value: "local"
      dag:
        tasks:
          - name: detect-build-mode
            template: detect-build-mode
            arguments:
              parameters:
                - name: build-mode
                  value: "{{inputs.parameters.build-mode}}"
          - name: build-cosmic
            template: run-bst-step
            depends: detect-build-mode
            arguments:
              parameters:
                - name: element
                  value: "oci/cosmic/image.bst"
                - name: tag
                  value: "cosmic-cluster-testing"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"
          - name: build-cosmic-nvidia
            template: run-bst-step
            depends: detect-build-mode
            arguments:
              parameters:
                - name: element
                  value: "oci/cosmic-nvidia/image.bst"
                - name: tag
                  value: "cosmic-cluster-testing-nvidia"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"

    - name: detect-build-mode
      inputs:
        parameters:
          - name: build-mode
      outputs:
        parameters:
          - name: mode
            valueFrom:
              path: /tmp/mode
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        source: |
          set -uo pipefail
          REQUESTED="{{inputs.parameters.build-mode}}"
          MODE=local
          case "${REQUESTED}" in
            re) MODE=re ;;
            local) MODE=local ;;
            auto)
              ANNOT='{.metadata.annotations.lab\.projectbluefin\.io/usb4-link}'
              G=$(kubectl get node ghost -o jsonpath="${ANNOT}" 2>/dev/null || echo unknown)
              E=$(kubectl get node exo-0 -o jsonpath="${ANNOT}" 2>/dev/null || echo unknown)
              echo "usb4-link annotations: ghost=${G:-unset} exo-0=${E:-unset}"
              if [[ "${G}" == "up" && "${E}" == "up" ]]; then
                MODE=re
              fi
              ;;
            *) echo "unknown build-mode '${REQUESTED}', using local" >&2 ;;
          esac
          echo "build mode: ${MODE}"
          printf '%s' "${MODE}" > /tmp/mode

    - name: run-bst-step
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      dag:
        tasks:
          - name: bst-re
            template: bst-build-re
            when: "{{inputs.parameters.mode}} == 're'"
            arguments:
              parameters:
                - name: element
                  value: "{{inputs.parameters.element}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{inputs.parameters.mode}}"
          - name: bst-local
            template: bst-build-local
            when: "{{inputs.parameters.mode}} == 'local'"
            arguments:
              parameters:
                - name: element
                  value: "{{inputs.parameters.element}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{inputs.parameters.mode}}"

    - name: bst-build-re
      priorityClassName: bst-build
      activeDeadlineSeconds: 5400
      retryStrategy:
        # First RE attempt may hit Buildbarn sandbox issues; retries fall back
        # to cache-only automatically. Extra retries help transient failures.
        limit: "5"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          # Share a single local-build cache across cosmic variants. Per-tag
          # caches duplicated FSDK bootstrap work and kept a stale/corrupted
          # artifact from an earlier RE attempt, causing one variant to fail
          # while the other built from source successfully. Revert to per-tag
          # paths once projectbluefin/lab#271 is resolved and RE is re-enabled.
          hostPath:
            path: /var/tmp/bst-cache/cosmic-local
            type: DirectoryOrCreate
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
              - key: remote-execution.conf
                path: remote-execution.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
          # buildstream-plugins-community git_repo uses dulwich, whose filter-process
          # protocol trips over git-lfs smudge for repos with .gitattributes LFS
          # entries (e.g. pop-os/cosmic-edit). git CLI handles them fine; dulwich
          # does not. The LFS files in this project are screenshots/metainfo only,
          # so skipping smudge does not affect the compiled artifact.
          - name: GIT_LFS_SKIP_SMUDGE
            value: "1"
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          REMOTE_EXECUTION_SERVICE="grpc://frontend.buildbarn.svc.cluster.local:8980"
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning cosmic-build-meta @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 --branch "${REF}" "${REPO}" /src
          cd /src
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')

          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: true
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
              source-caches:
                override-project-caches: false
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
          EOF

          # Since we are in the RE-coordinator template, RE is always enabled
          # on first try, but we respect the retry attempt and drop RE on retry.
          ATTEMPT="{{retries}}"
          if [[ "${ATTEMPT}" == "0" ]]; then
            echo "=== Distributed build: remote execution enabled (USB4 link up) ==="
            sed 's/^/    /' /etc/buildstream/remote-execution.conf >> /tmp/buildstream-cluster.conf
          else
            echo "=== Coordinator retry fallback to Cache-only (attempt=${ATTEMPT}) ==="
          fi

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-tls-verify=false "oci:${EXPORT_DIR}" "docker://{{inputs.parameters.registry}}/${TAG}:latest"
          else
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
            podman rmi "${IMAGE_ID}" 2>/dev/null || true
          fi

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="

    - name: bst-build-local
      priorityClassName: bst-build
      activeDeadlineSeconds: 5400
      retryStrategy:
        # Transient GitHub HTTPS read timeouts (30s) on cargo/git dependencies
        # are the main failure mode in local mode. Give the lane several chances
        # before failing the whole workflow.
        limit: "5"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
          - name: mode
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          # Share local-build cache across cosmic variants; see bst-build-re.
          # Revert to per-tag paths once projectbluefin/lab#271 is resolved.
          hostPath:
            path: /var/tmp/bst-cache/cosmic-local
            type: DirectoryOrCreate
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
              - key: remote-execution.conf
                path: remote-execution.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
          # See bst-build-re for rationale: dulwich git-lfs smudge workaround.
          - name: GIT_LFS_SKIP_SMUDGE
            value: "1"
        resources:
          requests:
            cpu: "4"
            memory: 14Gi
          limits:
            cpu: "8"
            memory: 28Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning cosmic-build-meta @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 --branch "${REF}" "${REPO}" /src
          cd /src
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')

          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: true
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
              source-caches:
                override-project-caches: false
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
          EOF

          # Since we are in the local-fallback template, it is always cache-only
          echo "=== Cache-only build (attempt={{retries}}) ==="

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-tls-verify=false "oci:${EXPORT_DIR}" "docker://{{inputs.parameters.registry}}/${TAG}:latest"
          else
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
            podman rmi "${IMAGE_ID}" 2>/dev/null || true
          fi

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="
