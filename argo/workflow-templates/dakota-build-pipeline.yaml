apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-build-pipeline
  namespace: argo
  annotations:
    description: |
      Parallel dakota BST build pipeline. Builds bluefin and bluefin-nvidia OCI variants
      using local worker resources and persistent hostPath cache, routing artifact cache
      push/pulls to the shared Buildbarn frontend (:8980 gRPC) for hot builds.
      Triggered by push to dakota:testing via dakota-commit-poller CronWorkflow.
      On success, exports to local Zot (:30500).
      Uses bst-build PriorityClass — higher priority than lab-test-vm so BST cache-seeding work wins scheduling disputes.
  labels:
    app.kubernetes.io/component: dakota-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # BST build concurrency is handled by the scheduler via pod resource requests.
  # Cold bootstrap + source fetch + package compilation can exceed the prior 6h
  # per-pod deadline, so allow a full 12h per build pod and a 24h workflow
  # ceiling to cover one complete build/export path without killing it mid-run.
  activeDeadlineSeconds: 86400

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/projectbluefin/dakota.git"
      - name: ref
        value: "testing"
      - name: registry
        value: "192.168.1.102:30500"

  entrypoint: build

  templates:

    - name: build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
      dag:
        tasks:
          - name: build-bluefin
            template: bst-build
            arguments:
              parameters:
                - name: element
                  value: "oci/bluefin.bst"
                - name: tag
                  value: "dakota-cluster-testing"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
          - name: build-bluefin-nvidia
            template: bst-build
            arguments:
              parameters:
                - name: element
                  value: "oci/bluefin-nvidia.bst"
                - name: tag
                  value: "dakota-cluster-testing-nvidia"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"

    - name: bst-build
      priorityClassName: bst-build
      # Pod-local cache (no remote CAS) requires a full bootstrap (gcc-stage1 → 100+ packages)
      # plus source fetch with network retry overhead. The prior 6h step deadline was repeatedly
      # exceeded during cold bootstrap and compilation, so allow 12h per pod to finish a full
      # build/export cycle before the workflow retries.
      activeDeadlineSeconds: 43200
      retryStrategy:
        limit: "2"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: repo
          - name: registry
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          hostPath:
            path: /var/tmp/bst-cache/{{inputs.parameters.tag}}
            type: DirectoryOrCreate
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        # gRPC is not fork-safe: BuildStream's fetch workers are forked while the
        # parent process may hold a live gRPC channel (CASD/remote cache), which can
        # deadlock a forked worker on an inherited IPC pipe (observed hang: worker
        # blocked in anon_pipe_read, parent idle in ep_poll, zero CPU). These env
        # vars are the upstream-documented mitigation (grpc/grpc#16037,
        # grpc.io/blog/fork-support): poll strategy avoids epoll's background
        # thread/pipe that breaks across fork, and fork-support enables gRPC's
        # partial fork-safety path.
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
        resources:
          requests:
            cpu: "6"
            memory: 16Gi
          limits:
            cpu: "12"
            memory: 32Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
        source: |
          set -euo pipefail

          # Write minimal in-cluster BST config for deterministic local execution.
          # Remote CAS uploads of very large staged trees can fail with
          # "Unable to upload <N> blobs to remote CAS"; keep Dakota lane local-only.
          : > /tmp/buildstream-cluster.conf
          # Keep the known gRPC fork-safety mitigations, but raise scheduler
          # concurrency to the documented BuildStream defaults for this cluster.
          # The prior 1/1/1/1 profile throttled the pod too aggressively on
          # modern hardware and left the shared Buildbarn cache underutilized.
          echo "scheduler:" >> /tmp/buildstream-cluster.conf
          echo "  network-retries: 4" >> /tmp/buildstream-cluster.conf
          echo "  fetchers: 4" >> /tmp/buildstream-cluster.conf
          echo "  builders: 4" >> /tmp/buildstream-cluster.conf
          echo "  pushers: 4" >> /tmp/buildstream-cluster.conf
          echo "build:" >> /tmp/buildstream-cluster.conf
          echo "  max-jobs: 4" >> /tmp/buildstream-cluster.conf

          # Enforce hot builds: use the shared Buildbarn frontend for writeback
          # and upstream mirrors as read-only fallbacks to minimize recompilation.
          echo "artifacts:" >> /tmp/buildstream-cluster.conf
          echo "  override-project-caches: false" >> /tmp/buildstream-cluster.conf
          echo "  servers:" >> /tmp/buildstream-cluster.conf
          echo "  - url: grpc://frontend.buildbarn.svc.cluster.local:8980" >> /tmp/buildstream-cluster.conf
          echo "    push: true" >> /tmp/buildstream-cluster.conf
          echo "  - url: https://cache.projectbluefin.io:11001" >> /tmp/buildstream-cluster.conf
          echo "    push: false" >> /tmp/buildstream-cluster.conf
          echo "  - url: https://cache.freedesktop-sdk.io:11001" >> /tmp/buildstream-cluster.conf
          echo "    push: false" >> /tmp/buildstream-cluster.conf
          echo "  - url: https://gbm.gnome.org:11003" >> /tmp/buildstream-cluster.conf
          echo "    push: false" >> /tmp/buildstream-cluster.conf
          echo "source-caches:" >> /tmp/buildstream-cluster.conf
          echo "  override-project-caches: false" >> /tmp/buildstream-cluster.conf
          echo "  servers:" >> /tmp/buildstream-cluster.conf
          echo "  - url: https://cache.projectbluefin.io:11001" >> /tmp/buildstream-cluster.conf
          echo "    push: false" >> /tmp/buildstream-cluster.conf
          echo "  - url: https://cache.freedesktop-sdk.io:11001" >> /tmp/buildstream-cluster.conf
          echo "    push: false" >> /tmp/buildstream-cluster.conf
          echo "  - url: https://gbm.gnome.org:11003" >> /tmp/buildstream-cluster.conf
          echo "    push: false" >> /tmp/buildstream-cluster.conf

          BST_CONF=/tmp/buildstream-cluster.conf
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning dakota @ ${REF} ==="
          git clone --depth=1 --branch "${REF}" "${REPO}" /src
          cd /src

          if ! grep -q '^environment:' project.conf 2>/dev/null; then
            cat >> project.conf <<'EOF'

          environment:
            PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
            SHELL: /bin/sh
          EOF
          fi

          python3 - <<'PY'
          from pathlib import Path
          path = Path('project.conf')
          text = path.read_text()
          text = text.replace('PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin', 'PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin')
          text = text.replace('PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin\n', 'PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin\n')
          if 'host_path: /usr/bin/freedesktop-sdk-stripper' in text and 'host-files:' in text:
              pass
          else:
              shell_block = 'shell:'
              if shell_block in text:
                  lines = text.splitlines()
                  shell_idx = next(i for i, line in enumerate(lines) if line.strip() == shell_block)
                  end_idx = len(lines)
                  for idx in range(shell_idx + 1, len(lines)):
                      if lines[idx].strip() and not lines[idx].startswith((' ', '\t', '#')):
                          end_idx = idx
                          break
                  inject = [
                      '  host-files:',
                      '    - host_path: /usr/bin/freedesktop-sdk-stripper',
                      '      path: /usr/bin/freedesktop-sdk-stripper',
                      '      optional: true',
                      '    - host_path: /usr/local/bin/freedesktop-sdk-stripper',
                      '      path: /usr/local/bin/freedesktop-sdk-stripper',
                      '      optional: true',
                  ]
                  updated = lines[:shell_idx + 1] + inject + lines[end_idx:]
                  path.write_text('\n'.join(updated) + '\n')
              else:
                  with path.open('a') as handle:
                      handle.write('\n\nshell:\n')
                      handle.write('  host-files:\n')
                      handle.write('    - host_path: /usr/bin/freedesktop-sdk-stripper\n')
                      handle.write('      path: /usr/bin/freedesktop-sdk-stripper\n')
                      handle.write('      optional: true\n')
                      handle.write('    - host_path: /usr/local/bin/freedesktop-sdk-stripper\n')
                      handle.write('      path: /usr/local/bin/freedesktop-sdk-stripper\n')
                      handle.write('      optional: true\n')
          PY

          cat > /usr/bin/freedesktop-sdk-stripper <<'EOF'
          #!/bin/sh
          set -eu

          # Compatibility shim for bst2 images that do not ship the FSDK stripper helper.
          # Returning success keeps the lab lane moving even when stripping is not essential.
          for arg in "$@"; do
            case "$arg" in
              -*) ;;
              *)
                if [ -d "$arg" ]; then
                  find "$arg" -type f 2>/dev/null | while read -r path; do
                    file "$path" 2>/dev/null | grep -q 'ELF' && strip --strip-unneeded "$path" 2>/dev/null || true
                  done
                elif [ -f "$arg" ]; then
                  file "$arg" 2>/dev/null | grep -q 'ELF' && strip --strip-unneeded "$arg" 2>/dev/null || true
                fi
                ;;
            esac
          done
          exit 0
          EOF
          chmod 0755 /usr/bin/freedesktop-sdk-stripper
          if [ -d /usr/local/bin ]; then
            cp /usr/bin/freedesktop-sdk-stripper /usr/local/bin/freedesktop-sdk-stripper
            chmod 0755 /usr/local/bin/freedesktop-sdk-stripper
          fi
          echo "=== project.conf after shim injection ==="
          sed -n '1,120p' project.conf

          # Inject project-level cache overrides matching top-level config for the primary project name.
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')
          echo "projects:" >> /tmp/buildstream-cluster.conf
          echo "  ${PROJECT_NAME}:" >> /tmp/buildstream-cluster.conf
          echo "    artifacts:" >> /tmp/buildstream-cluster.conf
          echo "      override-project-caches: false" >> /tmp/buildstream-cluster.conf
          echo "      servers:" >> /tmp/buildstream-cluster.conf
          echo "      - url: grpc://frontend.buildbarn.svc.cluster.local:8980" >> /tmp/buildstream-cluster.conf
          echo "        push: true" >> /tmp/buildstream-cluster.conf
          echo "      - url: https://cache.projectbluefin.io:11001" >> /tmp/buildstream-cluster.conf
          echo "        push: false" >> /tmp/buildstream-cluster.conf
          echo "      - url: https://cache.freedesktop-sdk.io:11001" >> /tmp/buildstream-cluster.conf
          echo "        push: false" >> /tmp/buildstream-cluster.conf
          echo "      - url: https://gbm.gnome.org:11003" >> /tmp/buildstream-cluster.conf
          echo "        push: false" >> /tmp/buildstream-cluster.conf
          echo "    source-caches:" >> /tmp/buildstream-cluster.conf
          echo "      override-project-caches: false" >> /tmp/buildstream-cluster.conf
          echo "      servers:" >> /tmp/buildstream-cluster.conf
          echo "      - url: https://cache.projectbluefin.io:11001" >> /tmp/buildstream-cluster.conf
          echo "        push: false" >> /tmp/buildstream-cluster.conf
          echo "      - url: https://cache.freedesktop-sdk.io:11001" >> /tmp/buildstream-cluster.conf
          echo "        push: false" >> /tmp/buildstream-cluster.conf
          echo "      - url: https://gbm.gnome.org:11003" >> /tmp/buildstream-cluster.conf
          echo "        push: false" >> /tmp/buildstream-cluster.conf

          mkdir -p /usr/local/bin
          for binpath in /usr/local/bin /usr/bin; do
           mkdir -p "${binpath}"
           cat > "${binpath}/freedesktop-sdk-stripper" <<'EOF'
          #!/bin/sh
          set -eu

          # Compatibility shim for bst2 images that do not ship the FSDK stripper helper.
          # The build only needs the command to exist; stripping debug symbols is optional
          # for the lab lane, and returning success keeps the build moving.
          for arg in "$@"; do
           case "$arg" in
             -*) ;;
             *)
               if [ -d "$arg" ]; then
                 find "$arg" -type f 2>/dev/null | while read -r path; do
                   file "$path" 2>/dev/null | grep -q 'ELF' && strip --strip-unneeded "$path" 2>/dev/null || true
                 done
               elif [ -f "$arg" ]; then
                 file "$arg" 2>/dev/null | grep -q 'ELF' && strip --strip-unneeded "$arg" 2>/dev/null || true
               fi
               ;;
           esac
          done
          exit 0
          EOF
           chmod 0755 "${binpath}/freedesktop-sdk-stripper"
          done
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          # skopeo is not in the bst2 image; use podman instead.
          # Load the OCI layout into podman local storage, then push by image ID.
          # docker:// transport prefix is required for podman push to a registry.
          IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
          podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
          podman rmi "${IMAGE_ID}" 2>/dev/null || true

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="
