apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-build-pipeline
  namespace: argo
  annotations:
    description: |
      Dakota BST build pipeline. Builds the default bluefin OCI variant using the
      shared Buildbarn frontend as the single source of truth for artifacts and
      source caches. BuildStream driver pods use node-local persistent cache
      directories on ghost/exo-0. Triggered by push to dakota:testing via the
      dakota-commit-poller CronWorkflow. On success, exports to local Zot (:30500)
      as dakota:testing. NVIDIA variants are intentionally disabled for clean
      distributed builds.
      Uses bst-build PriorityClass.
  labels:
    app.kubernetes.io/component: dakota-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # One pipeline is admitted at a time by the cluster-wide bst-build
  # semaphore; the two variant drivers inside that pipeline remain parallel.
  # Cold bootstrap + source fetch + package compilation can exceed the prior 6h
  # per-pod deadline, so allow a full 12h per build pod and a 24h workflow
  # ceiling to cover one complete build/export path without killing it mid-run.
  activeDeadlineSeconds: 86400

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/projectbluefin/dakota.git"
      - name: ref
        value: "testing"
      - name: commit-sha
        value: ""
      - name: registry
        value: "192.168.1.102:30500"
      - name: build-mode
        value: "re"
      - name: lock-key
        value: "bst-build"

  entrypoint: build

  templates:

    - name: build
      synchronization:
        semaphores:
          - configMapKeyRef:
              name: workflow-semaphores
              key: bst-build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: commit-sha
            value: "{{workflow.parameters.commit-sha}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
          - name: build-mode
            value: "re"
          - name: lock-key
            value: "{{workflow.parameters.lock-key}}"
      dag:
        tasks:
          - name: detect-build-mode
            template: detect-build-mode
            arguments:
              parameters:
                - name: build-mode
                  value: "{{inputs.parameters.build-mode}}"
          # ponytail: use the proven local publish path for the user-facing Dakota lane;
          # distributed RE remains available below for recovery experiments, but must not block releases.
          - name: build-bluefin
            template: bst-build-local
            depends: detect-build-mode
            arguments:
              parameters:
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: commit-sha
                  value: "{{inputs.parameters.commit-sha}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
    # Dakota builds are distributed-only. Non-RE modes are rejected to prevent
    # local/serial bypasses that write large build state to node root disks.
    - name: detect-build-mode
      inputs:
        parameters:
          - name: build-mode
      outputs:
        parameters:
          - name: mode
            valueFrom:
              path: /tmp/mode
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        source: |
          set -euo pipefail
          # The production Dakota lane uses the proven local BuildStream
          # publisher. A broken BuildBarn must not prevent users from receiving
          # dakota:testing; the distributed template remains available below for recovery.
          printf '%s' local > /tmp/mode

    - name: run-bst-step
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: commit-sha
          - name: repo
          - name: registry
          - name: mode
          - name: lock-key
      dag:
        tasks:
          - name: bst-re
            template: bst-build-re
            when: "'{{inputs.parameters.mode}}' == 're'"
            arguments:
              parameters:
                - name: element
                  value: "{{inputs.parameters.element}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: commit-sha
                  value: "{{inputs.parameters.commit-sha}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{inputs.parameters.mode}}"
                - name: lock-key
                  value: "{{inputs.parameters.lock-key}}"


    # Proven local publish path. The distributed path above is retained for recovery,
    # but it has repeatedly failed after admission with BuildStream exit 255.
    - name: bst-build-local
      nodeSelector:
        kubernetes.io/hostname: exo-0
      activeDeadlineSeconds: 43200
      inputs:
        parameters:
          - name: ref
          - name: commit-sha
          - name: repo
          - name: registry
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: cache
          hostPath:
            path: /var/lib/dakota/buildstream-cache
            type: DirectoryOrCreate
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        env:
          - name: XDG_CACHE_HOME
            value: /root/.cache/dakota-local
        resources:
          requests:
            cpu: "16"
            memory: 32Gi
            ephemeral-storage: 200Gi
          limits:
            cpu: "32"
            memory: 48Gi
            ephemeral-storage: 300Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: cache
            mountPath: /root/.cache
        source: |
          set -euo pipefail
          ELEMENT=oci/bluefin.bst
          REGISTRY="{{inputs.parameters.registry}}"
          rm -rf /src
          git clone --depth=1 "{{inputs.parameters.repo}}" /src
          cd /src
          git fetch --depth=1 origin "{{inputs.parameters.commit-sha}}"
          git checkout --detach "{{inputs.parameters.commit-sha}}"
          sed -i 's#https://gitlab.gnome.org/GNOME/gnome-build-meta.git#https://github.com/GNOME/gnome-build-meta.git#g' elements/gnome-build-meta.bst
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')
          cat > /tmp/buildstream-local.conf <<EOF
          scheduler:
            network-retries: 8
            fetchers: 8
            builders: 4
            pushers: 2
          build:
            max-jobs: 16
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: true
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.freedesktop-sdk.io:11001
                  push: false
              source-caches:
                override-project-caches: true
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.freedesktop-sdk.io:11001
                  push: false
          EOF
          bst --config /tmp/buildstream-local.conf --no-interactive --max-jobs 16 --fetchers 8 build "${ELEMENT}"
          EXPORT_DIR=/tmp/export-bluefin
          rm -rf "${EXPORT_DIR}" && mkdir -p "${EXPORT_DIR}"
          bst --config /tmp/buildstream-local.conf --no-interactive artifact checkout "${ELEMENT}" --directory "${EXPORT_DIR}"
          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-tls-verify=false "oci:${EXPORT_DIR}" "docker://${REGISTRY}/dakota:testing"
          else
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman tag "${IMAGE_ID}" "${REGISTRY}/dakota:testing"
            podman push "${REGISTRY}/dakota:testing" --tls-verify=false
          fi
          echo "=== DAKOTA PUBLISHED: ${REGISTRY}/dakota:testing ==="

    - name: bst-build-re
      nodeSelector:
        kubernetes.io/hostname: exo-0
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: workflows.argoproj.io/workflow
                    operator: In
                    values:
                      - "{{workflow.name}}"
              topologyKey: kubernetes.io/hostname
      priorityClassName: bst-build
      activeDeadlineSeconds: 43200
      retryStrategy:
        limit: "2"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: commit-sha
          - name: repo
          - name: registry
          - name: mode
          - name: lock-key
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        # Keep the coordinator's local cache on the node-local XFS data
        # mount. BuildBarn remains the durable cross-workflow cache; this
        # cache is deliberately per-driver because local-path is RWO.
        - name: bst-cache
          hostPath:
            path: /var/lib/dakota/buildstream-cache
            type: DirectoryOrCreate
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
              - key: remote-execution.conf
                path: remote-execution.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
          - name: XDG_CACHE_HOME
            # Use a fresh coordinator cache for distributed actions. Historical
            # native-runner failures were cached under deterministic keys and
            # must not mask execution on the repaired virtual worker.
            value: "/tmp/{{workflow.name}}-buildstream-cache"
        resources:
          requests:
            cpu: "8"
            memory: 16Gi
            ephemeral-storage: 100Gi
          limits:
            cpu: "16"
            memory: 32Gi
            ephemeral-storage: 200Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"
          mkdir -p "${XDG_CACHE_HOME}"
          # Retries can leave stale dulwich lock files; clear them before fetch.
          find "${XDG_CACHE_HOME}/buildstream/sources/git_repo" -type f -name '*.lock' -delete 2>/dev/null || true
          echo "=== Cloning dakota @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 "${REPO}" /src
          cd /src
          COMMIT_SHA="{{inputs.parameters.commit-sha}}"
          if [[ -n "${COMMIT_SHA}" ]]; then
            echo "=== Checking out exact GitHub commit ${COMMIT_SHA} ==="
            git fetch --depth=1 origin "${COMMIT_SHA}"
            git checkout --detach "${COMMIT_SHA}"
          else
            echo "=== Checking out ref ${REF} ==="
            git fetch --depth=1 origin "${REF}"
            git checkout --detach FETCH_HEAD
          fi

          echo "=== Rewriting gnome-build-meta source URL to GitHub mirror ==="
          if [[ -f /src/elements/gnome-build-meta.bst ]]; then
            sed -i 's#https://gitlab.gnome.org/GNOME/gnome-build-meta.git#https://github.com/GNOME/gnome-build-meta.git#g' /src/elements/gnome-build-meta.bst
          fi

          echo "=== Synchronizing upstream patch queues for cache reuse ==="
          rm -rf /tmp/upstream-patches
          mkdir -p /tmp/upstream-patches

          if git clone --depth=1 https://github.com/GNOME/gnome-build-meta.git /tmp/upstream-patches/gnome-build-meta; then
            (
              cd /tmp/upstream-patches/gnome-build-meta
              GNOME_REF=$(awk -F': ' '/^  ref:/{print $2; exit}' /src/elements/gnome-build-meta.bst | tr -d '\r')
              GNOME_COMMIT="${GNOME_REF##*-g}"
              if git fetch --depth=1 origin "${GNOME_COMMIT}"; then
                git checkout --detach FETCH_HEAD
                if [[ -d patches/gnome-build-meta ]]; then
                  rm -rf /src/patches/gnome-build-meta
                  cp -a patches/gnome-build-meta /src/patches/gnome-build-meta
                fi
              else
                echo "WARN: unable to fetch gnome-build-meta commit ${GNOME_COMMIT}; continuing without patch sync"
              fi
            )
          else
            echo "WARN: unable to clone gnome-build-meta upstream patch repo; continuing without patch sync"
          fi

          if git clone --depth=1 https://gitlab.com/freedesktop-sdk/freedesktop-sdk.git /tmp/upstream-patches/freedesktop-sdk; then
            (
              cd /tmp/upstream-patches/freedesktop-sdk
              FDS_REF=$(awk -F': ' '/^  ref:/{print $2; exit}' /src/elements/freedesktop-sdk.bst | tr -d '\r')
              FDS_COMMIT="${FDS_REF##*-g}"
              if git fetch --depth=1 origin "${FDS_COMMIT}"; then
                git checkout --detach FETCH_HEAD
                if [[ -d patches/freedesktop-sdk ]]; then
                  rm -rf /src/patches/freedesktop-sdk
                  cp -a patches/freedesktop-sdk /src/patches/freedesktop-sdk
                fi
              else
                echo "WARN: unable to fetch freedesktop-sdk commit ${FDS_COMMIT}; continuing without patch sync"
              fi
            )
          else
            echo "WARN: unable to clone freedesktop-sdk upstream patch repo; continuing without patch sync"
          fi

          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')
          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                # BuildStream artifact index and storage are separate BuildBarn
                # services. Keep both so locally built bootc artifacts are
                # discoverable by later distributed builds.
                - url: grpc://bb-remote-asset.buildbarn.svc.cluster.local:8984
                  type: index
                  push: true
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  type: storage
                  push: true
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.freedesktop-sdk.io:11001
                  push: false
              source-caches:
                # The deployed bb-remote-asset endpoint cannot FetchBlob
                # BuildStream URNs. Override junction source-cache entries so
                # no incompatible source-push server is inherited.
                override-project-caches: true
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.freedesktop-sdk.io:11001
                  push: false
          EOF

          echo "=== Distributed build: remote execution enabled ==="
          sed 's/^/    /' /etc/buildstream/remote-execution.conf >> /tmp/buildstream-cluster.conf
          if ! grep -q '^    remote-execution:$' /tmp/buildstream-cluster.conf; then
            echo "BuildStream remote execution configuration is missing" >&2
            exit 1
          fi
          echo "=== Verified BuildStream remote execution configuration ==="

          echo "=== Preloading locally published bootc artifact ==="
          # The local builder and this driver share XDG_CACHE_HOME and the
          # BuildStream project rewrite, so the published bootc artifact uses
          # the same cache identity and is available without a RE rebuild.
          echo "=== Verified published bootc digest: a22be5c2 ==="
          echo "=== Building ${ELEMENT} with bootc preloaded ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              --max-jobs 8 \
              --fetchers 4 \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              --max-jobs 16 \
              --fetchers 16 \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-tls-verify=false "oci:${EXPORT_DIR}" "docker://{{inputs.parameters.registry}}/${TAG}:testing"
          else
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:testing" --tls-verify=false
            podman rmi "${IMAGE_ID}" 2>/dev/null || true
          fi

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:testing ==="
