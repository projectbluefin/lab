apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-build-pipeline
  namespace: argo
  annotations:
    description: |
      Additive dakota BST build pipeline. Builds the bluefin and bluefin-nvidia OCI
      variants in parallel using the same shared Buildbarn frontend and persistent
      hostPath cache, routing artifact cache push/pulls to the shared Buildbarn
      frontend (:8980 gRPC) for hot builds. Triggered by push to dakota:testing
      via dakota-commit-poller CronWorkflow. On success, exports to local Zot
      (:30500). Uses bst-build PriorityClass — higher priority than lab-test-vm
      so BST cache-seeding work wins scheduling disputes.
  labels:
    app.kubernetes.io/component: dakota-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  # BST build concurrency is handled by the scheduler via pod resource requests.
  # Cold bootstrap + source fetch + package compilation can exceed the prior 6h
  # per-pod deadline, so allow a full 12h per build pod and a 24h workflow
  # ceiling to cover one complete build/export path without killing it mid-run.
  activeDeadlineSeconds: 86400

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/projectbluefin/dakota.git"
      - name: ref
        value: "testing"
      - name: commit-sha
        value: ""
      - name: registry
        value: "192.168.1.102:30500"
      # auto: distributed RE when the USB4 link is up on both nodes, else
      # cache-only. Operators can force either mode.
      - name: build-mode
        value: "auto"

  entrypoint: build

  templates:

    - name: build
      synchronization:
        semaphores:
        - configMapKeyRef:
            name: workflow-semaphores
            key: bst-build
      inputs:
        parameters:
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: commit-sha
            value: "{{workflow.parameters.commit-sha}}"
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
          # Plain default (not a workflow-parameter reference) so callers that
          # invoke this template via templateRef (dakota-commit-poller) resolve
          # it without defining the parameter themselves.
          - name: build-mode
            value: "auto"
      dag:
        tasks:
          - name: detect-build-mode
            template: detect-build-mode
            arguments:
              parameters:
                - name: build-mode
                  value: "{{inputs.parameters.build-mode}}"
          - name: build-bluefin
            template: bst-build
            depends: detect-build-mode
            arguments:
              parameters:
                - name: element
                  value: "oci/bluefin.bst"
                - name: tag
                  value: "dakota-cluster-testing"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: commit-sha
                  value: "{{inputs.parameters.commit-sha}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"
          # Keep the two variants serialized so the lab can schedule each BuildStream
          # pod within the available memory reservations on ghost/exo-0.
          - name: build-bluefin-nvidia
            template: bst-build
            depends: build-bluefin
            arguments:
              parameters:
                - name: element
                  value: "oci/bluefin-nvidia.bst"
                - name: tag
                  value: "dakota-cluster-testing-nvidia"
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: commit-sha
                  value: "{{inputs.parameters.commit-sha}}"
                - name: repo
                  value: "{{inputs.parameters.repo}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: mode
                  value: "{{tasks.detect-build-mode.outputs.parameters.mode}}"

    # Decide between distributed remote execution and cache-only builds.
    # RE fans action input roots out across nodes — safe on the USB4 data
    # plane, but it saturates 1 GbE and starves the control plane. The
    # usb4-link-monitor DaemonSet keeps a live up/down annotation on ghost
    # and exo-0; RE is selected only when both report "up". Missing or
    # unreadable annotations fail safe to cache-only.
    - name: detect-build-mode
      inputs:
        parameters:
          - name: build-mode
      outputs:
        parameters:
          - name: mode
            valueFrom:
              path: /tmp/mode
      script:
        image: cgr.dev/chainguard/kubectl:latest-dev
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        source: |
          set -uo pipefail
          REQUESTED="{{inputs.parameters.build-mode}}"
          MODE=cache-only
          case "${REQUESTED}" in
            re) MODE=re ;;
            cache-only) MODE=cache-only ;;
            auto)
              ANNOT='{.metadata.annotations.lab\.projectbluefin\.io/usb4-link}'
              G=$(kubectl get node ghost -o jsonpath="${ANNOT}" 2>/dev/null || echo unknown)
              E=$(kubectl get node exo-0 -o jsonpath="${ANNOT}" 2>/dev/null || echo unknown)
              echo "usb4-link annotations: ghost=${G:-unset} exo-0=${E:-unset}"
              if [[ "${G}" == "up" && "${E}" == "up" ]]; then
                MODE=re
              fi
              ;;
            *) echo "unknown build-mode '${REQUESTED}', using cache-only" >&2 ;;
          esac
          echo "build mode: ${MODE}"
          printf '%s' "${MODE}" > /tmp/mode

    - name: bst-build
      priorityClassName: bst-build
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  workflows.argoproj.io/workflow: "{{workflow.name}}"
      # The build uses a persistent hostPath cache for retry acceleration plus a checked-in
      # BuildStream config that points the build at the shared Buildbarn frontend for remote
      # cache/writeback and upstream fallback caches. Cold bootstrap and source fetch work can
      # still exceed the prior 6h step deadline, so allow 12h per pod to finish a full
      # build/export cycle before the workflow retries.
      activeDeadlineSeconds: 43200
      retryStrategy:
        limit: "2"
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: element
          - name: tag
          - name: ref
          - name: commit-sha
          - name: repo
          - name: registry
          - name: mode
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          hostPath:
            path: /var/tmp/bst-cache/{{inputs.parameters.tag}}
            type: DirectoryOrCreate
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
              - key: remote-execution.conf
                path: remote-execution.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        # gRPC is not fork-safe: BuildStream's fetch workers are forked while the
        # parent process may hold a live gRPC channel (CASD/remote cache), which can
        # deadlock a forked worker on an inherited IPC pipe (observed hang: worker
        # blocked in anon_pipe_read, parent idle in ep_poll, zero CPU). These env
        # vars are the upstream-documented mitigation (grpc/grpc#16037,
        # grpc.io/blog/fork-support): poll strategy avoids epoll's background
        # thread/pipe that breaks across fork, and fork-support enables gRPC's
        # partial fork-safety path.
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
        resources:
          requests:
            cpu: "500m"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          # Start from the checked-in BuildStream remote-cache config and add only
          # the project-specific override needed for this checkout. This keeps the
          # build path remote-cache-first and friendly to upstream BuildStream usage.
          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          ELEMENT="{{inputs.parameters.element}}"
          TAG="{{inputs.parameters.tag}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"
          echo "=== Cloning dakota @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 "${REPO}" /src
          cd /src
          COMMIT_SHA="{{inputs.parameters.commit-sha}}"
          if [[ -n "${COMMIT_SHA}" ]]; then
            echo "=== Checking out exact GitHub commit ${COMMIT_SHA} ==="
            git fetch --depth=1 origin "${COMMIT_SHA}"
            git checkout --detach "${COMMIT_SHA}"
          else
            echo "=== Checking out ref ${REF} ==="
            git fetch --depth=1 origin "${REF}"
            git checkout --detach FETCH_HEAD
          fi

          echo "=== Synchronizing upstream patch queues for cache reuse ==="
          rm -rf /tmp/upstream-patches
          mkdir -p /tmp/upstream-patches
          git clone --depth=1 https://gitlab.gnome.org/GNOME/gnome-build-meta.git /tmp/upstream-patches/gnome-build-meta >/dev/null 2>&1
          (
            cd /tmp/upstream-patches/gnome-build-meta
            GNOME_REF=$(awk -F': ' '/^  ref:/{print $2; exit}' /src/elements/gnome-build-meta.bst | tr -d '\r')
            git fetch --depth=1 origin "${GNOME_REF}" >/dev/null 2>&1 || true
            git checkout --detach "${GNOME_REF}" >/dev/null 2>&1 || git checkout --detach FETCH_HEAD >/dev/null 2>&1 || true
            if [[ -d patches/gnome-build-meta ]]; then
              rm -rf /src/patches/gnome-build-meta
              cp -a patches/gnome-build-meta /src/patches/gnome-build-meta
            fi
          )
          git clone --depth=1 https://gitlab.com/freedesktop-sdk/freedesktop-sdk.git /tmp/upstream-patches/freedesktop-sdk >/dev/null 2>&1
          (
            cd /tmp/upstream-patches/freedesktop-sdk
            FDS_REF=$(awk -F': ' '/^  ref:/{print $2; exit}' /src/elements/freedesktop-sdk.bst | tr -d '\r')
            git fetch --depth=1 origin "${FDS_REF}" >/dev/null 2>&1 || true
            git checkout --detach "${FDS_REF}" >/dev/null 2>&1 || git checkout --detach FETCH_HEAD >/dev/null 2>&1 || true
            if [[ -d patches/freedesktop-sdk ]]; then
              rm -rf /src/patches/freedesktop-sdk
              cp -a patches/freedesktop-sdk /src/patches/freedesktop-sdk
            fi
          )

          # Use the checkout's project.conf to scope the remote-cache override to the
          # active project name while leaving the checked-in config as the shared baseline.
          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')
          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: true
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.freedesktop-sdk.io:11001
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
              source-caches:
                override-project-caches: false
                servers:
                - url: https://gbm.gnome.org:11003
                  push: false
                - url: https://cache.freedesktop-sdk.io:11001
                  push: false
                - url: https://cache.projectbluefin.io:11001
                  push: false
          EOF

          # Distributed remote execution only when the detect-build-mode step
          # selected it AND this is the first attempt. Retries force cache-only:
          # the common retry cause is the USB4 link dropping mid-build, and RE
          # input-root fan-out over 1GbE saturates the LAN. Everything already
          # built is in the Buildbarn cache, so the cache-only retry is cheap.
          MODE="{{inputs.parameters.mode}}"
          ATTEMPT="{{retries}}"
          if [[ "${MODE}" == "re" && "${ATTEMPT}" == "0" ]]; then
            echo "=== Distributed build: remote execution enabled (USB4 link up) ==="
            sed 's/^/    /' /etc/buildstream/remote-execution.conf >> /tmp/buildstream-cluster.conf
          else
            echo "=== Cache-only build (mode=${MODE}, attempt=${ATTEMPT}) ==="
          fi

          echo "=== Building ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              build "${ELEMENT}"

          echo "=== Exporting ${ELEMENT} ==="
          EXPORT_DIR="/tmp/export-$(basename ${ELEMENT} .bst)"
          mkdir -p "${EXPORT_DIR}"
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              artifact checkout "${ELEMENT}" \
              --directory "${EXPORT_DIR}"

          echo "=== Pushing to local Zot ==="
          # Prefer skopeo for direct OCI-layout → registry copies. It avoids the
          # extra podman pull/push round-trip that was wasting time on the export step.
          if command -v skopeo >/dev/null 2>&1; then
            skopeo copy --dest-tls-verify=false "oci:${EXPORT_DIR}" "docker://{{inputs.parameters.registry}}/${TAG}:latest"
          else
            IMAGE_ID=$(podman pull "oci:${EXPORT_DIR}" | tail -1)
            podman push "${IMAGE_ID}" "docker://{{inputs.parameters.registry}}/${TAG}:latest" --tls-verify=false
            podman rmi "${IMAGE_ID}" 2>/dev/null || true
          fi

          echo "=== Build complete: {{inputs.parameters.registry}}/${TAG}:latest ==="
