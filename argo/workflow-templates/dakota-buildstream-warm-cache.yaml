apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-buildstream-warm-cache
  namespace: argo
  annotations:
    description: |
      Runs a single BuildStream build against the Dakota checkout to warm the
      shared Buildbarn remote cache before the main Dakota build pipeline starts.
      It uses the checked-in BuildStream remote-cache config, keeps the pod-local
      cache on a hostPath mount, and exits after the warm-up build completes so
      it stays lightweight and safe.
  labels:
    app.kubernetes.io/component: dakota-build
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  activeDeadlineSeconds: 43200

  arguments:
    parameters:
      - name: repo
        value: "https://github.com/projectbluefin/dakota.git"
      - name: ref
        value: "deploy/fix-gcc-bootstrap"
      - name: element
        value: "oci/bluefin.bst"
      - name: registry
        value: "192.168.1.102:30500"

  entrypoint: warm-cache

  templates:
    - name: warm-cache
      priorityClassName: bst-build
      inputs:
        parameters:
          - name: repo
            value: "{{workflow.parameters.repo}}"
          - name: ref
            value: "{{workflow.parameters.ref}}"
          - name: element
            value: "{{workflow.parameters.element}}"
          - name: registry
            value: "{{workflow.parameters.registry}}"
      volumes:
        - name: fuse
          hostPath:
            path: /dev/fuse
        - name: bst-cache
          hostPath:
            path: /var/tmp/bst-cache/warm-cache
            type: DirectoryOrCreate
        - name: buildstream-config
          configMap:
            name: buildstream-remote-cache
            items:
              - key: dakota-buildstream.conf
                path: buildstream.conf
      script:
        image: "{{inputs.parameters.registry}}/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d"
        command: [bash]
        securityContext:
          privileged: true
          seLinuxOptions:
            type: spc_t
        env:
          - name: GRPC_POLL_STRATEGY
            value: poll
          - name: GRPC_ENABLE_FORK_SUPPORT
            value: "1"
        resources:
          requests:
            cpu: "4"
            memory: 8Gi
          limits:
            cpu: "8"
            memory: 16Gi
        volumeMounts:
          - name: fuse
            mountPath: /dev/fuse
          - name: bst-cache
            mountPath: /root/.cache/buildstream
          - name: buildstream-config
            mountPath: /etc/buildstream
            readOnly: true
        source: |
          set -euo pipefail

          cp /etc/buildstream/buildstream.conf /tmp/buildstream-cluster.conf
          BST_CONF=/tmp/buildstream-cluster.conf
          ELEMENT="{{inputs.parameters.element}}"
          REF="{{inputs.parameters.ref}}"
          REPO="{{inputs.parameters.repo}}"

          echo "=== Cloning dakota @ ${REF} ==="
          rm -rf /src
          git clone --depth=1 --branch "${REF}" "${REPO}" /src
          cd /src

          PROJECT_NAME=$(awk -F': *' '/^name:/{print $2; exit}' project.conf | tr -d '\r')
          cat >> /tmp/buildstream-cluster.conf <<EOF
          projects:
            ${PROJECT_NAME}:
              artifacts:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: true
              source-caches:
                override-project-caches: false
                servers:
                - url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  push: false
              remote-execution:
                execution-service:
                  url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  connection-config:
                    keepalive-time: 60
                    retry-limit: 8
                    retry-delay: 1000
                    request-timeout: 1800
                storage-service:
                  url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  connection-config:
                    keepalive-time: 60
                    retry-limit: 8
                    retry-delay: 1000
                    request-timeout: 1800
                action-cache-service:
                  url: grpc://frontend.buildbarn.svc.cluster.local:8980
                  connection-config:
                    keepalive-time: 60
                    retry-limit: 8
                    retry-delay: 1000
                    request-timeout: 1800
          EOF

          echo "=== Warming BuildStream cache for ${ELEMENT} ==="
          bst --config "${BST_CONF}" \
              --no-interactive \
              -o x86_64_v3 true \
              build "${ELEMENT}"
