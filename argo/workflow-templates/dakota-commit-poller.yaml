apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-commit-poller
  namespace: argo
  annotations:
    description: |
      Polls GitHub API for new commits on dakota:testing. If HEAD SHA changed
      vs stored state in image-polling-digests ConfigMap, submits
      dakota-build-pipeline. Runs every 5 min via the dakota-commit-poller
      CronWorkflow in manifests/.
  labels:
    app.kubernetes.io/component: commit-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  podGC:
    strategy: OnWorkflowCompletion
  ttlStrategy:
    secondsAfterSuccess: 3600
    secondsAfterFailure: 86400
  # Allow the referenced dakota-build-pipeline to complete.
  activeDeadlineSeconds: 10800
  entrypoint: poll

  arguments:
    parameters:
      - name: repo
        value: "projectbluefin/dakota"
      - name: branch
        value: "testing"
      - name: state-key
        value: "sha-dakota-testing"
      - name: registry
        value: "192.168.1.102:30500"

  templates:

    - name: poll
      dag:
        tasks:
          - name: check-sha
            template: check-sha
          - name: run-build
            depends: "check-sha.Succeeded"
            when: "{{tasks.check-sha.outputs.parameters.changed}} == true"
            templateRef:
              name: dakota-build-pipeline
              template: build
            arguments:
              parameters:
                - name: ref
                  value: "{{workflow.parameters.branch}}"
                - name: commit-sha
                  value: "{{tasks.check-sha.outputs.parameters.sha}}"
                - name: repo
                  value: "https://github.com/{{workflow.parameters.repo}}.git"
                - name: registry
                  value: "{{workflow.parameters.registry}}"

    - name: check-sha
      outputs:
        parameters:
          - name: changed
            valueFrom:
              path: /tmp/changed
          - name: sha
            valueFrom:
              path: /tmp/sha
      script:
        image: ghcr.io/projectbluefin/lab-runner:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -euo pipefail

          # Bootstrap kubectl if not in PATH
          if ! command -v kubectl >/dev/null 2>&1; then
            KUBECTL=/tmp/kubectl
            if [ ! -f "${KUBECTL}" ]; then
              curl -sfL "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl" -o "${KUBECTL}"
              chmod +x "${KUBECTL}"
            fi
            kubectl() { "${KUBECTL}" "$@"; }
          fi
          REPO="{{workflow.parameters.repo}}"
          BRANCH="{{workflow.parameters.branch}}"
          KEY="{{workflow.parameters.state-key}}"

          # Fetch latest commit SHA from GitHub API
          REMOTE=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits?sha=${BRANCH}&per_page=1" \
            | jq -r '.[0].sha')

          echo "Remote SHA:  ${REMOTE}" >&2
          printf '%s\n' "${REMOTE}" > /tmp/sha

          # Read stored SHA from ConfigMap
          STORED=$(kubectl get configmap image-polling-digests \
            -n argo \
            -o jsonpath="{.data.${KEY}}" 2>/dev/null || true)

          echo "Stored SHA:  ${STORED}" >&2

          if [[ "$REMOTE" == "$STORED" ]]; then
            echo "No change — skipping build" >&2
            echo "false" > /tmp/changed
          else
            echo "SHA changed — updating ConfigMap key ${KEY}" >&2
            kubectl patch configmap image-polling-digests \
              -n argo --type merge \
              -p "{\"data\":{\"${KEY}\":\"${REMOTE}\"}}" 2>/dev/null \
            || kubectl patch configmap image-polling-digests \
              -n argo --type merge \
              -p "{\"data\":{\"${KEY}\":\"${REMOTE}\"}}"
            echo "true" > /tmp/changed
          fi

          SCRIPT_EOF