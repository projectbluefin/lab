apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-container-qa-pipeline
  namespace: argo
  annotations:
    description: |
      Containerized Dakota QA pipeline. Runs behave/qecore suites directly
      inside the target OCI image without provisioning a KubeVirt VM. This
      bypasses the bootc-install/containerDisk path that Dakota's
      composefs-oci backend currently cannot satisfy (no bootupd/ostree).
    notes: |
      Use this pipeline to verify dakota:testing and dakota-nvidia:testing
      while the VM-based dakota-qa-pipeline remains blocked on bootupd support.
  labels:
    app.kubernetes.io/component: qa-pipeline
    app.kubernetes.io/part-of: dakota-test-suite
spec:
  serviceAccountName: argo
  activeDeadlineSeconds: 3600
  entrypoint: pipeline

  arguments:
    parameters:
    - name: image
      value: "192.168.1.102:30500/dakota"
    - name: image-tag
      value: "testing"
    - name: suites
      value: "smoke,developer,system"
    - name: variant
      value: "dakota"
    - name: branch
      value: "main"

  templates:

  - name: pipeline
    dag:
      tasks:
      - name: assert-image
        template: assert-image
        arguments:
          parameters:
          - name: image
            value: "{{workflow.parameters.image}}"
          - name: image-tag
            value: "{{workflow.parameters.image-tag}}"

      - name: test-lane
        depends: "assert-image.Succeeded"
        withItems:
        - smoke
        - developer
        - system
        when: "'{{workflow.parameters.suites}}' =~ '{{item}}'"
        templateRef:
          name: run-container-tests
          template: run-container-tests
        arguments:
          parameters:
          - name: image
            value: "{{workflow.parameters.image}}"
          - name: image-tag
            value: "{{workflow.parameters.image-tag}}"
          - name: suite
            value: "{{item}}"
          - name: variant
            value: "{{workflow.parameters.variant}}"
          - name: branch
            value: "{{workflow.parameters.branch}}"

  - name: assert-image
    inputs:
      parameters:
      - name: image
      - name: image-tag
    script:
      image: quay.io/skopeo/stable@sha256:c7d3c512612f52805023cd38351081dad7e2729fc13d14b701e47c7c8bdd6615
      command: [sh]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      source: |
        set -eu
        IMAGE="{{inputs.parameters.image}}"
        TAG="{{inputs.parameters.image-tag}}"
        DIGEST=$(skopeo inspect --tls-verify=false --format '{{.Digest}}' \
          "docker://${IMAGE}:${TAG}" 2>/dev/null || echo "")
        if [ -n "${DIGEST}" ]; then
          echo "image ${IMAGE}:${TAG} ready: ${DIGEST}" >&2
        else
          echo "ERROR: image ${IMAGE}:${TAG} not found in registry" >&2
          exit 1
        fi
