apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dakota-pr-import-poller
  namespace: argo
  annotations:
    description: |
      Polls GitHub for open Dakota PRs labeled test-on-lab and dispatches the
      in-cluster Dakota batch build workflow for the PR branch. This keeps the
      import path within the lab cluster instead of using the remote builder path.
  labels:
    app.kubernetes.io/component: dakota-pr-import-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  podGC:
    strategy: OnWorkflowCompletion
  ttlStrategy:
    secondsAfterSuccess: 3600
    secondsAfterFailure: 86400
  activeDeadlineSeconds: 10800
  entrypoint: poll-labeled-prs
  templates:
    - name: poll-labeled-prs
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: dakota-pr-import-poller
      script:
        image: cgr.dev/chainguard/wolfi-base:latest
        command: [sh]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          apk add --no-cache bash curl jq kubectl git >/dev/null 2>&1
          exec bash <<'SCRIPT_EOF'
          set -euo pipefail

          API="https://api.github.com"
          REPO="projectbluefin/dakota"
          LABEL="test-on-lab"
          MAX_DISPATCH=4
          DISPATCHED=0

          dispatch_pr() {
            local PR="$1"
            local PR_NUM HEAD_BRANCH TITLE TITLE_SLUG REPO_SLUG

            if [[ "$DISPATCHED" -ge "$MAX_DISPATCH" ]]; then
              PR_NUM=$(echo "$PR" | jq -r '.number')
              echo "PR #${PR_NUM} ${REPO}: dispatch cap (${MAX_DISPATCH}) reached, deferring to next run" >&2
              return
            fi

            PR_NUM=$(echo "$PR" | jq -r '.number')
            HEAD_BRANCH=$(echo "$PR" | jq -r '.head.ref')
            TITLE=$(echo "$PR" | jq -r '.title')
            TITLE_SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//' \
              | cut -c1-30 | sed 's/-$//')
            REPO_SLUG=$(echo "$REPO" | sed 's|.*/||; s/dakota/dak/')

            kubectl create -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: "${REPO_SLUG}-${PR_NUM}-${TITLE_SLUG}-"
            namespace: argo
            labels:
              bluefin.io/trigger: dakota-pr-import
              bluefin.io/pr-number: "${PR_NUM}"
          spec:
            workflowTemplateRef:
              name: dakota-pr-batch-pipeline
            arguments:
              parameters:
                - name: pr-numbers
                  value: "${PR_NUM}"
                - name: repo-slug
                  value: "${REPO}"
                - name: repo-url
                  value: "https://github.com/${REPO}.git"
                - name: base-branch
                  value: "testing"
                - name: max-prs
                  value: "1"
                - name: build-command
                  value: "./ci/build.sh"
                - name: qa-command
                  value: "./ci/qa.sh"
          EOF
            echo "PR #${PR_NUM} ${REPO}: dispatched dakota-pr-batch-pipeline for ${HEAD_BRANCH}" >&2
            (( DISPATCHED++ )) || true
          }

          QUERY=$(jq -rn --arg q "repo:${REPO} is:pr is:open label:${LABEL}" '$q|@uri')
          RESULTS=$(curl -sf \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/search/issues?q=${QUERY}")
          COUNT=$(echo "$RESULTS" | jq '.total_count // 0')
          echo "Found ${COUNT} open Dakota PR(s) with label ${LABEL}" >&2
          if [[ "$COUNT" -gt 0 ]]; then
            while read -r item; do
              PR_URL=$(echo "$item" | jq -r '.pull_request.url')
              PR=$(curl -sf \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "$PR_URL")
              dispatch_pr "$PR"
            done < <(echo "$RESULTS" | jq -c '.items[]')
          fi

          SCRIPT_EOF
