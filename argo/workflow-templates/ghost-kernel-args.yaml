apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ghost-kernel-args
  namespace: argo
  labels:
    app.kubernetes.io/component: ghost-maintenance
    app.kubernetes.io/part-of: bluefin-test-suite
  annotations:
    bluefin.io/description: |
      Sets Strix Halo performance kernel args on ghost via rpm-ostree kargs.
      Runs as root inside a pod pinned to ghost; enters the host mount namespace
      via nsenter so the host rpm-ostree binary and its state are available.
      No workstation SSH required.

      Args applied:
        amd_iommu=off           — 5-12% faster than iommu=pt (kyuz0/amd-strix-halo-toolboxes#66)
        amdgpu.gttsize=61440    — 60 GiB GPU GTT window (64 GB host, 4 GiB reserved for OS)
        ttm.pages_limit=15728640 — matching 60 GiB pinned-memory cap (15728640 * 4 KiB)

      IMPORTANT: Changes require a reboot to take effect. The workflow prints a
      reminder and the pending kargs. It does NOT reboot automatically to avoid
      disrupting the cluster. Schedule a maintenance window and reboot ghost manually.

      Idempotent: rpm-ostree kargs --append-if-missing is a no-op if the arg
      is already present.

      Run with: just run-kernel-args  (or argo submit argo/ghost-kernel-args.yaml)
spec:
  entrypoint: set-kernel-args
  serviceAccountName: argo

  templates:
    - name: set-kernel-args
      nodeSelector:
        kubernetes.io/hostname: ghost
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: ghost-kernel-args
      script:
        image: registry.fedoraproject.org/fedora:latest
        command: [bash, -c]
        securityContext:
          runAsUser: 0
          privileged: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        source: |
          set -euo pipefail

          # Enter the host's mount namespace so the host rpm-ostree binary
          # and its OSTree state (/sysroot, /ostree) are available.
          NSENTER="nsenter --mount=/proc/1/ns/mnt --"

          echo "=== Current kernel args ==="
          ${NSENTER} rpm-ostree kargs

          echo ""
          echo "=== Applying Strix Halo performance kernel args ==="

          ${NSENTER} rpm-ostree kargs \
            --append-if-missing=amd_iommu=off \
            --append-if-missing="amdgpu.gttsize=61440" \
            --append-if-missing="ttm.pages_limit=15728640"

          echo ""
          echo "=== Pending kernel args (take effect after reboot) ==="
          ${NSENTER} rpm-ostree kargs

          echo ""
          echo "IMPORTANT: A reboot is required for the kernel args to take effect."
          echo "Schedule a maintenance window and reboot ghost when ready."
      volumes: []
