apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: patch-golden-disk
  namespace: argo
  annotations:
    description: |
      Retroactively patches an existing golden disk's SSH auth config.
      Use when a disk was built before the bib-disk-configure bug fixes (2026-05-25)
      or when the SSH key secret is rotated.
      Requires NO SSH to ghost — runs as a privileged pod via Argo.
spec:
  templates:
    - name: patch-disk
      inputs:
        parameters:
          - name: image-tag
            value: "latest"
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: golden
          hostPath:
            path: /var/tmp/bluefin-golden
            type: Directory
      container:
        image: quay.io/podman/stable:latest
        securityContext:
          privileged: true
          runAsUser: 0
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
        env:
          - name: SSH_PUBKEY
            valueFrom:
              secretKeyRef:
                name: bluefin-test-ssh-key
                key: id_ed25519.pub
        volumeMounts:
          - name: dev
            mountPath: /dev
          - name: golden
            mountPath: /var/tmp/bluefin-golden
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            TAG="{{inputs.parameters.image-tag}}"
            DISK="/var/tmp/bluefin-golden/${TAG}/disk.raw"
            PUBKEY="${SSH_PUBKEY}"

            if [[ -z "${PUBKEY}" ]]; then
              echo "ERROR: SSH_PUBKEY from bluefin-test-ssh-key secret is empty" >&2
              exit 1
            fi
            if [[ ! -f "${DISK}" ]]; then
              echo "ERROR: golden disk not found: ${DISK}" >&2
              exit 1
            fi

            echo "=== Patching golden disk: ${DISK} ==="
            LOOP=$(losetup -f --show -P "${DISK}")
            echo "Loop: ${LOOP}"

            mkdir -p /mnt/btroot /mnt/btboot
            if blkid "${LOOP}p4" | grep -q 'TYPE="btrfs"'; then
              mount -o subvol=root "${LOOP}p4" /mnt/btroot
            else
              mount "${LOOP}p4" /mnt/btroot
            fi
            mount "${LOOP}p3" /mnt/btboot

            DEPLOY=$(ls /mnt/btroot/ostree/deploy/default/deploy/ | head -1)
            ROOT="/mnt/btroot/ostree/deploy/default/deploy/${DEPLOY}"
            VAR="/mnt/btroot/ostree/deploy/default/var"
            BFT_UID=$(grep '^bluefin-test:' "${ROOT}/etc/passwd" | cut -d: -f3 || echo "1001")

            # Fix authorized_keys
            mkdir -p "${VAR}/home/bluefin-test/.ssh"
            printf '%s\n' "${PUBKEY}" > "${VAR}/home/bluefin-test/.ssh/authorized_keys"
            test -s "${VAR}/home/bluefin-test/.ssh/authorized_keys" || {
              echo "ERROR: authorized_keys empty after write" >&2; exit 1
            }
            chown -R "${BFT_UID}:${BFT_UID}" "${VAR}/home/bluefin-test"
            chmod 750 "${VAR}/home/bluefin-test"
            chmod 700 "${VAR}/home/bluefin-test/.ssh"
            chmod 600 "${VAR}/home/bluefin-test/.ssh/authorized_keys"
            echo "authorized_keys written for UID ${BFT_UID}"

            # Fix sshd config drop-in
            mkdir -p "${ROOT}/etc/ssh/sshd_config.d/"
            printf 'PermitUserEnvironment yes\n' \
              > "${ROOT}/etc/ssh/sshd_config.d/99-bluefin-test.conf"
            chmod 600 "${ROOT}/etc/ssh/sshd_config.d/99-bluefin-test.conf"
            echo "sshd_config.d patched"

            sync
            umount /mnt/btboot
            umount /mnt/btroot
            losetup -d "${LOOP}"

            echo "=== Patch complete: ${DISK} ==="
            echo "Key fingerprint: $(printf '%s' "${PUBKEY}" | ssh-keygen -lf - 2>/dev/null || echo '(ssh-keygen not available)')"
