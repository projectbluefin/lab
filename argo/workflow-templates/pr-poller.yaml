apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pr-poller
  namespace: argo
  labels:
    app.kubernetes.io/component: pr-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  serviceAccountName: argo
  entrypoint: poll-labeled-prs
  templates:
    - name: poll-labeled-prs
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: pr-poller
      script:
        image: ghcr.io/projectbluefin/lab-runner:latest
        command: [bash]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        source: |
          set -euo pipefail

          # Bootstrap kubectl if not in PATH
          if ! command -v kubectl >/dev/null 2>&1; then
            KUBECTL=/tmp/kubectl
            if [ ! -f "${KUBECTL}" ]; then
              curl -sfL "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl" -o "${KUBECTL}"
              chmod +x "${KUBECTL}"
            fi
            kubectl() { "${KUBECTL}" "$@"; }
          fi

          API="https://api.github.com"
          # Max new dispatches per run — prevents burst storms when many PRs are in
          # failure state after a cluster outage.
          MAX_DISPATCH=8
          DISPATCHED=0

          # Repos tested on every PR — no label required.
          AUTO_REPOS=(
           "projectbluefin/common"
           "projectbluefin/bluefin"
           "projectbluefin/bluefin-lts"
           "projectbluefin/dakota"
           "projectbluefin/knuckle"
           "projectbluefin/testsuite"
          )

          dispatch_pr() {
           local PR="$1"
           local REPO SHA PR_NUM HEAD_BRANCH BRANCH TESTSUITE_BRANCH EXISTING TMPL TITLE TITLE_SLUG

           # Rate-limit: stop dispatching once we hit MAX_DISPATCH this run
           if [[ "$DISPATCHED" -ge "$MAX_DISPATCH" ]]; then
             REPO=$(echo "$PR" | jq -r '.base.repo.full_name')
             PR_NUM=$(echo "$PR" | jq -r '.number')
             echo "PR #${PR_NUM} ${REPO}: dispatch cap (${MAX_DISPATCH}) reached, deferring to next run" >&2
             return
           fi

           REPO=$(echo "$PR" | jq -r '.base.repo.full_name')
           SHA=$(echo "$PR"  | jq -r '.head.sha')
           PR_NUM=$(echo "$PR" | jq -r '.number')

           # Dedup: one workflow per PR head SHA — ever. Without this the
           # poller re-dispatched every open PR on every cycle, flooding the
           # cluster with duplicate runs. To force a re-test of the same SHA,
           # delete the old workflow (kubectl delete wf -n argo -l
           # bluefin.io/pr-sha=<sha12>) or push a new commit.
           SHA12="${SHA:0:12}"
           EXISTING=$(kubectl get workflows -n argo \
             -l "bluefin.io/pr-number=${PR_NUM},bluefin.io/pr-sha=${SHA12}" \
             --no-headers 2>/dev/null | wc -l)
           if [[ "$EXISTING" -gt 0 ]]; then
             echo "PR #${PR_NUM} ${REPO}: workflow for ${SHA12} already exists (${EXISTING}), skipping" >&2
             return
           fi

           HEAD_BRANCH=$(echo "$PR" | jq -r '.head.ref')
           HEAD_REPO=$(echo "$PR" | jq -r '.head.repo.clone_url')
           # Testsuite PRs run their exact head repository and branch. Other
           # repositories use the canonical testsuite main branch.
           if [[ "$REPO" == "projectbluefin/testsuite" ]]; then
            TESTSUITE_BRANCH="$HEAD_BRANCH"
            TESTSUITE_REPO="$HEAD_REPO"
           else
            TESTSUITE_BRANCH="main"
            TESTSUITE_REPO="https://github.com/projectbluefin/testsuite"
           fi
           BRANCH="$TESTSUITE_BRANCH"
           REPO_SLUG=$(echo "$REPO" | sed 's|.*/||; s/bluefin-lts/lts/; s/bluefin/blu/; s/dakota/dak/; s/knuckle/knu/; s/bazzite/baz/; s/aurora/aur/')
           TITLE=$(echo "$PR" | jq -r '.title')
           # Slugify title: lowercase, non-alnum to dash, truncate to 30 chars
           TITLE_SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/--*/-/g; s/^-//; s/-$//' \
            | cut -c1-30 | sed 's/-$//')

           # Route to matching WorkflowTemplate + derive per-repo params
           case "$REPO" in
            */dakota)       TMPL="dakota-qa-pipeline"
                            EXTRA_PARAMS="
               - name: testsuite-branch
                 value: ${TESTSUITE_BRANCH}
               - name: testsuite-repo
                 value: ${TESTSUITE_REPO}" ;;
            */knuckle)      TMPL="knuckle-qa-pipeline"
                            EXTRA_PARAMS="" ;;
            */bazzite)      TMPL="bluefin-qa-pipeline"
                            EXTRA_PARAMS="
               - name: image
                 value: ghcr.io/ublue-os/bazzite
               - name: image-tag
                 value: testing
               - name: suites
                 value: system
               - name: variant
                 value: bazzite
               - name: testsuite-branch
                 value: ${TESTSUITE_BRANCH}
               - name: testsuite-repo
                 value: ${TESTSUITE_REPO}" ;;
            */aurora)       TMPL="bluefin-qa-pipeline"
                            EXTRA_PARAMS="
               - name: image
                 value: ghcr.io/ublue-os/aurora
               - name: image-tag
                 value: testing
               - name: suites
                 value: system
               - name: variant
                 value: aurora
               - name: testsuite-branch
                 value: ${TESTSUITE_BRANCH}
               - name: testsuite-repo
                 value: ${TESTSUITE_REPO}" ;;
            */bluefin-lts)  TMPL="bluefin-qa-pipeline"
                            EXTRA_PARAMS="
               - name: image
                 value: ghcr.io/projectbluefin/bluefin-lts
               - name: image-tag
                 value: testing
               - name: suites
                 value: smoke
               - name: variant
                 value: bluefin-lts
               - name: testsuite-branch
                 value: ${TESTSUITE_BRANCH}
               - name: testsuite-repo
                 value: ${TESTSUITE_REPO}" ;;
            */testsuite)    TMPL="bluefin-qa-pipeline"
                             # Run smoke + common against bluefin:testing using
                             # the PR branch so the new/changed scenarios are exercised.
                             EXTRA_PARAMS="
               - name: image-tag
                 value: testing
               - name: suites
                 value: smoke,common
               - name: testsuite-branch
                 value: ${TESTSUITE_BRANCH}
               - name: testsuite-repo
                 value: ${TESTSUITE_REPO}" ;;
            *)              TMPL="bluefin-qa-pipeline"
                            # bluefin/common: smoke only to limit workload size
                            EXTRA_PARAMS="
               - name: image-tag
                 value: testing
               - name: suites
                 value: smoke
               - name: testsuite-branch
                 value: ${TESTSUITE_BRANCH}
               - name: testsuite-repo
                 value: ${TESTSUITE_REPO}" ;;
           esac

           kubectl create -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
           generateName: "${REPO_SLUG}-${PR_NUM}-${TITLE_SLUG}-"
           namespace: argo
           labels:
             bluefin.io/trigger: pr-auto
             bluefin.io/pr-number: "${PR_NUM}"
             bluefin.io/pr-sha: "${SHA12}"
          spec:
           workflowTemplateRef:
             name: ${TMPL}
           arguments:
             parameters:
               - name: sha
                 value: "${SHA}"
               - name: repo
                 value: "${REPO}"
               - name: branch
                 value: "${BRANCH}"
               - name: pr-number
                 value: "${PR_NUM}"${EXTRA_PARAMS}
          EOF
           echo "PR #${PR_NUM} ${REPO}: dispatched ${TMPL}" >&2
           (( DISPATCHED++ )) || true
          }

          # --- Pass 1: every open PR in auto-test repos ---
          for REPO in "${AUTO_REPOS[@]}"; do
           REPO_QUERY=$(jq -rn --arg q "repo:${REPO} is:pr is:open" '$q|@uri')
           PAGE=1
           while true; do
             RESULTS=$(curl -sf \
               -H "Authorization: token ${GITHUB_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               "${API}/search/issues?q=${REPO_QUERY}&per_page=30&page=${PAGE}")
             COUNT=$(echo "$RESULTS" | jq '.total_count // 0')
             ITEMS=$(echo "$RESULTS" | jq '.items | length')
             [[ "$ITEMS" -eq 0 ]] && break
             echo "Repo ${REPO}: ${COUNT} open PR(s), page ${PAGE}, ${ITEMS} items" >&2
             while read -r item; do
               PR_URL=$(echo "$item" | jq -r '.pull_request.url')
               PR=$(curl -sf \
                 -H "Authorization: token ${GITHUB_TOKEN}" \
                 -H "Accept: application/vnd.github+json" \
                 "$PR_URL")
               dispatch_pr "$PR"
             done < <(echo "$RESULTS" | jq -c '.items[]')
             [[ "$ITEMS" -lt 30 ]] && break
             (( PAGE++ ))
           done
          done

          # --- Pass 2: label-based catch-all for projectbluefin repos ---
          LABEL_QUERY=$(jq -rn --arg q "org:projectbluefin is:pr is:open label:test-on-lab" '$q|@uri')
          LABEL_RESULTS=$(curl -sf \
           -H "Authorization: token ${GITHUB_TOKEN}" \
           -H "Accept: application/vnd.github+json" \
           "${API}/search/issues?q=${LABEL_QUERY}")
          LABEL_COUNT=$(echo "$LABEL_RESULTS" | jq '.total_count // 0')
          echo "Found ${LABEL_COUNT} PR(s) with test-on-lab label" >&2
          if [[ "$LABEL_COUNT" -gt 0 ]]; then
           while read -r item; do
             PR_URL=$(echo "$item" | jq -r '.pull_request.url')
             PR=$(curl -sf \
               -H "Authorization: token ${GITHUB_TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               "$PR_URL")
             dispatch_pr "$PR"
           done < <(echo "$LABEL_RESULTS" | jq -c '.items[]')
          fi