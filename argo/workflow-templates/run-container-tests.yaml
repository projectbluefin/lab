apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: run-container-tests
  namespace: argo
  annotations:
    description: |
      Runs Bluefin BDD suites (smoke, common, developer, software, system)
      directly inside a Kubernetes pod built from the target bootc image,
      bypassing KubeVirt virtualization. Uses dbus-run-session +
      qecore-headless for high-speed, low-memory software-rendered e2e desktop
      testing.
  labels:
    app.kubernetes.io/component: test-runner
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  templates:
  - name: run-container-tests
    activeDeadlineSeconds: 3600
    inputs:
      parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "testing"
      - name: suite
        value: "smoke"
      - name: variant
        value: "bluefin"
      - name: branch
        value: "main"
        # testsuite-repo: canonical test repo. Override only for forks.
      - name: testsuite-repo
        value: "https://github.com/projectbluefin/testsuite"
        # testsuite-branch: branch to clone from projectbluefin/testsuite.
        # Use 'main' for nightly runs; set to a PR branch for end-to-end PR testing.
      - name: testsuite-branch
        value: "main"
      - name: behave-tags
        value: ""
    outputs:
      parameters:
      - name: result
        valueFrom:
          path: /tmp/results/result-summary.txt
          default: "No results generated"
    initContainers:
    - name: git-sync
      image: cgr.dev/chainguard/git:latest
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
      - mountPath: /workspace
        name: workspace
      command: [sh, -c]
      args:
      - |
        set -euo pipefail
        # Clone projectbluefin/testsuite — the canonical home for all Bluefin image tests.
        # Falls back to main if the requested branch doesn't exist (PR branch testing).
        TSREPO="{{inputs.parameters.testsuite-repo}}"
        TSBRANCH="{{inputs.parameters.testsuite-branch}}"
        if git clone --depth 1 --branch "${TSBRANCH}" "${TSREPO}" /workspace/testsuite 2>/dev/null; then
          echo "Cloned testsuite @ ${TSBRANCH}"
        else
          echo "Branch ${TSBRANCH} not found, falling back to main" >&2
          git clone --depth 1 "${TSREPO}" /workspace/testsuite
        fi
    - name: ensure-passwd
      image: "{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
      imagePullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        runAsUser: 0
      volumeMounts:
      - mountPath: /mnt/passwd
        name: passwd
      command: [sh, -c]
      args:
      - |
        set -euo pipefail
        # Images such as Dakota's composefs-oci rootfs do not include a UID 1000
        # regular user, but dbus-run-session requires the UID to resolve in
        # /etc/passwd. Copy the image's passwd/group into a shared emptyDir and
        # append a test user entry when missing. The main container mounts these
        # copies at /etc/passwd and /etc/group so it can run as UID 1000.
        cp /etc/passwd /mnt/passwd/passwd
        cp /etc/group /mnt/passwd/group
        if ! grep -q '^bluefin-test:' /mnt/passwd/passwd; then
          echo 'bluefin-test:x:1000:1000:bluefin-test:/home/bluefin-test:/bin/bash' >> /mnt/passwd/passwd
        fi
        if ! grep -q '^bluefin-test:' /mnt/passwd/group; then
          echo 'bluefin-test:x:1000:' >> /mnt/passwd/group
        fi
    container:
      image: "{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
      imagePullPolicy: IfNotPresent
      securityContext:
        # Software rendering does not require root or CAP_SYS_ADMIN. Run as non-root (1000).
        runAsUser: 1000
        runAsGroup: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
      env:
      - name: SUITE
        value: "{{inputs.parameters.suite}}"
      - name: VARIANT
        value: "{{inputs.parameters.variant}}"
      - name: BEHAVE_TAGS
        value: "{{inputs.parameters.behave-tags}}"
      - name: HOME
        value: /home/bluefin-test
      - name: XDG_RUNTIME_DIR
        value: /home/bluefin-test/run
      - name: DBUS_SESSION_BUS_ADDRESS
        value: unix:path=/home/bluefin-test/run/bus
      - name: AT_SPI_BUS_ADDRESS
        value: unix:path=/home/bluefin-test/run/bus
      - name: XDG_SESSION_TYPE
        value: wayland
      - name: XDG_SESSION_DESKTOP
        value: gnome
      - name: GDK_BACKEND
        value: wayland
      - name: CLUTTER_BACKEND
        value: wayland
      - name: LIBGL_ALWAYS_SOFTWARE
        value: "1"
      - name: GALLIUM_DRIVER
        value: llvmpipe
      - name: LANG
        value: C.UTF-8
      - name: LC_ALL
        value: C.UTF-8
      - name: GITHUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: github-token
            key: token
            optional: true
      volumeMounts:
      - mountPath: /workspace
        name: workspace
      - mountPath: /dev/shm
        name: shm
      - mountPath: /home/bluefin-test
        name: home
      - mountPath: /tmp
        name: tmp
      - mountPath: /etc/passwd
        name: passwd
        subPath: passwd
      - mountPath: /etc/group
        name: passwd
        subPath: group
      command: [bash, -c]
      args:
      - |
        set -euo pipefail
        mkdir -p /tmp/results /home/bluefin-test/.local/bin /home/bluefin-test/run
        chmod 700 /home/bluefin-test/run
        export PATH="/home/bluefin-test/.local/bin:${PATH}"

        echo "Installing Python dependencies (behave, qecore, dogtail)..." >&2
        if ! python3 -m pip --version &>/dev/null; then
          echo "pip not found, attempting to bootstrap..." >&2
          python3 -m ensurepip --user --default-pip 2>&1 || {
            echo "ensurepip failed, downloading get-pip.py..." >&2
            curl -sS https://bootstrap.pypa.io/get-pip.py | python3 - --user --quiet || true
          }
        fi

        python3 -m pip install --quiet --user qecore dogtail behave 2>&1 || {
          echo "Warning: Pip installation returned warning/error, checking if packages work" >&2
        }

        # Add symlinks for qecore commands. When pip installs executables
        # directly into ~/.local/bin the source and target are identical;
        # skip those to avoid a non-zero ln exit under set -e.
        for f in /home/bluefin-test/.local/bin/qecore_*; do
          if [ -f "$f" ]; then
            target="/home/bluefin-test/.local/bin/$(basename "$f")"
            if [ "$f" != "$target" ]; then
              ln -sf "$f" "$target"
            fi
          fi
        done

        # Write runner script
        cat >/tmp/run-behave.sh <<'EOF'
        #!/bin/bash
        set -euo pipefail
        export PATH="/home/bluefin-test/.local/bin:${PATH}"
        # testsuite uses its own PYTHONPATH root so 'tests.shared.*' imports resolve.
        export PYTHONPATH="/workspace/testsuite"

        case "${SUITE}" in
          smoke|common|developer|software|system) ;;
          *)
            echo "Unsupported container suite: ${SUITE}" >&2
            exit 2
            ;;
        esac

        echo "Waiting for GNOME Shell AT-SPI to start..." >&2
        python3 /workspace/testsuite/tests/shared/wait_for_shell.py

        echo "Starting ponytail daemon..." >&2
        /usr/libexec/gnome-ponytail-daemon &
        sleep 2

        echo "Executing behave suite..." >&2
        TAGS_ARG="--tags ~@wip"
        if [[ -n "${BEHAVE_TAGS}" ]]; then
          TAGS_ARG="${BEHAVE_TAGS}"
        fi

        BEHAVE_RC=0
        python3 -m behave /workspace/testsuite/tests/${SUITE}/features/ \
          --format json.pretty \
          --outfile /tmp/results/results.json \
          --no-capture ${TAGS_ARG} || BEHAVE_RC=$?

        echo "${BEHAVE_RC}" > /tmp/results/behave-rc.txt
        EOF
        chmod +x /tmp/run-behave.sh

        echo "Bootstrapping dbus-run-session + qecore-headless..." >&2
        # --allow-duplication is required in the container: the constrained
        # process tree makes qecore-headless think it is a duplicate of an
        # already-running instance and exit before executing the test script.
        dbus-run-session -- qecore-headless \
          --session-type wayland \
          --session-desktop gnome \
          --allow-duplication \
          /tmp/run-behave.sh

        BEHAVE_RC=$(cat /tmp/results/behave-rc.txt 2>/dev/null || echo "1")

        # Push back results if GITHUB_TOKEN is present
        if [[ -n "${GITHUB_TOKEN:-}" && -f /tmp/results/results.json ]]; then
          echo "Publishing containerized test results back to repo..." >&2
          rm -rf /tmp/lab-code
          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/projectbluefin/lab.git" /tmp/lab-code
          # Derive image slug for website results JSON.
          # Convention matches run-gnome-tests.yaml:
          #   bluefin:testing     -> bluefin-testing
          #   bluefin:lts-testing -> bluefin-lts-testing (VARIANT contains 'lts')
          #   aurora:testing      -> aurora-testing      (VARIANT=aurora, image-tag=testing)
          #   snosi:latest        -> snosi-latest        (VARIANT=snosi, image-tag=latest)
          #   dakota:testing      -> dakota-testing
          #   bazzite:testing     -> bazzite-testing
          IMAGE_TAG="{{inputs.parameters.image-tag}}"
          case "${VARIANT}" in
            aurora|bazzite|dakota|snosi)
              IMG_SLUG="${VARIANT}-${IMAGE_TAG}" ;;
            *lts*)
              IMG_SLUG="bluefin-lts-${IMAGE_TAG}" ;;
            *)
              IMG_SLUG="bluefin-${IMAGE_TAG}" ;;
          esac

          python3 /tmp/lab-code/scripts/publish_test_results.py \
            /tmp/results/results.json \
            "${IMG_SLUG}" \
            "${SUITE}" \
            "{{workflow.name}}" \
            "${GITHUB_TOKEN}" || echo "Warning: failed to publish test results" >&2
        else
          echo "No GITHUB_TOKEN or missing results.json - skipping publication" >&2
        fi

        # Persist results to ghost host volume if mounted (for historical collection)
        RESULT_DIR="/var/mnt/ghost-data/test-results/{{workflow.name}}/${SUITE}"
        mkdir -p "${RESULT_DIR}"
        cp -r /tmp/results/. "${RESULT_DIR}/" 2>/dev/null || true

        # Write final result summary
        python3 -c "
        import json
        try:
            data = json.load(open('/tmp/results/results.json'))
            failed = sum(1 for f in data for s in f.get('elements',[]) if s.get('status') == 'failed')
            total  = sum(len(f.get('elements',[])) for f in data)
            summary = f'{total - failed}/{total} scenarios passed'
            open('/tmp/results/result-summary.txt', 'w').write(summary)
            print(summary)
        except Exception:
            open('/tmp/results/result-summary.txt', 'w').write('Execution failed')
            print('results.json not found')
        "

        exit "${BEHAVE_RC}"
    volumes:
    - name: workspace
      emptyDir: {}
    - name: xrd
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
    - name: home
      emptyDir: {}
    - name: tmp
      emptyDir: {}
    - name: passwd
      emptyDir: {}
