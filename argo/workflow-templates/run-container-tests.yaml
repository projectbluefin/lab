apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: run-container-tests
  namespace: argo
  annotations:
    description: |
      Runs Bluefin BDD suites (smoke, common, developer, software, system)
      inside a nested, systemd-booted target OCI container. The privileged
      Podman host remains Kubernetes-native and bypasses KubeVirt
      virtualization; qecore-headless runs against the nested GDM session.
  labels:
    app.kubernetes.io/component: test-runner
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  templates:
  - name: run-container-tests
    activeDeadlineSeconds: 3600
    inputs:
      parameters:
      - name: image
        value: "ghcr.io/projectbluefin/bluefin"
      - name: image-tag
        value: "testing"
      - name: suite
        value: "smoke"
      - name: variant
        value: "bluefin"
      - name: branch
        value: "main"
        # testsuite-repo: canonical test repo. Override only for forks.
      - name: testsuite-repo
        value: "https://github.com/projectbluefin/testsuite"
        # testsuite-branch: branch to clone from projectbluefin/testsuite.
        # Use 'main' for nightly runs; set to a PR branch for end-to-end PR testing.
      - name: testsuite-branch
        value: "main"
      - name: behave-tags
        value: ""
    outputs:
      parameters:
      - name: result
        valueFrom:
          path: /tmp/results/result-summary.txt
          default: "No results generated"
    initContainers:
    - name: git-sync
      image: cgr.dev/chainguard/git:latest
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
      - mountPath: /workspace
        name: workspace
      command: [sh, -c]
      args:
      - |
        set -euo pipefail
        # Clone the requested testsuite revision. A missing PR branch must fail so
        # the workflow never reports a result from unrelated test code.
        TSREPO="{{inputs.parameters.testsuite-repo}}"
        TSBRANCH="{{inputs.parameters.testsuite-branch}}"
        git clone --depth 1 --branch "${TSBRANCH}" "${TSREPO}" /workspace/testsuite
        echo "Cloned testsuite @ ${TSBRANCH}"
    script:
      image: quay.io/podman/stable:latest
      imagePullPolicy: IfNotPresent
      securityContext:
        # Podman needs a writable cgroup hierarchy to boot the nested systemd host.
        privileged: true
        runAsUser: 0
        allowPrivilegeEscalation: true
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
          ephemeral-storage: 12Gi
        limits:
          cpu: "4"
          memory: 8Gi
          ephemeral-storage: 24Gi
      env:
      - name: IMAGE
        value: "{{inputs.parameters.image}}:{{inputs.parameters.image-tag}}"
      - name: SUITE
        value: "{{inputs.parameters.suite}}"
      - name: VARIANT
        value: "{{inputs.parameters.variant}}"
      - name: BEHAVE_TAGS
        value: "{{inputs.parameters.behave-tags}}"
      volumeMounts:
      - mountPath: /workspace
        name: workspace
      - mountPath: /tmp/results
        name: results
      - mountPath: /var/lib/containers
        name: containers-storage
      - mountPath: /run/containers
        name: containers-runroot
      command: [bash]
      source: |
        set -euo pipefail
        TARGET_NAME="bluefin-qa-target"
        STORAGE_CONF=/tmp/storage.conf
        cat >"${STORAGE_CONF}" <<'EOF'
        [storage]
        driver = "overlay"
        graphroot = "/var/lib/containers/storage"
        runroot = "/run/containers/storage"
        EOF
        export CONTAINERS_STORAGE_CONF="${STORAGE_CONF}"
        trap 'podman rm --force "${TARGET_NAME}" >/dev/null 2>&1 || true' EXIT

        command -v podman >/dev/null || {
          echo "Podman is required for nested systemd QA" >&2
          exit 1
        }
        mkdir -p /tmp/results
        podman run --detach --systemd=always --network host --privileged \
          --name "${TARGET_NAME}" \
          --volume /workspace:/workspace:ro \
          --volume /tmp/results:/tmp/results \
          --volume /etc/resolv.conf:/etc/resolv.conf:ro \
          "${IMAGE}" >/dev/null

        ready=false
        for _ in $(seq 1 60); do
          state=$(podman exec "${TARGET_NAME}" systemctl is-system-running 2>/dev/null || true)
          if [[ "${state}" == "running" || "${state}" == "degraded" ]] \
            && podman exec "${TARGET_NAME}" systemctl is-active dbus systemd-logind >/dev/null; then
            ready=true
            break
          fi
          sleep 2
        done
        if [[ "${ready}" != true ]]; then
          echo "Nested systemd host did not reach a usable session state" >&2
          podman exec "${TARGET_NAME}" journalctl --no-pager || true
          exit 1
        fi

        echo "Installing test-only Python dependencies in nested target..." >&2
        podman exec "${TARGET_NAME}" bash -c '
          set -euo pipefail
          if ! python3 -m pip --version >/dev/null 2>&1; then
            python3 -m ensurepip --default-pip
          fi
          python3 -m pip install --quiet qecore dogtail behave
        '

        cat >/workspace/run-behave.sh <<'EOF'
        #!/bin/bash
        set -euo pipefail
        # testsuite uses its own PYTHONPATH root so 'tests.shared.*' imports resolve.
        export PYTHONPATH="/workspace/testsuite"

        case "${SUITE}" in
          smoke|common|developer|software|system) ;;
          *)
            echo "Unsupported container suite: ${SUITE}" >&2
            exit 2
            ;;
        esac

        echo "Waiting for GNOME Shell AT-SPI to start..." >&2
        python3 /workspace/testsuite/tests/shared/wait_for_shell.py

        echo "Starting ponytail daemon..." >&2
        /usr/libexec/gnome-ponytail-daemon &
        sleep 2

        echo "Executing behave suite..." >&2
        TAGS_ARG="--tags ~@wip"
        if [[ -n "${BEHAVE_TAGS}" ]]; then
          TAGS_ARG="${BEHAVE_TAGS}"
        fi

        BEHAVE_RC=0
        python3 -m behave /workspace/testsuite/tests/${SUITE}/features/ \
          --format json.pretty \
          --outfile /tmp/results/results.json \
          --no-capture ${TAGS_ARG} || BEHAVE_RC=$?

        echo "${BEHAVE_RC}" > /tmp/results/behave-rc.txt
        EOF
        chmod +x /workspace/run-behave.sh

        echo "Running qecore against the nested systemd/GDM host..." >&2
        QECORE_RC=0
        podman exec \
          --env SUITE \
          --env BEHAVE_TAGS \
          "${TARGET_NAME}" \
          qecore-headless \
          --session-type wayland \
          --session-desktop gnome \
          /workspace/run-behave.sh || QECORE_RC=$?

        BEHAVE_RC=$(cat /tmp/results/behave-rc.txt 2>/dev/null || printf '%s' "${QECORE_RC}")

        if [[ -f /tmp/results/results.json ]]; then
          python3 - <<'PY'
        import json

        with open("/tmp/results/results.json", encoding="utf-8") as result_file:
            data = json.load(result_file)
        failed = sum(
            1 for feature in data for scenario in feature.get("elements", [])
            if scenario.get("status") == "failed"
        )
        total = sum(len(feature.get("elements", [])) for feature in data)
        summary = f"{total - failed}/{total} scenarios passed"
        with open("/tmp/results/result-summary.txt", "w", encoding="utf-8") as summary_file:
            summary_file.write(summary)
        print(summary)
        PY
        else
          printf 'Execution failed' >/tmp/results/result-summary.txt
        fi

        exit "${BEHAVE_RC}"
    volumes:
    - name: workspace
      emptyDir: {}
    - name: results
      emptyDir: {}
    - name: containers-storage
      emptyDir: {}
    - name: containers-runroot
      emptyDir: {}
