apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: run-gnome-tests
  namespace: argo
  annotations:
    bluefin.io/replaces: run-tmt-tests
    bluefin.io/stack: "qecore-headless + behave + pytest + dogtail + gnome-ponytail-daemon"
spec:
  templates:
    - name: run-gnome-tests
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: run-gnome-tests
          bluefin.io/variant: "{{inputs.parameters.variant}}"
          # Descriptive pod name prefix visible in monitoring:
          #   bluefin-smoke-latest-<workflow-id>  or  bluefin-developer-lts-<id>
          bluefin.io/suite: "{{inputs.parameters.suite}}"
        annotations:
          bluefin.io/vm-ip: "{{inputs.parameters.vm-ip}}"
          bluefin.io/issue: "{{inputs.parameters.issue-title}}"
      inputs:
        parameters:
          - name: vm-ip
          - name: suite
            # smoke | developer | software
            value: "smoke"
          - name: variant
            # latest | lts  (gts does not exist)
            value: "latest"
          - name: ssh-user
            value: "bluefin-test"
          - name: ssh-key-secret
            value: "bluefin-test-ssh-key"
          - name: issue-title
            # PR title or issue description for pod annotation; informational only
            value: "manual"
          - name: behave-tags
            # optional: "--tags @smoke" or "--tags @regression"
            value: ""
          - name: branch
            # git ref (branch or commit SHA) the runner clones for test code
            # and step defs. Defaults to main; set per-run to test a PR branch
            # without merging — e.g. `-p branch=fix/test-reliability-and-podgc`
            value: "main"
      # 60-minute ceiling: SSH wait (10min) + dnf install (10min) + test run (30min)
      activeDeadlineSeconds: 3600
      # hostNetwork: KubeVirt masquerade only routes from the host network namespace
      podSpecPatch: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext:
          runAsUser: 0
      nodeSelector:
        kubernetes.io/hostname: ghost
      # outputs.artifacts removed: Argo wait sidecar fails with exit 64 when no
      # artifact repository is configured, even for optional artifacts.
      # Results are captured via outputs.result (stdout) + kubectl logs.
      initContainers:
        - name: git-sync
          image: quay.io/fedora/fedora:latest
          env:
            - name: BRANCH
              value: "{{inputs.parameters.branch}}"
          command: [bash, -c]
          args:
            - |
              for attempt in 1 2 3; do
                # Clear any partial clone from a previous attempt — git clone
                # refuses to write into a non-empty directory and would skip
                # both the primary and the SHA-fallback path otherwise.
                rm -rf /workspace/bluefin-test-suite
                dnf install -y --quiet git 2>&1 | tail -2
                # --branch accepts branch names and tags; for commit SHAs we
                # fall back to a full clone + checkout.
                if git clone --depth 1 --branch "${BRANCH}" \
                    https://github.com/castrojo/testing-lab \
                    /workspace/bluefin-test-suite 2>&1; then
                  echo "Synced testing-lab @ ${BRANCH} (attempt ${attempt})"
                  exit 0
                fi
                rm -rf /workspace/bluefin-test-suite
                if git clone https://github.com/castrojo/testing-lab \
                    /workspace/bluefin-test-suite 2>&1 && \
                   git -C /workspace/bluefin-test-suite checkout "${BRANCH}" 2>&1; then
                  echo "Synced testing-lab @ ${BRANCH} via SHA fallback (attempt ${attempt})"
                  exit 0
                fi
                echo "Attempt ${attempt} failed, retrying in 15s..."
                sleep 15
              done
              exit 1
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      container:
        # Fedora: has dnf, python3, pip3 — matches Bluefin (Fedora-based) package names
        image: quay.io/fedora/fedora:latest
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        env:
          - name: VM_IP
            value: "{{inputs.parameters.vm-ip}}"
          - name: VM_USER
            value: "{{inputs.parameters.ssh-user}}"
          - name: SUITE
            value: "{{inputs.parameters.suite}}"
          - name: VARIANT
            value: "{{inputs.parameters.variant}}"
          - name: BEHAVE_TAGS
            value: "{{inputs.parameters.behave-tags}}"
          - name: SSH_KEY
            value: /etc/ssh/test-key/id_ed25519
        volumeMounts:
          - name: ssh-key
            mountPath: /etc/ssh/test-key
            readOnly: true
          - name: workspace
            mountPath: /workspace
            readOnly: true
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            mkdir -p /tmp/results
            LOG=/tmp/results/runner.log
            exec > >(tee -a "$LOG") 2>&1

            # Install SSH client if not present (base fedora image omits it)
            if ! command -v ssh &>/dev/null; then
              dnf install -y --quiet openssh-clients rsync 2>&1 | tail -3
            fi

            SSH_OPTS="-i ${SSH_KEY} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o LogLevel=ERROR"
            SSH="ssh ${SSH_OPTS} ${VM_USER}@${VM_IP}"
            SCP="scp ${SSH_OPTS} -r"

            # ── Wait for VM SSH to become ready (up to 10 minutes) ──────────
            echo "Waiting for SSH on ${VM_IP} (variant=${VARIANT}, suite=${SUITE})..." >&2
            timeout 600 bash -c "
              until ${SSH} 'echo ready' 2>/dev/null; do sleep 10; done
            "
            echo "SSH ready." >&2

            # ── Install test dependencies inside the VM ──────────────────────
            # Skip if already installed — titan VMs are persistent and retain installs
            # across runs. uinput setup always runs: modprobe/chmod are idempotent and
            # needed because the device node resets on every ostree unlock cycle.
            ${SSH} "
              set -euo pipefail
              verify_test_dependencies() {
                local ok=0
                if ! python3 -c 'import qecore, behave, dogtail, pytest' 2>/dev/null; then
                  echo 'ERROR: Missing required Python modules (qecore, behave, dogtail, pytest).' >&2
                  ok=1
                fi
                if ! rpm -q gnome-ponytail-daemon python3-gnome-ponytail-daemon &>/dev/null; then
                  echo 'ERROR: Missing required RPMs: gnome-ponytail-daemon python3-gnome-ponytail-daemon.' >&2
                  ok=1
                fi
                if ! command -v gnome-ponytail-daemon &>/dev/null; then
                  echo 'ERROR: gnome-ponytail-daemon is not available in PATH after install.' >&2
                  ok=1
                fi
                if [[ ! -x \"\$HOME/.local/bin/qecore-headless\" ]]; then
                  echo 'ERROR: qecore-headless is missing from \$HOME/.local/bin.' >&2
                  ok=1
                fi
                return \${ok}
              }
              if verify_test_dependencies; then
                echo 'Test dependencies already installed, skipping.' >&2
              else
                echo 'Installing test dependencies...' >&2
                sudo ostree admin unlock 2>/dev/null || true
                sudo dnf install -y --quiet gnome-ponytail-daemon python3-gnome-ponytail-daemon 2>&1 | tail -3
                pip3 --version &>/dev/null || python3 -m ensurepip --user 2>&1 | tail -2
                python3 -m pip install --quiet --user qecore behave dogtail pytest python-uinput 2>&1 | tail -3
                for f in \$HOME/.local/bin/qecore_*; do sudo ln -sf \"\$f\" /usr/local/bin/\$(basename \"\$f\") 2>/dev/null; done
                if ! verify_test_dependencies; then
                  echo 'ERROR: Test dependency verification failed after install.' >&2
                  exit 1
                fi
              fi
              sudo modprobe uinput 2>/dev/null || true
              sudo chmod 0666 /dev/uinput 2>/dev/null || true
              sudo chcon -t uinput_device_t /dev/uinput 2>/dev/null || true
            "
            echo "Dependencies ready." >&2

            # ── Copy test suite to VM ────────────────────────────────────────
            echo "Copying tests/${SUITE}/ to VM..." >&2
            ${SSH} "mkdir -p /tmp/bluefin-tests /tmp/results"
            ${SCP} /workspace/bluefin-test-suite/tests/${SUITE} ${VM_USER}@${VM_IP}:/tmp/bluefin-tests/
            WAIT_FOR_SHELL=/workspace/bluefin-test-suite/tests/shared/wait_for_shell.py
            ${SCP} "${WAIT_FOR_SHELL}" ${VM_USER}@${VM_IP}:/tmp/bluefin-tests/${SUITE}/wait_for_shell.py

            # ── Run tests via qecore-headless ────────────────────────────────
            # qecore-headless takes the full test command as a single string.
            # It sets up DBUS_SESSION_BUS_ADDRESS, WAYLAND_DISPLAY, XDG_RUNTIME_DIR,
            # and activates gnome-ponytail-daemon before handing off to behave/pytest.
            # Readiness polling runs inside the same qecore-headless session as each
            # test command so unsafe_mode and AT-SPI state are verified in-context.
            TAGS_ARG=""
            if [[ -n "${BEHAVE_TAGS}" ]]; then
              TAGS_ARG="${BEHAVE_TAGS}"
            fi

            # PATH must include ~/.local/bin for user-installed qecore-headless.
            # $BEHAVE_BIN is expanded by the remote shell so qecore-headless
            # receives an absolute path — subprocess.Popen(shell=False) won't
            # expand variables inside the command string it receives.
            # Save the overall test exit code so we can always SCP results before exiting.
            TEST_RC=0
            ${SSH} "
              export PATH=\$HOME/.local/bin:\$PATH
              export BLUEFIN_VARIANT=${VARIANT}
              export TEST_JOURNAL_SINCE=\$(date --iso-8601=seconds)
              echo \"Scoping journal checks to entries since \${TEST_JOURNAL_SINCE}\" >&2
              export BEHAVE_BIN=\$(which behave)
              BEHAVE_RC=0
              PYTEST_RC=0
              if [[ -d /tmp/bluefin-tests/${SUITE}/features ]]; then
                echo 'Running behave suite...' >&2
                \$HOME/.local/bin/qecore-headless \
                  --session-type wayland \
                  --session-desktop gnome \
                  \"bash -lc 'python3 /tmp/bluefin-tests/${SUITE}/wait_for_shell.py && exec \"\$BEHAVE_BIN\" /tmp/bluefin-tests/${SUITE}/features/ --format json.pretty --outfile /tmp/results/results.json --no-capture ${TAGS_ARG}'\" || BEHAVE_RC=\$?
              fi
              if find /tmp/bluefin-tests/${SUITE} -maxdepth 1 -name 'test_*.py' -print -quit | grep -q .; then
                echo 'Running pytest suite...' >&2
                \$HOME/.local/bin/qecore-headless \
                  --session-type wayland \
                  --session-desktop gnome \
                  \"bash -lc 'python3 /tmp/bluefin-tests/${SUITE}/wait_for_shell.py && exec python3 -m pytest -q /tmp/bluefin-tests/${SUITE} --junitxml /tmp/results/pytest-results.xml'\" || PYTEST_RC=\$?
              fi
              if (( BEHAVE_RC != 0 )); then
                exit \$BEHAVE_RC
              fi
              exit \$PYTEST_RC
            " || TEST_RC=$?

            # ── Collect results ──────────────────────────────────────────────
            # Always SCP even when behave exits non-zero (test failures), so
            # artifacts are available for inspection on failed runs.
            # Use trailing /. on source to copy CONTENTS not the directory itself
            # (avoids /tmp/results/results/ nesting when dest already exists).
            echo "Collecting results..." >&2
            ${SCP} ${VM_USER}@${VM_IP}:/tmp/results/. /tmp/results/ || true

            echo "Done. Results in /tmp/results/" >&2
            # Print full results JSON to stderr — captured by Loki and Argo MCP get_workflow_logs
            if [[ -f /tmp/results/results.json ]]; then
              echo "=== BEHAVE RESULTS JSON ===" >&2
              cat /tmp/results/results.json >&2
              echo "=== END BEHAVE RESULTS ===" >&2
            fi
            # Only the final result summary goes to stdout (Argo outputs.result)
            SUMMARY=()
            if [[ -f /tmp/results/results.json ]]; then
              BEHAVE_SUMMARY="$(python3 -c "import json; data=json.load(open('/tmp/results/results.json')); failed=sum(1 for f in data for s in f.get('elements', []) if s.get('status') == 'failed'); total=sum(len(f.get('elements', [])) for f in data); print(f'{total - failed}/{total} behave scenarios passed')" 2>/dev/null || true)"
              [[ -n "${BEHAVE_SUMMARY}" ]] && SUMMARY+=("${BEHAVE_SUMMARY}")
            fi
            if [[ -f /tmp/results/pytest-results.xml ]]; then
              PYTEST_SUMMARY="$(python3 -c "import xml.etree.ElementTree as ET; root=ET.parse('/tmp/results/pytest-results.xml').getroot(); suites=[root] if root.tag == 'testsuite' else root.findall('testsuite'); tests=sum(int(s.attrib.get('tests', 0)) for s in suites); skipped=sum(int(s.attrib.get('skipped', 0)) for s in suites); failures=sum(int(s.attrib.get('failures', 0)) + int(s.attrib.get('errors', 0)) for s in suites); passed=tests - skipped - failures; print(f'{passed}/{tests} pytest checks passed')" 2>/dev/null || true)"
              [[ -n "${PYTEST_SUMMARY}" ]] && SUMMARY+=("${PYTEST_SUMMARY}")
            fi
            if (( ${#SUMMARY[@]} > 0 )); then
              (
                IFS='; '
                printf '%s\n' "${SUMMARY[*]}"
              )
            else
              echo "results not found"
            fi
            # Re-raise the test exit code so Argo marks the step failed on test failures.
            exit ${TEST_RC}
      volumes:
        - name: ssh-key
          secret:
            secretName: "{{inputs.parameters.ssh-key-secret}}"
            defaultMode: 0400
        - name: workspace
          emptyDir: {}
