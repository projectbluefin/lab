apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: run-gnome-tests
  namespace: argo
  annotations:
    bluefin.io/replaces: run-tmt-tests
    bluefin.io/stack: "qecore-headless + behave + dogtail + gnome-ponytail-daemon"
spec:
  templates:
    - name: run-gnome-tests
      metadata:
        labels:
          app.kubernetes.io/part-of: bluefin-test-suite
          bluefin.io/step: run-gnome-tests
          bluefin.io/variant: "{{inputs.parameters.variant}}"
          # Descriptive pod name prefix visible in monitoring:
          #   bluefin-smoke-latest-<workflow-id>  or  bluefin-developer-lts-<id>
          bluefin.io/suite: "{{inputs.parameters.suite}}"
        annotations:
          bluefin.io/vm-ip: "{{inputs.parameters.vm-ip}}"
          bluefin.io/issue: "{{inputs.parameters.issue-title}}"
      inputs:
        parameters:
          - name: vm-ip
          - name: suite
            # smoke | developer | software
            value: "smoke"
          - name: variant
            # latest | lts  (gts does not exist)
            value: "latest"
          - name: ssh-user
            value: "bluefin-test"
          - name: ssh-key-secret
            value: "bluefin-test-ssh-key"
          - name: issue-title
            # PR title or issue description for pod annotation; informational only
            value: "manual"
          - name: behave-tags
            # optional: "--tags @smoke" or "--tags @regression"
            value: ""
      # 60-minute ceiling: SSH wait (10min) + dnf install (10min) + test run (30min)
      activeDeadlineSeconds: 3600
      # hostNetwork: KubeVirt masquerade only routes from the host network namespace
      podSpecPatch: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext:
          runAsUser: 0
      nodeSelector:
        kubernetes.io/hostname: ghost
      outputs:
        artifacts:
          - name: behave-html-report
            path: /tmp/results/report.html
            optional: true
          - name: behave-json-results
            path: /tmp/results/results.json
            optional: true
          - name: runner-log
            path: /tmp/results/runner.log
            optional: true
      container:
        # Fedora: has dnf, python3, pip3 — matches Bluefin (Fedora-based) package names
        image: quay.io/fedora/fedora:latest
        imagePullPolicy: Always
        env:
          - name: VM_IP
            value: "{{inputs.parameters.vm-ip}}"
          - name: VM_USER
            value: "{{inputs.parameters.ssh-user}}"
          - name: SUITE
            value: "{{inputs.parameters.suite}}"
          - name: VARIANT
            value: "{{inputs.parameters.variant}}"
          - name: BEHAVE_TAGS
            value: "{{inputs.parameters.behave-tags}}"
          - name: SSH_KEY
            value: /etc/ssh/test-key/id_ed25519
        volumeMounts:
          - name: ssh-key
            mountPath: /etc/ssh/test-key
            readOnly: true
          - name: tests
            mountPath: /tests
            readOnly: true
        command: [bash, -c]
        args:
          - |
            set -euo pipefail
            mkdir -p /tmp/results
            LOG=/tmp/results/runner.log
            exec > >(tee -a "$LOG") 2>&1

            # Install SSH client if not present (base fedora image omits it)
            if ! command -v ssh &>/dev/null; then
              dnf install -y --quiet openssh-clients rsync 2>&1 | tail -3
            fi

            SSH_OPTS="-i ${SSH_KEY} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -o LogLevel=ERROR"
            SSH="ssh ${SSH_OPTS} ${VM_USER}@${VM_IP}"
            SCP="scp ${SSH_OPTS} -r"

            # ── Wait for VM SSH to become ready (up to 10 minutes) ──────────
            echo "Waiting for SSH on ${VM_IP} (variant=${VARIANT}, suite=${SUITE})..." >&2
            timeout 600 bash -c "
              until ${SSH} 'echo ready' 2>/dev/null; do sleep 10; done
            "
            echo "SSH ready." >&2

            # ── Install test dependencies inside the VM ──────────────────────
            # gnome-ponytail-daemon: bridges AT-SPI coords to Wayland surface coords
            # Bootc images are read-only — dnf may fail; that is non-fatal.
            # python3-pip may already be present (Bluefin includes it).
            echo "Installing test dependencies on VM..." >&2
            ${SSH} "sudo dnf install -y --quiet gnome-ponytail-daemon python3-pip 2>&1 | tail -3 || true"
            # Fallback: bootstrap pip via ensurepip if dnf couldn't install python3-pip
            ${SSH} "pip3 --version &>/dev/null || python3 -m ensurepip --user 2>&1 | tail -2"
            # User install to ~/.local/bin — works regardless of read-only rootfs
            ${SSH} "python3 -m pip install --quiet --user qecore behave dogtail 2>&1 | tail -3"
            # behave-html-pretty-formatter needs explicit registration; skip for now
            echo "Dependencies installed." >&2

            # ── Copy test suite to VM ────────────────────────────────────────
            echo "Copying tests/${SUITE}/ to VM..." >&2
            ${SSH} "mkdir -p /tmp/bluefin-tests"
            ${SCP} /tests/${SUITE} ${VM_USER}@${VM_IP}:/tmp/bluefin-tests/

            # ── Run tests via qecore-headless ────────────────────────────────
            # qecore-headless takes the full behave invocation as a single string.
            # It sets up DBUS_SESSION_BUS_ADDRESS, WAYLAND_DISPLAY, XDG_RUNTIME_DIR,
            # and activates gnome-ponytail-daemon before handing off to behave.
            echo "Running: qecore-headless 'behave /tmp/bluefin-tests/${SUITE}/features/ ...'" >&2
            TAGS_ARG=""
            if [[ -n "${BEHAVE_TAGS}" ]]; then
              TAGS_ARG="${BEHAVE_TAGS}"
            fi

            # PATH must include ~/.local/bin for user-installed qecore-headless.
            # Use absolute paths for both qecore-headless and behave so subprocess.Popen
            # inside qecore-headless finds the behave binary regardless of its env.
            ${SSH} "
              USERBIN=\$(python3 -m site --user-base)/bin
              export PATH=\$USERBIN:\$PATH
              \$USERBIN/qecore-headless \
                '\$USERBIN/behave /tmp/bluefin-tests/${SUITE}/features/ \
                  --format json.pretty \
                  --outfile /tmp/results/results.json \
                  --no-capture \
                  ${TAGS_ARG}'
            "

            # ── Collect results ──────────────────────────────────────────────
            echo "Collecting results..." >&2
            ${SCP} ${VM_USER}@${VM_IP}:/tmp/results/ /tmp/results/ || true

            echo "Done. Results in /tmp/results/" >&2
            # Only the final result summary goes to stdout (Argo outputs.result)
            python3 -c "
            import json, sys
            try:
                data = json.load(open('/tmp/results/results.json'))
                failed = sum(1 for f in data for s in f.get('elements',[]) if s.get('status') == 'failed')
                total  = sum(len(f.get('elements',[])) for f in data)
                print(f'{total - failed}/{total} scenarios passed')
            except Exception:
                print('results.json not found')
            "
      volumes:
        - name: ssh-key
          secret:
            secretName: "{{inputs.parameters.ssh-key-secret}}"
            defaultMode: 0400
        - name: tests
          hostPath:
            # /var/tmp is accessible by the kubelet; sync from src with:
            #   cp -r ~/src/bluefin-test-suite/tests /var/tmp/bluefin-tests
            path: /var/tmp/bluefin-tests
            type: Directory
