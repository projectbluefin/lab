apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: 
      lab:argoproj.io/WorkflowTemplate:argo/run-incluster-tests
    bluefin.io/stack: k8s workload + pytest
  name: run-incluster-tests
  namespace: argo
spec:
  templates:
  - activeDeadlineSeconds: 1800
    container:
      args:
      - |
        apk add --no-cache bash curl jq kubectl git openssh-client python3 >/dev/null 2>&1
        exec bash <<'SCRIPT_EOF'
        set -euo pipefail
        mkdir -p /tmp/results
        LOG=/tmp/results/runner.log
        exec > >(tee -a "${LOG}") 2>&1


        SUITE="/workspace/lab/tests/{{inputs.parameters.suite-path}}"
        test -e "${SUITE}"
        export PYTHONPATH="/workspace/lab:${PYTHONPATH:-}"

        TEST_RC=0
        python3 -m pytest -q "${SUITE}" --junitxml /tmp/results/pytest-results.xml || TEST_RC=$?

        echo "Collected result files:" >&2
        find /tmp/results -maxdepth 1 -type f -printf '%f\n' | sort >&2

        if [[ -f /tmp/results/pytest-results.xml ]]; then
          SUMMARY="$(python3 -c "import xml.etree.ElementTree as ET; root=ET.parse('/tmp/results/pytest-results.xml').getroot(); suites=[root] if root.tag == 'testsuite' else root.findall('testsuite'); tests=sum(int(s.attrib.get('tests', 0)) for s in suites); skipped=sum(int(s.attrib.get('skipped', 0)) for s in suites); failures=sum(int(s.attrib.get('failures', 0)) + int(s.attrib.get('errors', 0)) for s in suites); passed=tests - skipped - failures; print(f'{passed}/{tests} pytest checks passed')" 2>/dev/null || true)"
          if [[ -n "${SUMMARY}" ]]; then
            printf '%s\n' "${SUMMARY}"
          else
            echo "pytest results present"
          fi
        else
          echo "pytest results missing"
        fi

        exit "${TEST_RC}"
        SCRIPT_EOF
      command:
      - sh
      - -c
      env:
      - name: TEST_NAMESPACE
        value: '{{inputs.parameters.namespace}}'
      - name: TEST_APP_LABEL
        value: '{{inputs.parameters.app-label}}'
      - name: TEST_SERVICE_NAME
        value: '{{inputs.parameters.service-name}}'
      - name: TEST_LANE
        value: '{{inputs.parameters.lane}}'
      - name: TEST_RESULTS_DIR
        value: /tmp/results
      image: cgr.dev/chainguard/wolfi-base:latest
      imagePullPolicy: Always
      resources:
        limits:
          cpu: '2'
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 512Mi
      volumeMounts:
      - mountPath: /workspace
        name: workspace
        readOnly: true
    initContainers:
    - args:
      - |
        apk add --no-cache bash curl jq kubectl git openssh-client python3 >/dev/null 2>&1
        exec bash <<'SCRIPT_EOF'
        set -euo pipefail
        for attempt in 1 2 3; do
          rm -rf /workspace/lab
          if git clone --depth 1 --branch "${BRANCH}" \
              https://github.com/projectbluefin/lab \
              /workspace/lab 2>&1; then
            echo "Synced lab @ ${BRANCH} (attempt ${attempt})"
            exit 0
          fi
          rm -rf /workspace/lab
          if git clone https://github.com/projectbluefin/lab /workspace/lab 2>&1 && \
             git -C /workspace/lab checkout "${BRANCH}" 2>&1; then
            echo "Synced lab @ ${BRANCH} via SHA fallback (attempt ${attempt})"
            exit 0
          fi
          echo "Attempt ${attempt} failed, retrying in 15s..."
          sleep 15
        done
        exit 1
        SCRIPT_EOF
      command:
      - sh
      - -c
      env:
      - name: BRANCH
        value: '{{inputs.parameters.branch}}'
      image: cgr.dev/chainguard/wolfi-base:latest
      name: git-sync
      volumeMounts:
      - mountPath: /workspace
        name: workspace
    inputs:
      parameters:
      - name: namespace
      - name: suite-path
      - name: lane
        value: ""
      - name: app-label
        value: ""
      - name: service-name
        value: ""
      - name: branch
        value: main
    metadata:
      labels:
        app.kubernetes.io/part-of: bluefin-test-suite
        bluefin.io/lane: '{{inputs.parameters.lane}}'
        bluefin.io/step: run-incluster-tests
        bluefin.io/suite: '{{inputs.parameters.suite-path}}'
    name: run-pytest
    volumes:
    - emptyDir: {}
      name: workspace

