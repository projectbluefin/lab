apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: teardown-flatcar-vm
  namespace: argo
spec:
  serviceAccountName: argo
  templates:
    - name: teardown-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
            value: "flatcar-test"
      steps:
        - - name: delete-vm
            template: delete-vm
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"
                - name: namespace
                  value: "{{inputs.parameters.namespace}}"
        - - name: delete-hostdisk
            template: delete-hostdisk
            arguments:
              parameters:
                - name: vm-name
                  value: "{{inputs.parameters.vm-name}}"

    - name: delete-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
      resource:
        action: delete
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"

    - name: delete-hostdisk
      inputs:
        parameters:
          - name: vm-name
      nodeSelector:
        kubernetes.io/hostname: ghost
      volumes:
        - name: flatcar-vms
          hostPath:
            path: /var/tmp/flatcar-test
      script:
        image: cgr.dev/chainguard/bash:latest
        securityContext:
          runAsUser: 0
        command: [bash]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
          - name: flatcar-vms
            mountPath: /var/tmp/flatcar-test
        source: |
          DISK="/var/tmp/flatcar-test/{{inputs.parameters.vm-name}}.raw"
          TARGET="/var/tmp/flatcar-test/{{inputs.parameters.vm-name}}-target.raw"
          rm -f "${DISK}" "${TARGET}"
          echo "Cleaned: ${DISK}, ${TARGET}"
