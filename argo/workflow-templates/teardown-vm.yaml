apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: teardown-vm
  namespace: argo
  annotations:
    description: |
      Deletes a KubeVirt VirtualMachine by name and namespace.
      Used for Bluefin, COSMIC, Dakota, Flatcar, GNOME OS, and Knuckle test VMs.
spec:
  serviceAccountName: argo
  templates:
    - name: teardown-vm
      inputs:
        parameters:
          - name: vm-name
          - name: namespace
      resource:
        action: delete
        manifest: |
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{inputs.parameters.vm-name}}"
            namespace: "{{inputs.parameters.namespace}}"
