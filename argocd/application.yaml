# Argo CD Application — keeps WorkflowTemplates in sync from git
# Apply once: kubectl apply -f argocd/application.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: lab
spec:
  project: default
  source:
    repoURL: https://github.com/projectbluefin/lab
    targetRevision: main
    path: argo/workflow-templates
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
