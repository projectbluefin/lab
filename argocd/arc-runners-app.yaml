apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: lab
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.9.3
    helm:
      values: |
        githubConfigUrl: "https://github.com/projectbluefin"
        githubConfigSecret: arc-github-secret
        runnerScaleSetName: ghost-runners
        minRunners: 0
        maxRunners: 6
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-systems-gha-rs-controller
        containerMode:
          type: kubernetes
          kubernetesModeWorkVolumeClaim:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 50Gi
        template:
          spec:
            serviceAccountName: arc-runner-workflow-submitter
            tolerations:
              - key: node-role.kubernetes.io/gaming
                operator: Exists
                effect: NoSchedule
            containers:
              - name: runner
                image: ghcr.io/projectbluefin/arc-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: "250m"
                    memory: "512Mi"
                  limits:
                    cpu: "1"
                    memory: "1Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
