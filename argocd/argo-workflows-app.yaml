apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: lab
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.45.28
    helm:
      values: |
        crds:
          install: false
        server:
          enabled: false
        singleNamespace: true
        workflow:
          serviceAccount:
            create: false
            name: argo
        controller:
          rbac:
            create: true
          configMap:
            create: false
            name: workflow-controller-configmap
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
