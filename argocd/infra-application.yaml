# ArgoCD Application — manages manifests/ (infra, VMs, services, CronWorkflows)
# Apply once: kubectl apply -f argocd/infra-application.yaml -n argocd
# After this, any file added to manifests/ and pushed to main is auto-applied.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: testing-lab-infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  project: default
  source:
    repoURL: https://github.com/projectbluefin/testing-lab
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  ignoreDifferences:
    - group: kubevirt.io
      kind: VirtualMachine
      jqPathExpressions:
        - .status
        - .spec.template.metadata.annotations."kubevirt.io/pci-topology-version"
        - .spec.template.spec.architecture
        - .spec.template.spec.domain.firmware
        - .spec.template.spec.domain.resources
        - .spec.template.spec.volumes[]?.hostDisk.capacity
    - group: ""
      kind: ConfigMap
      name: flatcar-kernel-lifecycle-state
      namespace: argo
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
