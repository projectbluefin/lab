# ArgoCD Application — manages manifests/ (infra, VMs, services, CronWorkflows)
# Apply once: kubectl apply -f argocd/infra-application.yaml -n argocd
# After this, any file added to manifests/ and pushed to main is auto-applied.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: testing-lab-infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  project: default
  source:
    repoURL: https://github.com/castrojo/testing-lab
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
