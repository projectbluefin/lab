apiVersion: apps/v1
kind: Deployment
metadata:
  name: bst-artifact-server
  namespace: argo
  labels:
    app: bst-artifact-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bst-artifact-server
  template:
    metadata:
      labels:
        app: bst-artifact-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: exo-0
      containers:
      - name: bst-artifact-server
        image: quay.io/bazel-remote/bazel-remote:latest
        args:
        - --dir=/data
        - --max_size=2000
        - --port=8080
        - --grpc_port=9092
        securityContext:
          runAsUser: 0
        ports:
        - name: http
          containerPort: 8080
        - name: grpc
          containerPort: 9092
        volumeMounts:
        - name: artifact-storage
          mountPath: /data
      volumes:
      - name: artifact-storage
        hostPath:
          path: /var/mnt/ghost-data
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: bst-artifact-server
  namespace: argo
spec:
  selector:
    app: bst-artifact-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9092
    targetPort: 9092
