# manifests/bst-build-priorityclass.yaml
# BST build pods must run above lab-test-vm (1,000,000). Multi-hour cache-only
# builds lose all progress when preempted by short-lived image-poll VMs, so
# builds take scheduling precedence over polling VMs. Active QA VMs can still
# coexist; if the cluster is truly full, lower-priority work is preempted first.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bst-build
  labels:
    app.kubernetes.io/part-of: lab
value: 1500000
preemptionPolicy: PreemptLowerPriority
globalDefault: false
description: "BST build pods. Higher priority than lab-test-vm so long-running builds are not preempted by polling VMs."
