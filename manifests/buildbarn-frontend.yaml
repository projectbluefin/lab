# Buildbarn frontend — the single client-facing REAPI endpoint (CAS + AC +
# Execute-forwarding to the scheduler). BuildStream's remote-execution,
# storage-service, and action-cache-service all point here (single URL,
# port 8980). 2 replicas spread across both nodes via podAntiAffinity;
# ClusterIP only (internal cluster traffic — no external LB needed).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: buildbarn
  labels:
    app.kubernetes.io/part-of: lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        buildbarn-config-revision: "2026-07-06-2"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9980"
    spec:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ghost
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: ghcr.io/buildbarn/bb-storage:20260609T094425Z-10acc76
          args:
            - /config/frontend.jsonnet
          ports:
            - name: grpc
              containerPort: 8980
            - name: metrics
              containerPort: 9980
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - mountPath: /config/
              name: configs
              readOnly: true
      volumes:
        - name: configs
          configMap:
            name: buildbarn-config
            items:
              - key: common.libsonnet
                path: common.libsonnet
              - key: frontend.jsonnet
                path: frontend.jsonnet
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: buildbarn
  labels:
    app.kubernetes.io/part-of: lab
spec:
  selector:
    app: frontend
  ports:
    - name: grpc
      port: 8980
    - name: metrics
      port: 9980
