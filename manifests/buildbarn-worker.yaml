# Buildbarn worker + runner — one pair per eligible node (DaemonSet).
# The worker cache is node-local and intentionally persistent across pod
# restarts; losing it turns every remote-execution build into a cold bootstrap.
#
# Runner is BuildStream-specific: chrootIntoInputRoot (see buildbarn-config
# runner.jsonnet) requires CAP_SYS_CHROOT, so it runs as root with only that
# capability added — not privileged. The runner container's own image is
# irrelevant to build output (chroot replaces its rootfs with the action's
# input root at execution time); wolfi-base is used only so bb_runner itself
# has a libc to run against before the chroot happens.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: worker
  namespace: buildbarn
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/part-of: lab
spec:
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        buildbarn-config-revision: "2026-07-23-1"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9980"
    spec:
      automountServiceAccountToken: false
      priorityClassName: workflow-controller
      initContainers:
        - name: bb-runner-installer
          image: ghcr.io/buildbarn/bb-runner-installer:20260722T162832Z-236bcd9
          volumeMounts:
            - mountPath: /bb/
              name: bb-runner-bin
        - name: volume-init
          image: cgr.dev/chainguard/wolfi-base@sha256:02dab76bd852a70556b5b2002195c8a5fdab77d323c433bf6642aab080489795
          command:
            - sh
            - -c
            - mkdir -pm 0777 /worker/build && mkdir -pm 0700 /worker/cache && mkdir -p /worker/dev && chmod 0777 /worker && (mknod -m 666 /worker/dev/null c 1 3 || test -c /worker/dev/null) && (mknod -m 666 /worker/dev/zero c 1 5 || test -c /worker/dev/zero) && (mknod -m 666 /worker/dev/random c 1 8 || test -c /worker/dev/random) && (mknod -m 666 /worker/dev/urandom c 1 9 || test -c /worker/dev/urandom)
          volumeMounts:
            - mountPath: /worker
              name: worker
      containers:
        - name: worker
          image: ghcr.io/buildbarn/bb-worker:20260722T162832Z-236bcd9
          command: [/app/bb_worker]
          args:
            - /config/worker.jsonnet
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: metrics
              containerPort: 9980
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            seLinuxOptions:
              type: spc_t
            seccompProfile:
              type: Unconfined
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              # bb_worker does all CAS input-root fetching; with 128-way
              # download concurrency over the USB4 fabric it needs real CPU
              # for checksumming and more memory for in-flight blobs.
              cpu: "8"
              memory: 8Gi
          volumeMounts:
            - mountPath: /config/
              name: configs
              readOnly: true
            - mountPath: /worker
              name: worker
              mountPropagation: Bidirectional
            - mountPath: /dev/fuse
              name: fuse
            - mountPath: /bb
              name: bb-runner-bin
        - name: runner
          image: cgr.dev/chainguard/wolfi-base@sha256:02dab76bd852a70556b5b2002195c8a5fdab77d323c433bf6642aab080489795
          command: [/bb/bb_runner, /config/runner.jsonnet]
          # Native BuildBarn chroot actions need the runner to traverse and
          # execute files from large SELinux-labeled input roots. Keep the
          # worker itself unchanged; privilege is limited to this runner
          # container, which already executes untrusted build actions as root
          # inside the chroot.
          securityContext:
            runAsUser: 0
            privileged: true
            allowPrivilegeEscalation: true
            seLinuxOptions:
              type: spc_t
            # Keep the host-backed worker build tree executable. The runner
            # chroots into action input roots and invokes toolchains from them.
            procMount: Default
          resources:
            requests:
              cpu: "8"
              memory: 16Gi
            limits:
              # 32-core nodes with 4 concurrent action slots: allow bursts up
              # to 24 cores so parallel compiles saturate the node instead of
              # being throttled at 8.
              cpu: "24"
              memory: 48Gi
          volumeMounts:
            - mountPath: /config/
              name: configs
              readOnly: true
            - mountPath: /worker
              name: worker
              mountPropagation: Bidirectional
            - mountPath: /dev/fuse
              name: fuse
            - mountPath: /bb
              name: bb-runner-bin
      volumes:
        - name: bb-runner-bin
          emptyDir: {}
        - name: fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
        - name: configs
          configMap:
            name: buildbarn-config
            items:
              - key: common.libsonnet
                path: common.libsonnet
              - key: runner.jsonnet
                path: runner.jsonnet
              - key: worker.jsonnet
                path: worker.jsonnet
        # A DaemonSet cannot use one local-path PVC per node without a
        # separate StatefulSet. This node-local hostPath gives each worker a
        # stable cache while keeping the cache close to its BuildBarn runner.
        - name: worker
          hostPath:
            path: /var/lib/buildbarn/worker
            type: DirectoryOrCreate
