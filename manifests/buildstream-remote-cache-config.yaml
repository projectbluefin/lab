apiVersion: v1
kind: ConfigMap
metadata:
  name: buildstream-remote-cache
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
    app.kubernetes.io/component: buildstream

data:
  dakota-buildstream.conf: |
    scheduler:
      network-retries: 8
      fetchers: 24
      builders: 24
      pushers: 24
    build:
      max-jobs: 24

    artifacts:
      override-project-caches: false
      servers:
      - url: grpc://frontend.buildbarn.svc.cluster.local:8980
        push: true
    source-caches:
      override-project-caches: false
      servers:
      - url: grpc://frontend.buildbarn.svc.cluster.local:8980
        push: false
    remote-execution:
      execution-service:
        url: grpc://frontend.buildbarn.svc.cluster.local:8980
      storage-service:
        url: grpc://frontend.buildbarn.svc.cluster.local:8980
      action-cache-service:
        url: grpc://frontend.buildbarn.svc.cluster.local:8980
