apiVersion: v1
kind: ConfigMap
metadata:
  name: buildstream-remote-cache
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
    app.kubernetes.io/component: buildstream

data:
  dakota-buildstream.conf: |
    scheduler:
      network-retries: 8
      fetchers: 24
      builders: 24
      pushers: 24
    build:
      max-jobs: 24

    artifacts:
      override-project-caches: false
      servers:
      - url: grpc://bb-remote-asset.buildbarn.svc.cluster.local:8984
        type: index
        push: true
      - url: grpc://storage.buildbarn.svc.cluster.local:8981
        type: storage
        push: true
      - url: https://cache.projectbluefin.io:11001
        push: false
      - url: https://cache.freedesktop-sdk.io:11001
        push: false
      - url: https://gbm.gnome.org:11003
        push: false
    source-caches:
      override-project-caches: false
      servers:
      - url: grpc://bb-remote-asset.buildbarn.svc.cluster.local:8984
        type: index
        push: false
      - url: grpc://storage.buildbarn.svc.cluster.local:8981
        type: storage
        push: false
      - url: https://cache.projectbluefin.io:11001
        push: false
      - url: https://cache.freedesktop-sdk.io:11001
        push: false
      - url: https://gbm.gnome.org:11003
        push: false
