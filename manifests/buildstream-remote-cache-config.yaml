apiVersion: v1
kind: ConfigMap
metadata:
  name: buildstream-remote-cache
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
    app.kubernetes.io/component: buildstream

data:
  dakota-buildstream.conf: |
    scheduler:
      network-retries: 4
      fetchers: 12
      builders: 12
      pushers: 12
    build:
      max-jobs: 12

    artifacts:
      override-project-caches: false
      servers:
      - url: grpc://frontend.buildbarn.svc.cluster.local:8980
        push: true
      - url: https://cache.projectbluefin.io:11001
        push: false
      - url: https://cache.freedesktop-sdk.io:11001
        push: false
      - url: https://gbm.gnome.org:11003
        push: false
    source-caches:
      override-project-caches: false
      servers:
      - url: https://cache.projectbluefin.io:11001
        push: false
      - url: https://cache.freedesktop-sdk.io:11001
        push: false
      - url: https://gbm.gnome.org:11003
        push: false
