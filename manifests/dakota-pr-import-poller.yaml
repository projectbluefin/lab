# CronWorkflow: polls projectbluefin/dakota every 5 min for PRs labeled test-on-lab.
# Dispatches the in-cluster Dakota batch build workflow for the PR branch.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: dakota-pr-import-poller
  namespace: argo
  labels:
    app.kubernetes.io/component: dakota-pr-import-poller
    app.kubernetes.io/part-of: bluefin-test-suite
spec:
  suspend: true
  schedules:
    - "*/5 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: dakota-pr-import-poller
