# RBAC for flatcar-kernel-poller CronWorkflow and flatcar-kernel-build WorkflowTemplate.
# Allows the argo SA to patch the flatcar-kernel-polling-state ConfigMap.
# (The argo SA already has broader ConfigMap access via argo-default-sa-rbac.yaml;
# this Role is a belt-and-suspenders scoped grant for clarity.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flatcar-kernel-state-patcher
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
rules:
  - apiGroups: [""]
    resources: [configmaps]
    resourceNames: [flatcar-kernel-polling-state]
    verbs: [get, patch]
  - apiGroups: [argoproj.io]
    resources: [workflows]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flatcar-kernel-state-patcher
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
subjects:
  - kind: ServiceAccount
    name: default
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flatcar-kernel-state-patcher
