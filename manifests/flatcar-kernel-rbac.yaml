# RBAC for the Flatcar kernel poller/build/gate workflows.
# Grants the argo SA read/patch access to lifecycle state in argo, read access to
# flatcar-update pods, and cluster-scope node reads for the exo-0 promotion gate.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flatcar-kernel-state-patcher
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, patch]
  - apiGroups: [argoproj.io]
    resources: [workflows]
    verbs: [create, get, list, watch, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flatcar-kernel-state-patcher
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flatcar-kernel-state-patcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flatcar-kernel-gate-reader
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: testing-lab
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flatcar-kernel-gate-reader
  namespace: flatcar-update
  labels:
    app.kubernetes.io/part-of: testing-lab
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flatcar-kernel-gate-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flatcar-kernel-gate-node-reader
  labels:
    app.kubernetes.io/part-of: testing-lab
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flatcar-kernel-gate-node-reader
  labels:
    app.kubernetes.io/part-of: testing-lab
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flatcar-kernel-gate-node-reader
