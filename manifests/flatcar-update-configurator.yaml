# Writes /etc/flatcar/update.conf on every Flatcar node so update_engine
# checks Nebraska instead of the upstream Flatcar update servers.
# Runs on all nodes; non-Flatcar nodes exit silently.
# Rechecks hourly and rewrites if the config drifts.
#
# Flatcar update.conf keys:
#   GROUP   - which channel/group to track (matches a Nebraska group name)
#   SERVER  - Omaha endpoint (Nebraska /v1/update/)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flatcar-update-configurator
  namespace: flatcar-update
  labels:
    app: flatcar-update-configurator
    app.kubernetes.io/part-of: testing-lab
spec:
  selector:
    matchLabels:
      app: flatcar-update-configurator
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: flatcar-update-configurator
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: configurator
          image: cgr.dev/chainguard/busybox:latest
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                if ! grep -q 'ID=flatcar' /host/etc/os-release 2>/dev/null; then
                  sleep 3600
                  continue
                fi
                mkdir -p /host/etc/flatcar
                desired_server="http://192.168.1.102:30802/v1/update/"
                current=$(cat /host/etc/flatcar/update.conf 2>/dev/null || echo "")
                if ! echo "$current" | grep -qF "$desired_server"; then
                  printf 'GROUP=stable\nSERVER=%s\n' "$desired_server" \
                    > /host/etc/flatcar/update.conf
                  nsenter -t 1 -m -u -i -n -- systemctl restart update-engine || true
                  echo "$(date): reconfigured update.conf on $(cat /host/etc/hostname)"
                fi
                sleep 3600
              done
          volumeMounts:
            - name: host-etc
              mountPath: /host/etc
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
