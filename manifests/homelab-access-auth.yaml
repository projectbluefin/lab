apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-access
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelab-access
  template:
    metadata:
      labels:
        app: homelab-access
    spec:
      containers:
        - name: access
          image: python:3.12-slim
          ports:
            - containerPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: homelab-access
spec:
  selector:
    app: homelab-access
  ports:
    - name: https
      port: 8443
      targetPort: 8443
