---
# homelab-runner ServiceAccount — used by all homelab WorkflowTemplates
# (homelab-substrate, homelab-storage, homelab-access-probe, homelab-restore-drill)
#
# Principle of least privilege vs the 'argo' SA:
#   - No KubeVirt/CDI permissions (no VirtualMachine/DataVolume CRUD)
#   - No Argo Workflow management permissions
#   - Only what kubectl needs: namespace lifecycle + namespace-scoped fixtures
#
# Principle of least privilege for workspaces (Issue #146):
#   - Cluster-scoped permissions are strictly limited to namespace creation and deletion.
#   - All namespace-scoped permissions (deployments, pods, PVCs, etc.) are bound via
#     RoleBindings inside target namespaces.
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homelab-runner
  namespace: argo
  labels:
    app.kubernetes.io/component: homelab-rbac
    app.kubernetes.io/part-of: bluefin-test-suite
---
# ClusterRole for cluster-scoped namespace management only (No namespace-scoped access)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-runner-namespace-manager
  labels:
    app.kubernetes.io/component: homelab-rbac
    app.kubernetes.io/part-of: bluefin-test-suite
rules:
  # Namespace lifecycle — create per-run namespaces, delete on cleanup
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homelab-runner-namespace-binding
  labels:
    app.kubernetes.io/component: homelab-rbac
    app.kubernetes.io/part-of: bluefin-test-suite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-runner-namespace-manager
subjects:
  - kind: ServiceAccount
    name: homelab-runner
    namespace: argo
---
# Shared ClusterRole defining the namespace-scoped permissions (Bound via local RoleBindings)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homelab-runner-workspace-role
  labels:
    app.kubernetes.io/component: homelab-rbac
    app.kubernetes.io/part-of: bluefin-test-suite
rules:
  # Workload fixtures — Deployments, ReplicaSets (for rollout status)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Network fixtures
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Storage fixtures
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod access — exec for backup/restore, log capture, kubectl cp, wait readiness
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # ConfigMaps — test fixtures and config payloads
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events — read-only for diagnostics
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Argo workflow result reporting (required by emissary executor)
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
  # Role bindings — allow dynamic workspace initialization inside newly created namespaces
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
# RoleBindings inside authorized namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: homelab-runner-workspace-binding
  namespace: argo
  labels:
    app.kubernetes.io/component: homelab-rbac
    app.kubernetes.io/part-of: bluefin-test-suite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homelab-runner-workspace-role
subjects:
  - kind: ServiceAccount
    name: homelab-runner
    namespace: argo
---
