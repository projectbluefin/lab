# CronWorkflow: polls ghcr.io/ublue-os/aurora:stable hourly.
# Triggers bluefin-qa-pipeline (system suite only — aurora uses KDE)
# only when OCI digest changes vs ConfigMap state.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-aurora-stable
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
    bluefin.io/trigger: digest-poll
spec:
  suspend: false
  schedules:
    - "27 */3 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: image-poller
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/ublue-os/aurora"
        - name: image-tag
          value: "stable"
        - name: state-key
          value: "digest-aurora-stable"
        - name: suites
          value: "system"
        - name: variant
          value: "aurora"
        - name: testsuite-repo
          value: "https://github.com/projectbluefin/testsuite"
