# CronWorkflow: polls ghcr.io/projectbluefin/common:latest every 4 hours.
# Triggers bluefin-qa-pipeline only when OCI digest changes vs ConfigMap state.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-common
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/trigger: digest-poll
spec:
  schedules:
    - "0 */4 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: image-poller
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/projectbluefin/common"
        - name: image-tag
          value: "latest"
        - name: state-key
          value: "digest-common"
        - name: namespace
          value: "bluefin-test"
        - name: suites
          value: "smoke"
        - name: variant
          value: "bluefin"
