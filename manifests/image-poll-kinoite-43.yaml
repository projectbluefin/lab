# CronWorkflow: polls quay.io/fedora-ostree-desktops/kinoite:43 (bazzite base image) hourly.
# When the base image digest changes, resets digest-bazzite-testing to "" so the next
# image-poll-bazzite-testing run detects a "change" and queues a QA pipeline run.
# Bazzite is built from kinoite:43 — a base update means bazzite:testing will be rebuilt.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: image-poll-kinoite-43
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
    bluefin.io/trigger: digest-poll
    bluefin.io/role: base-image-watcher
spec:
  schedules:
    - "40 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    entrypoint: watch-base
    templates:
      - name: watch-base
        metadata:
          labels:
            app.kubernetes.io/part-of: testing-lab
        dag:
          tasks:
            - name: fetch
              template: fetch-remote
            - name: update
              depends: "fetch.Succeeded"
              template: update-local
              arguments:
                parameters:
                  - name: remote-digest
                    value: "{{tasks.fetch.outputs.parameters.digest}}"

      - name: fetch-remote
        outputs:
          parameters:
            - name: digest
              valueFrom:
                path: /tmp/digest
        script:
          image: quay.io/skopeo/stable:latest
          command: [sh]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          source: |
            set -eu
            IMAGE_REF="quay.io/fedora-ostree-desktops/kinoite:43"
            REMOTE=$(skopeo inspect --no-tags --format '{{.Digest}}' \
              "docker://${IMAGE_REF}" 2>/dev/null || true)
            
            if [ -z "${REMOTE}" ]; then
              echo "Failed to resolve digest" >&2
              echo "none" > /tmp/digest
            else
              echo "${REMOTE}" > /tmp/digest
            fi

      - name: update-local
        inputs:
          parameters:
            - name: remote-digest
        script:
          image: cgr.dev/chainguard/kubectl:latest-dev
          command: [bash]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          source: |
            set -euo pipefail
            STATE_KEY="digest-kinoite-43"
            DERIVED_KEY="digest-bazzite-testing"
            REMOTE="{{inputs.parameters.remote-digest}}"

            if [[ "${REMOTE}" == "none" ]]; then
              echo "No remote digest fetched. Skipping." >&2
              exit 0
            fi

            STORED=$(kubectl get configmap image-polling-digests -n argo \
              -o jsonpath="{.data.${STATE_KEY}}" 2>/dev/null || true)

            echo "Remote:  ${REMOTE}" >&2
            echo "Stored:  ${STORED:-<none>}" >&2

            if [[ "${REMOTE}" == "${STORED}" ]]; then
              echo "No change in kinoite:43 — skipping" >&2
              exit 0
            fi

            echo "kinoite:43 changed — updating state and resetting bazzite-testing state" >&2
            kubectl patch configmap image-polling-digests -n argo --type merge \
              -p "{\"data\":{\"${STATE_KEY}\":\"${REMOTE}\",\"${DERIVED_KEY}\":\"\"}}" \
              || kubectl create configmap image-polling-digests -n argo \
                   --from-literal="${STATE_KEY}=${REMOTE}" --from-literal="${DERIVED_KEY}="
            echo "Reset ${DERIVED_KEY} to empty — image-poll-bazzite-testing will trigger on next run" >&2
