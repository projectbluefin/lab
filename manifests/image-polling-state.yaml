# Bootstraps the digest state ConfigMap for image polling CronWorkflows.
# Each poll CronWorkflow patches its own key; this provides the initial object.
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-polling-digests
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
data:
  digest-bluefin-stable: ""
  digest-bluefin-testing: ""
  digest-bluefin-main: ""
  digest-lts-stable: ""
  digest-lts-testing: ""
  digest-aurora-stable: ""
  digest-aurora-testing: ""
  digest-aurora-main: ""
  digest-bazzite-stable: ""
  digest-bazzite-testing: ""
  digest-bazzite-main: ""
  digest-kinoite-43: ""
  digest-kinoite-44: ""
  digest-akmods-main-43: ""
  digest-akmods-main-44: ""
  digest-dakota-latest: ""
  digest-fedora-bootc-latest: ""
  digest-fedora-bootc-rawhide: ""
