apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt-operator-controller-manager
  namespace: k8sgpt
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/instance: k8sgpt-operator
    app.kubernetes.io/name: k8sgpt-operator
    app.kubernetes.io/part-of: k8sgpt-operator
    app.kubernetes.io/version: 0.2.25
    control-plane: controller-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: k8sgpt-operator
      app.kubernetes.io/name: k8sgpt-operator
      control-plane: controller-manager
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: k8sgpt-operator
        app.kubernetes.io/name: k8sgpt-operator
        control-plane: controller-manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: k8sgpt-operator-controller-manager
      securityContext:
        runAsNonRoot: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values: ["amd64", "arm64", "ppc64le", "s390x"]
              - key: kubernetes.io/os
                operator: In
                values: ["linux"]
      containers:
      - name: kube-rbac-proxy
        image: quay.io/brancz/kube-rbac-proxy:v0.19.1
        imagePullPolicy: IfNotPresent
        args:
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --v=0
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        ports:
        - name: https
          containerPort: 8443
          protocol: TCP
        resources:
          requests:
            cpu: 5m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      - name: manager
        image: ghcr.io/k8sgpt-ai/k8sgpt-operator:v0.2.27
        imagePullPolicy: IfNotPresent
        command: ["/manager"]
        args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=127.0.0.1:8080
        - --leader-elect
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        - name: OPERATOR_SINK_WEBHOOK_TIMEOUT_SECONDS
          value: 30s
        - name: K8SGPT_ENABLE_DYNAMIC_RBAC
          value: "true"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: k8sgpt-operator-controller-manager-metrics-service
  namespace: k8sgpt
  labels:
    app.kubernetes.io/instance: k8sgpt-operator
    app.kubernetes.io/name: k8sgpt-operator
    control-plane: controller-manager
  annotations:
