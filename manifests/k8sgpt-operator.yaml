    app.kubernetes.io/instance: k8sgpt-operator
    app.kubernetes.io/name: k8sgpt-operator
    control-plane: controller-manager
  ports:
  - name: https
    port: 8443
    targetPort: https
    protocol: TCP
  type: ClusterIP
