# Grants argo SA permissions to manage KubeVirt VMs in the bluefin-test namespace.
# Required for create-vm, wait-for-vm-ready, and delete-vm steps.
# pods/exec is needed to run virsh qemu-agent-command in the virt-launcher compute
# container (used to start sshd.socket after VMI boot).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubevirt-manager
  namespace: bluefin-test
rules:
  - apiGroups:
      - kubevirt.io
    resources:
      - virtualmachines
      - virtualmachineinstances
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubevirt-manager-argo
  namespace: bluefin-test
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubevirt-manager
---
# Same permissions for bluefin-lts-test namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubevirt-manager
  namespace: bluefin-lts-test
rules:
  - apiGroups:
      - kubevirt.io
    resources:
      - virtualmachines
      - virtualmachineinstances
    verbs:
      - create
      - get
      - list
      - watch
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubevirt-manager-argo
  namespace: bluefin-lts-test
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubevirt-manager
