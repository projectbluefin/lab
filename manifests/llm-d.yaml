apiVersion: v1
kind: Namespace
metadata:
  name: llm-d
  labels:
    app.kubernetes.io/part-of: testing-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-d-modelserver
  namespace: llm-d
  labels:
    app.kubernetes.io/name: llm-d-modelserver
    app.kubernetes.io/part-of: testing-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-d-modelserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-d-modelserver
    spec:
      containers:
        - name: modelserver
          image: ghcr.io/ggml-org/llama.cpp:server
          imagePullPolicy: IfNotPresent
          command: ["/app/llama-server"]
          args:
            - "-hf"
            - "ggml-org/gemma-3-1b-it-GGUF:Q4_K_M"
            - "--alias"
            - "gpt-4o"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--ctx-size"
            - "8192"
            - "--threads"
            - "8"
            - "--parallel"
            - "2"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "6"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: llm-d-modelserver
  namespace: llm-d
  labels:
    app.kubernetes.io/name: llm-d-modelserver
    app.kubernetes.io/part-of: testing-lab
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: llm-d-modelserver
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP
