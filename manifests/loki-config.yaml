# Patch the existing Loki ConfigMap (installed outside ArgoCD) to enable:
#   1. Compactor with retention — auto-delete logs older than 7 days
#   2. Per-stream and global ingestion rate limits — prevent disk fill from runaway pods
#   3. max_entries_limit to bound single-query response size
# 7-day retention matches the workflow-controller-configmap success TTL.
# ServerSideApply (testing-lab-infra) patches only this key, leaving
# any other keys Loki owns untouched.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: loki
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/managed-by: argocd
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    compactor:
      working_directory: /loki/compact
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
    limits_config:
      # Retention: 7 days matches workflow success TTL in workflow-controller-configmap
      retention_period: 168h
      # Ingestion rate limits — prevent a single runaway build pod from filling
      # the 10Gi Loki PVC (ghost disk is 83% full; guard every source of growth)
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      per_stream_rate_limit: 512KB
      per_stream_rate_limit_burst: 1MB
      # Bound query result size
      max_entries_limit_per_query: 10000
    ruler:
      alertmanager_url: http://localhost:9093
