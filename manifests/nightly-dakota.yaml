# CronWorkflow: runs the Dakota QA pipeline nightly at 03:00 UTC.
# References dakota-qa-pipeline WorkflowTemplate — no DAG duplication.
# SUSPENDED: keep the nightly Dakota trigger disabled for now; the reactivated
# image-poll-dakota CronWorkflow provides the container-only regression lane.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: nightly-dakota
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
spec:
  suspend: true
  schedules:
    - "0 3 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/trigger: nightly
      bluefin.io/suite: smoke
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 86400   # 24h
      secondsAfterFailure: 604800  # 7d
    workflowTemplateRef:
      name: dakota-qa-pipeline
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/projectbluefin/dakota"
        - name: image-tag
          value: "latest"
        - name: suites
          value: "smoke,developer,system"
        - name: variant
          value: "dakota"
