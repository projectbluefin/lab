# CronWorkflow: runs the knuckle QA pipeline nightly at 03:30 UTC.
# References knuckle-qa-pipeline WorkflowTemplate — no DAG duplication.
# Runs are retained for 24 hours (ttlStrategy) then cleaned up.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: nightly-knuckle
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
spec:
  suspend: true
  schedules:
    - "30 3 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/trigger: nightly
      bluefin.io/suite: smoke
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowSuccess
    ttlStrategy:
      secondsAfterCompletion: 86400
    workflowTemplateRef:
      name: knuckle-qa-pipeline
    arguments:
      parameters:
        - name: branch
          value: "main"
        - name: namespace
          value: "knuckle-test"
        - name: suite
          value: "smoke"
        - name: ssh-key-secret
          value: "bluefin-test-ssh-key"
        - name: tests-branch
          value: "main"
