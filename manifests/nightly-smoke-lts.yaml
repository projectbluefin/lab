# CronWorkflow: nightly LTS smoke suite at 02:30 UTC.
# bluefin-qa-pipeline now runs container-only suites directly from the OCI image,
# so this CronWorkflow needs only the image/tag/suite/variant payload.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: nightly-smoke-lts
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
spec:
  suspend: false
  schedules:
    - "30 2 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowMetadata:
    labels:
      app.kubernetes.io/part-of: bluefin-test-suite
      bluefin.io/trigger: nightly
      bluefin.io/suite: smoke
      bluefin.io/variant: lts
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 86400   # 24h — success runs cleaned up quickly
      secondsAfterFailure: 604800  # 7d  — failures retained for agent analysis
    workflowTemplateRef:
      name: bluefin-qa-pipeline
    arguments:
      parameters:
        - name: image
          value: "ghcr.io/projectbluefin/bluefin-lts"
        - name: image-tag
          value: "testing"
        - name: suites
          value: "smoke,developer,system"
        - name: variant
          value: "bluefin-lts"
