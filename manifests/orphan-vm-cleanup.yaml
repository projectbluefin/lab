# CronWorkflow: deletes orphaned KubeVirt VMs in test namespaces every 2 hours.
# A VM is orphaned when its parent workflow was force-deleted, skipping the onExit handler.
# Deletes VMs older than 3 hours that have no associated live Argo workflow.
# Never touches knuckle-test namespace.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: orphan-vm-cleanup
  namespace: argo
  labels:
    app.kubernetes.io/part-of: testing-lab
spec:
  schedules:
    - "0 */2 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: argo
    entrypoint: cleanup
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterCompletion: 3600
    templates:
      - name: cleanup
        nodeSelector:
          kubernetes.io/hostname: ghost
        script:
          image: cgr.dev/chainguard/kubectl:latest-dev
          command: [bash]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          source: |
            set -euo pipefail
            NAMESPACES="bluefin-test bluefin-lts-test flatcar-test"
            # Delete VMs whose parent argo-workflow no longer exists.
            # SAFETY RULES (do not relax without updating docs):
            #   1. Skip any VM labelled app=titan-* — these are the persistent
            #      ArgoCD-managed test VMs (manifests/titan-{bluefin,lts}.yaml).
            #      Titans have NO argo-workflow label, so the original logic
            #      would have deleted them on every run.
            #   2. Skip VMs whose argo-workflow label points to a live workflow.
            #   3. Skip VMs newer than 3 hours so we don't race a still-booting
            #      workflow that hasn't yet stamped its label.
            for NS in ${NAMESPACES}; do
              echo "Checking namespace: ${NS}" >&2
              while IFS= read -r VM; do
                [[ -z "${VM}" ]] && continue
                APP_LABEL=$(kubectl get vm "${VM}" -n "${NS}" \
                  -o jsonpath='{.metadata.labels.app}' 2>/dev/null || true)
                if [[ "${APP_LABEL}" == titan-* ]]; then
                  echo "SKIP ${NS}/${VM}: titan VM (app=${APP_LABEL})" >&2
                  continue
                fi
                WF_LABEL=$(kubectl get vm "${VM}" -n "${NS}" \
                  -o jsonpath='{.metadata.labels.argo-workflow}' 2>/dev/null || true)
                if [[ -n "${WF_LABEL}" ]]; then
                  if kubectl get workflow "${WF_LABEL}" -n argo &>/dev/null; then
                    echo "SKIP ${NS}/${VM}: workflow ${WF_LABEL} still active" >&2
                    continue
                  fi
                fi
                CREATED=$(kubectl get vm "${VM}" -n "${NS}" \
                  -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || true)
                if [[ -n "${CREATED}" ]]; then
                  CREATED_EPOCH=$(date -d "${CREATED}" +%s 2>/dev/null || echo 0)
                  NOW_EPOCH=$(date +%s)
                  AGE_SECONDS=$(( NOW_EPOCH - CREATED_EPOCH ))
                  if (( AGE_SECONDS < 10800 )); then
                    echo "SKIP ${NS}/${VM}: younger than 3h (age=${AGE_SECONDS}s)" >&2
                    continue
                  fi
                fi
                echo "DELETE orphan: ${NS}/${VM}" >&2
                kubectl delete vm "${VM}" -n "${NS}" --wait=false 2>&1 || true
              done < <(kubectl get vm -n "${NS}" \
                -o jsonpath='{range .items[?(@.metadata.creationTimestamp)]}{.metadata.name}{"\n"}{end}' \
                2>/dev/null || true)
            done
            echo "Orphan cleanup complete." >&2
