# CronWorkflow: polls projectbluefin org every 5min for PRs labeled test-in-lab.
# Dispatches matching WorkflowTemplate per repo. Uses GitHub commit status as idempotency lock.
# Requires: github-token secret in argo namespace (already present).
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: pr-label-poller
  namespace: argo
  labels:
    app.kubernetes.io/part-of: lab
    bluefin.io/trigger: pr-label
spec:
  suspend: false
  schedules:
    - "*/5 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  workflowSpec:
    serviceAccountName: argo
    podGC:
      strategy: OnWorkflowCompletion
    ttlStrategy:
      secondsAfterSuccess: 3600
      secondsAfterFailure: 86400
    workflowTemplateRef:
      name: pr-poller
