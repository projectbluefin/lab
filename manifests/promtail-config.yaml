# Promtail config: scrape all workflow pods in the argo namespace.
# k3s/containerd stores logs under /var/log/pods/<ns>_<pod>_<uid>/<container>/<n>.log
# k3s default container log rotation: 10Mi/file, 5 files max = 50Mi per container.
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/component: logging
    app.kubernetes.io/name: promtail
    app.kubernetes.io/managed-by: argocd
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
        # Back-pressure: drop logs rather than block promtail if Loki is slow
        backoff_config:
          min_period: 100ms
          max_period: 10s
          max_retries: 5
    scrape_configs:
      # All argo workflow pods: build, test, provision, teardown, ad-hoc debug.
      # One broad glob replaces the previous per-prefix static list; promtail
      # resolves the pod/container names from the directory structure.
      - job_name: argo-all-pods
        static_configs:
          - targets: [localhost]
            labels:
              namespace: argo
              __path__: /var/log/pods/argo_*/*/*.log
        pipeline_stages:
          # Extract pod name and container from path:
          # /var/log/pods/argo_<pod-name>_<uid>/<container>/<n>.log
          - regex:
              expression: '/var/log/pods/[^_]+_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/\d+\.log'
              source: filename
          - labels:
              pod:
              container:
          # Drop argo sidecar noise (wait/init containers that just echo timestamps)
          - drop:
              expression: "^time=.*level=INFO msg=\"(waiting for|sub-process exited|file signal).*$"
              drop_counter_reason: argo_sidecar_noise

      # Labeled test-suite pods (virt-launcher, run-gnome-tests, etc.)
      - job_name: bluefin-test-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
            regex: bluefin-test-suite
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
            target_label: app_kubernetes_io_part_of
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_bluefin_io_suite]
            target_label: suite
          - source_labels: [__meta_kubernetes_pod_label_bluefin_io_variant]
            target_label: variant
          - source_labels: [__meta_kubernetes_pod_label_bluefin_io_step]
            target_label: step
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: /var/log/pods/*$1/*.log
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            regex: (.*)
            separator: /
