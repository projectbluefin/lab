# Registry mirror config DaemonSet
# Writes containerd hosts.toml to each node's certs.d path.
# containerd v2.0 (k3s v1.32+) hot-reloads these — no k3s restart needed.
#
# All 6 registries mirror through a single zot-cache instance (NodePort 30501).
# Zot stores each upstream under a subpath via sync destination prefix mapping:
#   ghcr.io                    → ghost:30501/ghcr
#   docker.io                  → ghost:30501/docker
#   quay.io                    → ghost:30501/quay
#   registry.fedoraproject.org → ghost:30501/fedora
#   registry.k8s.io            → ghost:30501/k8s
#   cgr.dev                    → ghost:30501/cgr
#
# To update mirrors: edit ConfigMap below, then:
#   kubectl rollout restart daemonset/registry-mirror-config -n local-registry
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-mirror-hosts
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
data:
  ghcr.io.hosts.toml: |
    server = "https://ghcr.io"

    [host."http://127.0.0.1:30501/ghcr"]
      capabilities = ["pull", "resolve"]
  docker.io.hosts.toml: |
    server = "https://registry-1.docker.io"

    [host."http://127.0.0.1:30501/docker"]
      capabilities = ["pull", "resolve"]
  quay.io.hosts.toml: |
    server = "https://quay.io"

    [host."http://127.0.0.1:30501/quay"]
      capabilities = ["pull", "resolve"]
  registry.fedoraproject.org.hosts.toml: |
    server = "https://registry.fedoraproject.org"

    [host."http://127.0.0.1:30501/fedora"]
      capabilities = ["pull", "resolve"]
  registry.k8s.io.hosts.toml: |
    server = "https://registry.k8s.io"

    [host."http://127.0.0.1:30501/k8s"]
      capabilities = ["pull", "resolve"]
  cgr.dev.hosts.toml: |
    server = "https://cgr.dev"

    [host."http://127.0.0.1:30501/cgr"]
      capabilities = ["pull", "resolve"]
  local-zot.hosts.toml: |
    server = "http://192.168.1.102:30500"

    [host."http://192.168.1.102:30500"]
      capabilities = ["pull", "resolve", "push"]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: registry-mirror-config
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: testing-lab
    app.kubernetes.io/component: registry-cache
spec:
  selector:
    matchLabels:
      app: registry-mirror-config
  template:
    metadata:
      labels:
        app: registry-mirror-config
        app.kubernetes.io/part-of: testing-lab
    spec:
      initContainers:
        - name: write-hosts
          image: cgr.dev/chainguard/wolfi-base:latest
          command:
            - sh
            - -c
            - |
              mkdir -p \
                /certs.d/ghcr.io \
                /certs.d/docker.io \
                /certs.d/quay.io \
                /certs.d/registry.fedoraproject.org \
                /certs.d/registry.k8s.io \
                /certs.d/cgr.dev \
                "/certs.d/192.168.1.102:30500"
              cp /config/ghcr.io.hosts.toml                    /certs.d/ghcr.io/hosts.toml
              cp /config/docker.io.hosts.toml                  /certs.d/docker.io/hosts.toml
              cp /config/quay.io.hosts.toml                    /certs.d/quay.io/hosts.toml
              cp /config/registry.fedoraproject.org.hosts.toml /certs.d/registry.fedoraproject.org/hosts.toml
              cp /config/registry.k8s.io.hosts.toml            /certs.d/registry.k8s.io/hosts.toml
              cp /config/cgr.dev.hosts.toml                    /certs.d/cgr.dev/hosts.toml
              cp /config/local-zot.hosts.toml                  "/certs.d/192.168.1.102:30500/hosts.toml"
              echo "Mirror hosts written."
          volumeMounts:
            - name: certs-d
              mountPath: /certs.d
            - name: config
              mountPath: /config
      containers:
        - name: pause
          # ponytail: sleep loop, this pod only exists to keep the DaemonSet alive
          # so that config is re-applied on pod restart / rollout restart
          image: cgr.dev/chainguard/wolfi-base:latest
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests: { cpu: "1m", memory: "4Mi" }
            limits: { cpu: "10m", memory: "16Mi" }
      volumes:
        - name: certs-d
          hostPath:
            path: /var/lib/rancher/k3s/agent/etc/containerd/certs.d
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: registry-mirror-hosts
      tolerations: []
