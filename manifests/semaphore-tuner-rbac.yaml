# RBAC for the semaphore-tuner CronWorkflow (argo SA).
# Needs cluster-scope read on nodes to compute capacity,
# and namespace-scope patch on semaphore-config to write results.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: semaphore-tuner
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: semaphore-tuner-argo
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: semaphore-tuner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: semaphore-tuner
  namespace: argo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["semaphore-config"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: semaphore-tuner
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: semaphore-tuner
