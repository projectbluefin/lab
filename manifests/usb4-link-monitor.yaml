# USB4 link monitor — annotates ghost and exo-0 with the live state of the
# point-to-point thunderbolt0 data-plane link. BuildStream pipelines admit
# distributed remote execution only while both observations are fresh and up.
#
# Annotations:
# - lab.projectbluefin.io/usb4-link = up | down
# - lab.projectbluefin.io/usb4-link-observed-at = Unix epoch seconds
# "up" requires operstate=up AND carrier=1 AND a TCP probe of the peer's
# kubelet port over the tb subnet (10.99.0.0/30) — proving end-to-end
# reachability, not just local link state.
#
# hostNetwork gives the pod the host network namespace, so /sys/class/net
# shows the host's thunderbolt0 and the TCP probe routes over the tb link.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: usb4-link-monitor
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: usb4-link-monitor
  labels:
    app.kubernetes.io/part-of: lab
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: usb4-link-monitor
  labels:
    app.kubernetes.io/part-of: lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: usb4-link-monitor
subjects:
  - kind: ServiceAccount
    name: usb4-link-monitor
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: usb4-link-monitor
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: lab
spec:
  selector:
    matchLabels:
      app: usb4-link-monitor
  template:
    metadata:
      labels:
        app: usb4-link-monitor
    spec:
      serviceAccountName: usb4-link-monitor
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [ghost, exo-0]
      containers:
        - name: monitor
          image: cgr.dev/chainguard/kubectl:latest-dev
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command: [bash, -c]
          args:
            - |
              set -u

              # Bootstrap kubectl if not in PATH
              if ! command -v kubectl >/dev/null 2>&1; then
                KUBECTL=/tmp/kubectl
                if [ ! -f "${KUBECTL}" ]; then
                  curl -sfL "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl" -o "${KUBECTL}"
                  chmod +x "${KUBECTL}"
                fi
                kubectl() { "${KUBECTL}" "$@"; }
              fi

              case "${NODE_NAME}" in
                ghost) PEER_IP=10.99.0.2 ;;
                exo-0) PEER_IP=10.99.0.1 ;;
                *) echo "unknown node ${NODE_NAME}, no peer mapping" >&2; exit 1 ;;
              esac
              IF=/sys/class/net/thunderbolt0
              LAST=""
              while true; do
                # Ensure DNS traffic (UDP/TCP port 53) is ALWAYS routed via Ethernet (main table)
                # This guarantees DNS queries are immune to any USB4 interface state or table 40.
                for proto in udp tcp; do
                  for porttype in dport sport; do
                    if ! nsenter -t 1 -m -n -- /usr/sbin/ip rule show | grep -F "5208:" | grep -q "${proto} ${porttype} 53"; then
                      echo "Applying persistent SRE DNS routing override: ${proto} ${porttype} 53 via main table"
                      nsenter -t 1 -m -n -- /usr/sbin/ip rule add ipproto ${proto} ${porttype} 53 lookup main pref 5208 || true
                    fi
                  done
                done

                STATE=down
                if [[ "$(cat ${IF}/operstate 2>/dev/null)" == "up" ]] \
                   && [[ "$(cat ${IF}/carrier 2>/dev/null)" == "1" ]] \
                   && timeout 2 bash -c "</dev/tcp/${PEER_IP}/10250" 2>/dev/null; then
                  STATE=up
                fi
                # Publish every observation. The admission gate rejects stale
                # observations so a dead monitor cannot leave an old "up" value.
                OBSERVED_AT="$(date -u +%s)"
                if kubectl annotate node "${NODE_NAME}" \
                     "lab.projectbluefin.io/usb4-link=${STATE}" \
                     "lab.projectbluefin.io/usb4-link-observed-at=${OBSERVED_AT}" \
                     --overwrite >/dev/null; then
                  [[ "${STATE}" != "${LAST}" ]] && echo "usb4-link -> ${STATE}"
                  LAST="${STATE}"
                else
                  echo "annotate failed, will retry" >&2
                fi
                sleep 15
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
