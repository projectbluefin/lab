# Zot pull-through cache — single instance proxying all 7 upstream registries
# Zot sync destination prefix mapping stores each registry under a separate subpath:
#   ghcr.io                    → /ghcr   (pull via http://192.168.1.102:30501/ghcr/...)
#   docker.io                  → /docker (pull via http://192.168.1.102:30501/docker/...)
#   quay.io                    → /quay   (pull via http://192.168.1.102:30501/quay/...)
#   registry.fedoraproject.org → /fedora (pull via http://192.168.1.102:30501/fedora/...)
#   registry.k8s.io            → /k8s    (pull via http://192.168.1.102:30501/k8s/...)
#   cgr.dev                    → /cgr    (pull via http://192.168.1.102:30501/cgr/...)
#   public.ecr.aws             → /ecr    (pull via http://192.168.1.102:30501/ecr/...)
#
# Sync content filters are intentionally omitted so Zot mirrors whatever the
# nodes request; the earlier prefix filtering was preventing on-demand pulls.
# containerd on each node routes pulls through this via
# manifests/registry-mirror-config.yaml (hosts.toml DaemonSet, no k3s restart needed)
#
# Zot acts as a pull-through cache. Containerd sends requests to the mirror
# namespace and Zot fetches from the upstream registry on-demand on the first
# pull, then serves the cached copy for later pulls.
#
# Storage: hostPath on ghost at /var/mnt/ghost-data/zot-cache/
# ArgoCD: lab-infra syncs this
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-cache-config
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: lab
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "gc": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000"
      },
      "log": { "level": "info" },
      "extensions": {
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": ["https://ghcr.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/ghcr" }]
            },
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/docker" }]
            },
            {
              "urls": ["https://quay.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/quay" }]
            },
            {
              "urls": ["https://registry.fedoraproject.org"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/fedora" }]
            },
            {
              "urls": ["https://registry.k8s.io"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/k8s" }]
            },
            {
              "urls": ["https://cgr.dev"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/cgr" }]
            },
            {
              "urls": ["https://public.ecr.aws"],
              "onDemand": true,
              "tlsVerify": true,
              "content": [{ "prefix": "**", "destination": "/ecr" }]
            }
          ]
        }
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zot-cache
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: lab
    app.kubernetes.io/component: registry-cache
spec:
  selector:
    matchLabels:
      app: zot-cache
  template:
    metadata:
      labels:
        app: zot-cache
        app.kubernetes.io/part-of: lab
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: config
              mountPath: /etc/zot/config.json
              subPath: config.json
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: zot-cache-config
        - name: data
          hostPath:
            # Moved back onto the XFS ghost-data disk 2026-07-03: the prior
            # node-local btrfs path (/var/mnt/framework-cache, fb9866d0) grew
            # to 286G and pushed the root disk to 88% full. Root disk stability
            # takes priority over the marginal local-btrfs throughput gain.
            path: /var/mnt/ghost-data/zot-cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: zot-cache
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: lab
spec:
  selector:
    app: zot-cache
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: zot-cache-nodeport
  namespace: local-registry
  labels:
    app.kubernetes.io/part-of: lab
spec:
  type: NodePort
  externalTrafficPolicy: Local
  selector:
    app: zot-cache
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30501
