[dependencies.bitflags]
optional = true
version = "2"

[dependencies.ioslice]
optional = true
version = "0.6"

[dependencies.libc]
optional = true
version = "0.2"

[dependencies.plain]
optional = true
version = "0.2"

[dependencies.redox_syscall]
optional = true
version = "0.7"

[features]
base = ["libc"]
call = ["base"]
default = ["base", "call", "std", "redox_syscall", "protocol"]
mkns = ["ioslice"]
protocol = ["plain", "bitflags", "redox_syscall"]
std = ["base"]

[lib]
path = "src/lib.rs"

[package]
authors = ["4lDO2 <4lDO2@protonmail.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = "Redox stable ABI"
edition = "2021"
exclude = ["target"]
license = "MIT"
name = "libredox"
readme = false
repository = "https://gitlab.redox-os.org/redox-os/libredox.git"
version = "0.1.16"
