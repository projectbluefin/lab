[dependencies.proc-macro2]
default-features = false
version = "1.0.80"

[dependencies.syn]
default-features = false
features = ["full"]
version = "2.0.105"

[dev-dependencies.indoc]
version = "2"

[dev-dependencies.proc-macro2]
default-features = false
version = "1.0.80"

[dev-dependencies.quote]
default-features = false
version = "1.0.35"

[dev-dependencies.syn]
default-features = false
features = ["clone-impls", "extra-traits", "parsing", "printing", "visit-mut"]
version = "2.0.105"

[features]
verbatim = ["syn/parsing"]

[lib]
path = "src/lib.rs"

[package]
authors = ["David Tolnay <dtolnay@gmail.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
categories = ["development-tools"]
description = "A minimal `syn` syntax tree pretty-printer"
documentation = "https://docs.rs/prettyplease"
edition = "2021"
exclude = ["cargo-expand"]
keywords = ["rustfmt"]
license = "MIT OR Apache-2.0"
name = "prettyplease"
readme = "README.md"
repository = "https://github.com/dtolnay/prettyplease"
rust-version = "1.62"
version = "0.2.37"

[package.metadata.docs.rs]
rustdoc-args = ["--generate-link-to-definition", "--extern-html-root-url=core=https://doc.rust-lang.org", "--extern-html-root-url=alloc=https://doc.rust-lang.org", "--extern-html-root-url=std=https://doc.rust-lang.org"]
targets = ["x86_64-unknown-linux-gnu"]

[package.metadata.playground]
features = ["verbatim"]
