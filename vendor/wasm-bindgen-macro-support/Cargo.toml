[dependencies.bumpalo]
version = "3.0.0"

[dependencies.proc-macro2]
version = "1.0"

[dependencies.quote]
version = "1.0"

[dependencies.syn]
features = ["visit", "visit-mut", "full", "extra-traits"]
version = "2.0"

[dependencies.wasm-bindgen-shared]
version = "=0.2.118"

[features]
extra-traits = ["syn/extra-traits"]
strict-macro = []

[lib]
path = "src/lib.rs"

[lints.clippy]
large_enum_variant = "allow"
new_without_default = "allow"
overly_complex_bool_expr = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
uninlined_format_args = "warn"

[lints.rust]
unused_lifetimes = "warn"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(wasm_bindgen_unstable_test_coverage)", "cfg(xxx_debug_only_print_generated_code)"]
level = "warn"
priority = 0

[package]
authors = ["The wasm-bindgen Developers"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = "Implementation APIs for the `#[wasm_bindgen]` attribute"
documentation = "https://docs.rs/wasm-bindgen"
edition = "2021"
homepage = "https://wasm-bindgen.github.io/wasm-bindgen/"
include = ["/LICENSE-*", "/src"]
license = "MIT OR Apache-2.0"
name = "wasm-bindgen-macro-support"
readme = false
repository = "https://github.com/wasm-bindgen/wasm-bindgen/tree/master/crates/macro-support"
rust-version = "1.77"
version = "0.2.118"
