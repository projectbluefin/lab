[dependencies.unicode-ident]
version = "1.0.5"

[lib]
path = "src/lib.rs"

[lints.clippy]
large_enum_variant = "allow"
new_without_default = "allow"
overly_complex_bool_expr = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
uninlined_format_args = "warn"

[lints.rust]
unused_lifetimes = "warn"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(wasm_bindgen_unstable_test_coverage)", "cfg(xxx_debug_only_print_generated_code)"]
level = "warn"
priority = 0

[package]
authors = ["The wasm-bindgen Developers"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = """
Shared support between wasm-bindgen and wasm-bindgen cli, an internal
dependency.
"""
documentation = "https://docs.rs/wasm-bindgen-shared"
edition = "2021"
homepage = "https://wasm-bindgen.github.io/wasm-bindgen/"
include = ["/build.rs", "/LICENSE-*", "/src"]
license = "MIT OR Apache-2.0"
name = "wasm-bindgen-shared"
readme = false
repository = "https://github.com/wasm-bindgen/wasm-bindgen/tree/master/crates/shared"
rust-version = "1.77"
version = "0.2.118"
