[dependencies.leb128fmt]
default-features = false
version = "0.1.0"

[dependencies.wasmparser]
default-features = false
features = ["simd", "simd"]
optional = true
version = "0.244.0"

[dev-dependencies.anyhow]
version = "1.0.58"

[dev-dependencies.tempfile]
version = "3.2.0"

[dev-dependencies.wasmprinter]
default-features = false
version = "0.244.0"

[features]
component-model = ["wasmparser?/component-model"]
default = ["std", "component-model"]
std = ["wasmparser?/std"]

[lib]
path = "src/lib.rs"

[lints.clippy]
clone_on_copy = "warn"
manual_strip = "warn"
map_clone = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[lints.rust]
deprecated-safe-2024 = "warn"
keyword_idents_2024 = "warn"
missing-unsafe-on-extern = "warn"
rust-2024-guarded-string-incompatible-syntax = "warn"
rust-2024-incompatible-pat = "warn"
rust-2024-prelude-collisions = "warn"
unsafe-attr-outside-unsafe = "warn"
unsafe-op-in-unsafe-fn = "warn"
unsafe_code = "deny"
unstable_features = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(fuzzing)"]
level = "warn"
priority = 0

[package]
authors = ["Nick Fitzgerald <fitzgen@gmail.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = """
A low-level WebAssembly encoder.
"""
documentation = "https://docs.rs/wasm-encoder"
edition = "2021"
homepage = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wasm-encoder"
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
name = "wasm-encoder"
readme = "README.md"
repository = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wasm-encoder"
rust-version = "1.81.0"
version = "0.244.0"

[package.metadata.docs.rs]
all-features = true
