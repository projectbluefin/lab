[dependencies.bitflags]
version = "2.4.1"

[dependencies.hashbrown]
default-features = false
features = ["default-hasher"]
optional = true
version = "0.15.2"

[dependencies.indexmap]
default-features = false
optional = true
version = "2.7.0"

[dependencies.semver]
default-features = false
optional = true
version = "1.0.0"

[dependencies.serde]
default-features = false
features = ["alloc"]
optional = true
version = "1.0.166"

[dev-dependencies.anyhow]
version = "1.0.58"

[dev-dependencies.criterion]
default-features = false
version = "0.5.1"

[dev-dependencies.env_logger]
version = "0.11"

[dev-dependencies.log]
version = "0.4.17"

[dev-dependencies.once_cell]
version = "1.13.0"

[dev-dependencies.rayon]
version = "1.3"

[features]
component-model = ["dep:semver"]
default = ["std", "validate", "serde", "features", "component-model", "hash-collections", "simd"]
features = []
hash-collections = ["dep:hashbrown", "dep:indexmap"]
prefer-btree-collections = []
serde = ["dep:serde", "indexmap?/serde", "hashbrown?/serde"]
simd = []
std = ["indexmap?/std"]
validate = []

[lib]
path = "src/lib.rs"

[lints.clippy]
clone_on_copy = "warn"
manual_strip = "warn"
map_clone = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[lints.rust]
deprecated-safe-2024 = "warn"
keyword_idents_2024 = "warn"
missing-unsafe-on-extern = "warn"
rust-2024-guarded-string-incompatible-syntax = "warn"
rust-2024-incompatible-pat = "warn"
rust-2024-prelude-collisions = "warn"
unsafe-attr-outside-unsafe = "warn"
unsafe-op-in-unsafe-fn = "warn"
unsafe_code = "deny"
unstable_features = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(fuzzing)"]
level = "warn"
priority = 0

[package]
authors = ["Yury Delendik <ydelendik@mozilla.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = """
A simple event-driven library for parsing WebAssembly binary files.
"""
edition = "2021"
exclude = ["benches/*.wasm"]
homepage = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wasmparser"
keywords = ["parser", "WebAssembly", "wasm"]
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
name = "wasmparser"
readme = "README.md"
repository = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wasmparser"
rust-version = "1.81.0"
version = "0.244.0"

[package.metadata.docs.rs]
all-features = true
