[dependencies.alloc]
optional = true
package = "rustc-std-workspace-alloc"
version = "1.0"

[dependencies.bitflags]
optional = true
version = "2.11.1"

[dependencies.core]
optional = true
package = "rustc-std-workspace-core"
version = "1.0"

[dependencies.futures]
optional = true
version = "0.3.30"

[dependencies.wit-bindgen-rust-macro]
default-features = false
optional = true
version = "0.57.1"

[features]
async = []
async-spawn = ["async", "dep:futures", "std"]
bitflags = ["dep:bitflags"]
default = ["macros", "realloc", "async", "std", "bitflags", "macro-string"]
futures-stream = ["async", "dep:futures"]
inter-task-wakeup = ["async"]
macro-string = ["wit-bindgen-rust-macro?/macro-string"]
macros = ["dep:wit-bindgen-rust-macro"]
realloc = []
rustc-dep-of-std = ["dep:core", "dep:alloc"]
std = []

[lib]
path = "src/lib.rs"

[lints.clippy]
allow_attributes_without_reason = "warn"
clone_on_copy = "warn"
manual_strip = "warn"
map_clone = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[package]
authors = ["Alex Crichton <alex@alexcrichton.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = """
Rust bindings generator and runtime support for WIT and the component model.
Used when compiling Rust programs to the component model.
"""
edition = "2024"
homepage = "https://github.com/bytecodealliance/wit-bindgen"
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
name = "wit-bindgen"
readme = "README.md"
repository = "https://github.com/bytecodealliance/wit-bindgen"
resolver = "2"
rust-version = "1.85.0"
version = "0.57.1"

[package.metadata.docs.rs]
all-features = true
