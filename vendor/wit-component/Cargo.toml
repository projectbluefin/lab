[dependencies.anyhow]
version = "1.0.58"

[dependencies.bitflags]
version = "2.3.3"

[dependencies.indexmap]
default-features = false
version = "2.7.0"

[dependencies.log]
version = "0.4.17"

[dependencies.serde]
default-features = false
features = ["alloc"]
version = "1.0.166"

[dependencies.serde_derive]
version = "1.0.166"

[dependencies.serde_json]
version = "1"

[dependencies.wasm-encoder]
default-features = false
features = ["std", "wasmparser"]
version = "0.244.0"

[dependencies.wasm-metadata]
default-features = false
version = "0.244.0"

[dependencies.wasmparser]
default-features = false
features = ["simd", "std", "component-model", "simd"]
version = "0.244.0"

[dependencies.wast]
default-features = false
optional = true
version = "244.0.0"

[dependencies.wat]
default-features = false
optional = true
version = "1.244.0"

[dependencies.wit-parser]
features = ["decoding", "serde"]
version = "0.244.0"

[dev-dependencies.env_logger]
version = "0.11"

[dev-dependencies.glob]
version = "0.3.0"

[dev-dependencies.libtest-mimic]
version = "0.8.1"

[dev-dependencies.pretty_assertions]
version = "1.3.0"

[dev-dependencies.wasm-metadata]
default-features = false
features = ["oci"]
version = "0.244.0"

[dev-dependencies.wasmparser]
default-features = false
features = ["simd", "std", "component-model", "features"]
version = "0.244.0"

[dev-dependencies.wasmprinter]
default-features = false
features = ["component-model"]
version = "0.244.0"

[dev-dependencies.wat]
default-features = false
features = ["component-model"]
version = "1.244.0"

[features]
dummy-module = ["dep:wat"]
semver-check = ["dummy-module"]
wat = ["dep:wast", "dep:wat"]

[lib]
path = "src/lib.rs"

[lints.clippy]
clone_on_copy = "warn"
manual_strip = "warn"
map_clone = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[lints.rust]
deprecated-safe-2024 = "warn"
keyword_idents_2024 = "warn"
missing-unsafe-on-extern = "warn"
rust-2024-guarded-string-incompatible-syntax = "warn"
rust-2024-incompatible-pat = "warn"
rust-2024-prelude-collisions = "warn"
unsafe-attr-outside-unsafe = "warn"
unsafe-op-in-unsafe-fn = "warn"
unsafe_code = "deny"
unstable_features = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(fuzzing)"]
level = "warn"
priority = 0

[package]
authors = ["Peter Huene <peter@huene.dev>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = """
Tooling for working with `*.wit` and component files together.
"""
documentation = "https://docs.rs/wit-component"
edition = "2021"
homepage = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wit-component"
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
name = "wit-component"
readme = "README.md"
repository = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wit-component"
rust-version = "1.81.0"
version = "0.244.0"

[package.metadata.docs.rs]
all-features = true

[target.'cfg(not(target_family = "wasm"))'.dev-dependencies.wasmtime]
default-features = false
features = ["cranelift", "component-model", "runtime", "gc-drc"]
version = "34.0.1"
