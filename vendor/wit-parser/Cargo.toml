[dependencies.anyhow]
version = "1.0.58"

[dependencies.id-arena]
version = "2"

[dependencies.indexmap]
default-features = false
features = ["std"]
version = "2.7.0"

[dependencies.log]
version = "0.4.17"

[dependencies.semver]
default-features = false
version = "1.0.0"

[dependencies.serde]
default-features = false
features = ["alloc"]
optional = true
version = "1.0.166"

[dependencies.serde_derive]
optional = true
version = "1.0.166"

[dependencies.serde_json]
optional = true
version = "1"

[dependencies.unicode-xid]
version = "0.2.2"

[dependencies.wasmparser]
default-features = false
features = ["simd", "std", "validate", "component-model", "features"]
optional = true
version = "0.244.0"

[dependencies.wat]
default-features = false
features = ["component-model"]
optional = true
version = "1.244.0"

[dev-dependencies.env_logger]
version = "0.11"

[dev-dependencies.libtest-mimic]
version = "0.8.1"

[dev-dependencies.pretty_assertions]
version = "1.3.0"

[dev-dependencies.serde_json]
version = "1"

[features]
decoding = ["dep:wasmparser"]
default = ["serde", "decoding"]
serde = ["dep:serde", "dep:serde_derive", "indexmap/serde", "serde_json"]
wat = ["decoding", "dep:wat"]

[lib]
path = "src/lib.rs"

[lints.clippy]
clone_on_copy = "warn"
manual_strip = "warn"
map_clone = "warn"
uninlined_format_args = "warn"
unnecessary_cast = "warn"
unnecessary_fallible_conversions = "warn"
unnecessary_mut_passed = "warn"
unnecessary_to_owned = "warn"

[lints.clippy.all]
level = "allow"
priority = -1

[lints.rust]
deprecated-safe-2024 = "warn"
keyword_idents_2024 = "warn"
missing-unsafe-on-extern = "warn"
rust-2024-guarded-string-incompatible-syntax = "warn"
rust-2024-incompatible-pat = "warn"
rust-2024-prelude-collisions = "warn"
unsafe-attr-outside-unsafe = "warn"
unsafe-op-in-unsafe-fn = "warn"
unsafe_code = "deny"
unstable_features = "warn"
unused-lifetimes = "warn"
unused-macro-rules = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"

[lints.rust.unexpected_cfgs]
check-cfg = ["cfg(fuzzing)"]
level = "warn"
priority = 0

[package]
authors = ["Alex Crichton <alex@alexcrichton.com>"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = """
Tooling for parsing `*.wit` files and working with their contents.
"""
documentation = "https://docs.rs/wit-parser"
edition = "2021"
homepage = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wit-parser"
license = "Apache-2.0 WITH LLVM-exception OR Apache-2.0 OR MIT"
name = "wit-parser"
readme = "README.md"
repository = "https://github.com/bytecodealliance/wasm-tools/tree/main/crates/wit-parser"
rust-version = "1.81.0"
version = "0.244.0"
